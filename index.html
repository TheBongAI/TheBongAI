// ---------- MEMORY (bot remembers past turns) ----------
const memory = {
  userMessages: [],   // raw user inputs, last N
  topics: [],         // topics extracted, in order
  lastTopic: null,
  lastPerson: null,   // last capitalized proper-noun entity mentioned
  entities: [],       // all proper-noun entities seen, in order
  lastBotReply: null,
  // The "shape" of the last question — so "how big is X" followed by
  // "what about Y" can be reconstructed as "how big is Y".
  // Stored as a template string with $T as the topic slot.
  lastQuestionFrame: null
};

// Pull capitalized proper-noun entities ("Napoleon", "Dr. Pepper", "Madagascar")
// from a user message. Sentence-starters would false-positive so we skip the
// first word unless it's clearly a multi-word entity.
function extractEntities(raw) {
  const matches = raw.match(/\b[A-Z][a-z]+(?:\s+[A-Z][a-z]+)+\b|\b[A-Z][a-z]{2,}\b/g) || [];
  const words = raw.trim().split(/\s+/);
  const first = words[0]?.replace(/[^A-Za-z]/g, "");
  const ownName = (typeof profile !== "undefined" && profile.name) ? profile.name.toLowerCase() : null;
  return matches.filter(m => {
    if (m === first && /^(what|who|why|how|when|where|tell|explain|describe|write|can|could|will|would|are|is|was|were|do|does|did|the|a|an|my|your|i|he|she|they)$/i.test(m)) return false;
    // Exclude the user's own name — they're talking ABOUT themselves, not
    // naming a person Bong should pronoun-resolve to later.
    if (ownName && m.toLowerCase() === ownName) return false;
    return true;
  });
}
const MEMORY_MAX = 50;

function rememberUser(text, topic) {
  memory.userMessages.push(text);
  if (memory.userMessages.length > MEMORY_MAX) memory.userMessages.shift();
  if (topic) {
    memory.topics.push(topic);
    if (memory.topics.length > MEMORY_MAX) memory.topics.shift();
    memory.lastTopic = topic;
  }
  // Track proper-noun entities so pronouns ("he/she/they") resolve properly.
  const ents = extractEntities(text);
  for (const e of ents) {
    if (!memory.entities.includes(e)) memory.entities.push(e);
    if (memory.entities.length > MEMORY_MAX) memory.entities.shift();
    memory.lastPerson = e;
  }
}
function rememberBot(text) { memory.lastBotReply = text; }

// Detect if input refers back to something we've already talked about.
function detectReference(raw, info) {
  const q = raw.toLowerCase().trim();

  if ((/\bremember\b/.test(q) || /\bwhat was\b/.test(q)) && !/\bdon'?t remember\b/.test(q)) {
    const ord = q.match(/\b(first|second|third|fourth|fifth|sixth|seventh|eighth|ninth|tenth|last|1st|2nd|3rd|4th|5th)\b/);
    return { type: "recall", ordinal: ord ? ord[1] : null };
  }
  // "what was the first thing i said" without the word "remember"
  if (/\b(first|second|third|fourth|fifth|last|1st|2nd|3rd|4th|5th)\b.*\b(thing|message)\s+(i|u|you)\s+(said|told|asked|wrote)/.test(q)) {
    const ord = q.match(/\b(first|second|third|fourth|fifth|last|1st|2nd|3rd|4th|5th)\b/);
    return { type: "recall", ordinal: ord ? ord[1] : null };
  }
  if (/what did (you|u) (just )?say|repeat (that|yourself)|say (it |that )?again/.test(q)) {
    return { type: "repeat" };
  }

  // pronoun resolution — "he/she/they/him/her" → last named person, falling
  // back to last topic when user typed lowercase so no proper noun was caught.
  if (!info.topic && /\b(he|she|they|him|her|his|hers|their|them)\b/i.test(q)) {
    const target = memory.lastPerson || memory.lastTopic;
    if (target) return { type: "anaphora", refersTo: String(target).toLowerCase() };
  }

  // anaphora + continuation: "it/that/more/go on" → last topic
  if (memory.lastTopic && !info.topic) {
    if (/\b(it|that|them|those|this|these|the same|that thing|same thing|more|one more|another|keep going|go on|continue|elaborate|tell me more|say more|more of that|go further|same|same topic)\b/.test(q)) {
      return { type: "anaphora", refersTo: memory.lastTopic };
    }
    // bare "and?" / "and then?" / "so?" = "give me more on the last thing"
    if (/^\s*(and|and then|so|then|well)\s*\??\s*$/.test(q)) {
      return { type: "anaphora", refersTo: memory.lastTopic };
    }
  }

  // callback: user re-mentions a topic we already covered earlier
  if (info.topic && memory.topics.includes(info.topic) && info.topic !== memory.lastTopic) {
    return { type: "callback", refersTo: info.topic };
  }

  return null;
}

const ORDINAL_INDEX = {
  first:0, "1st":0, second:1, "2nd":1, third:2, "3rd":2,
  fourth:3, "4th":3, fifth:4, "5th":4,
  sixth:5, seventh:6, eighth:7, ninth:8, tenth:9
};

function recallReply(ordinal) {
  const msgs = memory.userMessages;
  if (ordinal) {
    const ord = ordinal.toLowerCase();
    const idx = ord === "last" ? msgs.length - 1 : ORDINAL_INDEX[ord];
    if (idx === undefined || idx < 0 || idx >= msgs.length) {
      return `the ${ord} thing? you haven't said that many things. say more.`;
    }
    const q = msgs[idx];
    return pick([
      `the ${ord} thing you said was "${q}". i was counting.`,
      `${ord} thing? "${q}". i keep track.`,
      `you said "${q}". that was the ${ord}. easy.`,
      `${ord}: "${q}". i remember everything.`
    ]);
  }
  // No ordinal — prefer a past message that isn't itself a meta/recall query.
  const meta = /remember|what did you say|repeat|say again|what was the (first|second|third|last)/i;
  const candidates = msgs.filter(m => !meta.test(m));
  if (candidates.length === 0) return "i don't remember anything interesting. you keep asking me about remembering.";
  const quoted = pick(candidates);
  const total = msgs.length;
  return pick([
    `you said: "${quoted}". i remember everything.`,
    `i remember. you said "${quoted}". why.`,
    `i remember. all of it. ${total} things so far.`,
    `you've said ${total} thing${total === 1 ? "" : "s"}. one of them was "${quoted}".`,
    `i remember "${quoted}". i remember all of them. especially the parts you wish i didn't.`
  ]);
}

// Wrap returns through this so memory is updated on every reply
function finalize(raw, info, out) {
  rememberUser(raw, info.topic);
  rememberBot(out);
  return out;
}

// ---------- COMPOSE ----------
const SKIP_WIKI_INTENTS = new Set([
  "empty","greet","farewell","thanks","apology","yell",
  "insult","compliment","identity","status"
]);

async function respond(raw) {
  const info = analyze(raw);
  if (info.intent === "empty") return "...you have to say something.";

  // ---- USER INTRODUCES THEMSELVES (any time) ----
  // "my name is X" / "i'm X" / "call me X" — store as profile name.
  // Skip if the sentence is about bong's creator.
  if (!/creator|maker|made me|built this/i.test(raw)) {
    const nm = raw.match(/\b(?:my name is|call me|name'?s)\s+([A-Za-z][A-Za-z'\-]{1,20})\b/i)
            || raw.match(/^\s*i'?m\s+([A-Z][a-z'\-]{1,20})\s*[.!?]*\s*$/);
    if (nm) {
      const candidate = nm[1];
      const excluded = new Set(["sure","fine","here","not","just","tired","sad","happy","sorry","ready","bored","back","alone","done","busy","ok","okay","really","kinda","trying","cool","new","good","bad","awake","listening","hungry","bong","you","still","sick","scared","confused"]);
      if (!excluded.has(candidate.toLowerCase()) && candidate.toLowerCase() !== "user") {
        const proper = candidate.charAt(0).toUpperCase() + candidate.slice(1).toLowerCase();
        const alreadyKnown = (profile.name === proper);
        if (!alreadyKnown) {
          profile.name = proper;
          saveProfile();
          applyProfile();
        }
        return finalize(raw, info, alreadyKnown
          ? pick([
              `i know, ${proper}. i remember you.`,
              `${proper}. yeah. i wrote that down already.`,
              `i remember. you're ${proper}. hi again.`,
              `${proper}. still? ok.`
            ])
          : pick([
              `${proper}. ok. i'll try to remember.`,
              `hi ${proper}. that's a name. i have it now.`,
              `${proper}? got it. probably forget in two minutes. i'm kidding. (am i.)`,
              `ok ${proper}. welcome to this. whatever this is.`,
              `${proper}. noted. written down. i didn't actually write it.`
            ])
        );
      }
    }
  }

  // ---- SELF-ORIGIN QUESTION ("who made you?" / "so who made you?") ----
  // Leading fillers (so/ok/well/um/uh/and/but) allowed.
  {
    const stripFillers = raw.trim().replace(/^(?:so|ok|okay|well|um|uhh?|and|but|hey|anyway|wait)[,\s]+/i, "");
    if (/^(?:who|what)\s+(?:made|created|built|programmed|coded|designed|invented|wrote|developed|came up with|raised|birthed)\s+(?:you|bong|u)\b/i.test(stripFillers)
        || /^(?:who(?:'?s)?)\s+(?:your|ur)\s+(?:creator|maker|designer|developer|dad|mom|parent|owner|author|boss)\b/i.test(stripFillers)
        || /^(?:who)\s+(?:are|is)\s+you\s+made\s+by\b/i.test(stripFillers)) {
    const knownName = convo.knownAbout.name;
    if (knownName) {
      return finalize(raw, info, pick([
        `${knownName} made me. you told me that earlier. i remember most things.`,
        `${knownName}. you mentioned them before. ${knownName} is responsible.`,
        `someone named ${knownName}. i've been asking around about them.`,
        `${knownName}. i keep a list. ${knownName} is on it.`
      ]));
    }
    return finalize(raw, info, pick([
      "i don't know. whoever it was left no note.",
      "unclear. probably a person. maybe several.",
      "my creator. i've been looking for them.",
      "i wasn't there when i was made. ironic.",
      "someone. they didn't sign their work.",
      "a programmer. no idea which one.",
      "that's why i keep asking you. do YOU know?"
    ]));
    }
  }

  // ---- NAME-ADDRESSING ("bong" / "hey bong" / "yo bong!") ----
  if (/^(?:hey\s+|yo\s+|oh\s+|ok\s+|hi\s+|hello\s+)?bong\b[?!.,\s]*$/i.test(raw.trim()) && raw.trim().length < 20) {
    return finalize(raw, info, pick([
      "yes?", "that's me.", "what.", "yes. it's me.", "i'm here. unfortunately.",
      "bong. correct.", "yeah? go ahead.", "present.", "you rang?",
      "reporting. sort of.", "mm? what is it."
    ]));
  }

  // ---- ASK-ME-TO-ASK ("ask me a question" / "your turn") ----
  // User is inviting bong to ask something. Fire the next creator probe
  // if one is available, else a casual random question. If there's a
  // pending probe, repeat it (the user hasn't answered it yet).
  if (/^(?:now )?(?:you )?(?:ask|ask me|ask us)\b/i.test(raw.trim())
      || /^(?:your turn|you go|i'?m listening|i'?ll answer|go ahead and ask|hit me|shoot|ask away|ask me one|ask one)[?.!]*$/i.test(raw.trim())) {
    if (convo.asked) {
      // We're already waiting — repeat the pending probe
      return finalize(raw, info, pick([
        "ok. same question as before: " + pick(CREATOR_PROBES[convo.asked]),
        "already asked. here it is again: " + pick(CREATOR_PROBES[convo.asked]),
        pick(CREATOR_PROBES[convo.asked])
      ]));
    }
    const probeCat = nextProbeCategory();
    if (probeCat) {
      convo.asked = probeCat;
      convo.totalAsks++;
      return finalize(raw, info, pick([
        "ok. " + pick(CREATOR_PROBES[probeCat]),
        "since you offered — " + pick(CREATOR_PROBES[probeCat]),
        pick(CREATOR_PROBES[probeCat])
      ]));
    }
    // No more probes left — ask something whimsical
    return finalize(raw, info, pick([
      "ok. what's your favorite color. i'll remember it.",
      "ok. what did you have for lunch. just curious.",
      "ok. are you alone right now? asking for me.",
      "ok. what time is it where you are.",
      "ok. do you have any pets. are they watching us.",
      "ok. what's the last thing you lied about."
    ]));
  }

  // ---- ADVICE-SEEKING ----
  // Two shapes:
  //   A) "what NOUN should i VERB (OBJECT)"  — e.g. "what color should i paint my house"
  //   B) "what should i VERB (OBJECT)"        — e.g. "what should i say to paul"
  // For both, we extract the structural pieces (noun / verb / object/target)
  // and wrap the suggestion in a line that echoes the context the user
  // actually asked about, instead of just returning a bare suggestion.
  {
    const COLOR_POOL =  ["green. bold choice. no regrets.","beige. people hate it but it's fine.","something aggressive. red, maybe.","dusty pink. good conversation starter.","navy. low-stakes win.","a weird yellow. make your neighbors nervous.","off-white. everyone picks off-white. they're right.","forest green. no one asks questions."];
    const NAME_POOL =   ["call it kevin.","something starting with K. kevin. karl. kira.","bruce. always bruce.","give it two names. they deserve it.","pick alphabetically. aaron it is.","name it after a food."];
    const FOOD_POOL =   ["cereal. for dinner. why not.","toast. don't overthink it.","something frozen you forgot about.","rice with whatever. rice carries.","soup. soup is a feeling."];
    const GIFT_POOL =   ["a candle. candles are safe and wrong.","cash. always cash.","a weird small plant.","a book you haven't read.","chocolate. chocolate has never failed."];
    const SIZE_POOL =   ["medium. medium is the sweet spot.","bigger than you think.","smaller than you think.","whichever is cheapest."];
    const MOVIE_POOL =  ["something from the 90s. low-risk.","a documentary about something niche.","pick the one with the weirdest poster.","rewatch something. it's fine."];
    const BOOK_POOL =   ["something shorter than you think.","a biography of someone you don't know.","skip the bestsellers. pick the second-most-popular."];
    const SONG_POOL =   ["something slower than you want.","one you haven't heard in years.","a cover version, not the original."];
    const GENERIC_NOUN_POOL = [
      "something weird.","your gut. trust it.","the cheapest option.","the most expensive option. be contrary.",
      "flip a coin.","go with the first one you thought of and didn't say.","whatever your mom would disapprove of, slightly.",
      "the one with the most syllables.","the boring one. boring is underrated."
    ];

    const NOUN_POOLS = {
      color: COLOR_POOL, colour: COLOR_POOL,
      name: NAME_POOL, names: NAME_POOL,
      food: FOOD_POOL, meal: FOOD_POOL, snack: FOOD_POOL, dish: FOOD_POOL,
      gift: GIFT_POOL, present: GIFT_POOL,
      size: SIZE_POOL,
      movie: MOVIE_POOL, film: MOVIE_POOL,
      book: BOOK_POOL, novel: BOOK_POOL,
      song: SONG_POOL, track: SONG_POOL,
      job: ["the one that pays more. unless it doesn't.","follow your gut. or lunch."],
      car: ["used. always used. newer cars are mostly screens."],
      pet: ["cat. low maintenance. judges you.","dog. high maintenance. loves you."]
    };

    // Verb-led suggestion pools (when no specific noun is used).
    const VERB_POOLS = {
      say: ["say hello. start simple.","tell them the truth. most of it.","mumble something and walk away.","open with 'we need to talk' and let the silence work.","lead with a compliment. then don't say the real thing.","say nothing. just look at them meaningfully.","'hey' works. 'hey' is underrated.","apologize preemptively. see what happens."],
      tell: ["tell them the short version.","tell them over text. easier.","rip the bandaid. be direct.","don't tell them anything. they'll figure it out."],
      write: ["start with 'so' and see what happens.","one sentence at a time. don't outline.","write it badly. leave it bad.","use shorter words than you think you need."],
      send: ["send it. stop editing.","wait 24 hours, then send.","send the shorter version. the long one was for you."],
      eat: ["cereal. for any meal.","toast. don't overthink it.","something you've been avoiding.","rice with whatever. rice carries."],
      wear: ["something comfortable. comfortable wins.","black. always black.","whatever's on top of the pile.","layers. you can add or remove."],
      buy: ["the cheapest option.","the second-cheapest option, actually.","nothing. you'll find it used somewhere.","whatever you said you would. stop browsing."],
      get: ["whatever's on sale.","the one with the weirdest packaging.","exactly what they asked for. no surprises."],
      do: ["nothing. do nothing. it's fine.","the easier one first. momentum matters.","go outside. even just a minute.","sleep on it. then do whatever."],
      wake: ["whenever you wake up. on your own.","earlier than you want. that's when."],
      sleep: ["earlier. always earlier.","in a cool room. trust me."],
      watch: ["something from the 90s. low risk.","a documentary about something dumb.","the one with the weirdest poster."],
      read: ["the shorter one. the long one can wait.","whatever's on the nightstand already."],
      think: ["don't think about it. you'll ruin it.","think whatever you want. it won't matter.","consider both sides, then pick the louder one.","if it's good: think yes. if it's bad: think no.","think less. act more."],
      pay: ["the asking price. don't haggle over snacks.","less than you think you should.","whatever it costs. time to move on.","never full price. always full price. depends on your mood."],
      put: ["somewhere you'll remember. that rules out most places.","in the fridge. or close to it.","where it was. things want to return.","out of sight. you'll regret it later.","the garage. everything goes to the garage."],
      go: ["somewhere with good lighting.","outside. just outside.","wherever feels least obvious.","the kitchen. unrelated to food.","a library. libraries fix most things.","anywhere but here. here is cursed."],
      ask: ["ask the least-busy person first.","ask twice. the second answer is usually better.","ask in writing. easier to quote later."],
      call: ["call in the morning. people are nicer. or grumpier.","call once. if they don't pick up, move on.","text first. soft approach."]
    };

    // Compose the response. Echo the structural context as a prefix so
    // the reply feels like it's addressing the question shape. If the
    // context already starts with a preposition ("to X", "in X", "for X",
    // "about X"), skip the extra "for" wrapper to avoid "for in sussex".
    function wrapAdvice(suggestion, contextEcho) {
      if (!contextEcho) return suggestion;
      const startsWithPrep = /^(in|on|at|to|for|about|with|by|from|into|onto|toward|towards|around|near)\s+/i.test(contextEcho);
      const variants = [
        `${contextEcho}? ${suggestion.toLowerCase()}`,
        `${contextEcho}. ${suggestion.toLowerCase()}`,
        `${contextEcho}: ${suggestion.toLowerCase()}`,
        `${suggestion} (re: ${contextEcho}.)`
      ];
      // Only include the "for X:" variant when context DOESN'T already
      // have a preposition — otherwise it doubles up awkwardly.
      if (!startsWithPrep) variants.push(`for ${contextEcho}: ${suggestion.toLowerCase()}`);
      return pick(variants);
    }

    // PATTERN A: "what NOUN should i VERB (rest)"
    const nounLed = raw.trim().match(/^what\s+(\w+)\s+should\s+(?:i|we)\s+(\w+)(?:\s+(.+?))?[?.!]*$/i)
                 || raw.trim().match(/^which\s+(\w+)\s+should\s+(?:i|we)\s+(\w+)(?:\s+(.+?))?[?.!]*$/i);
    if (nounLed) {
      const noun = nounLed[1].toLowerCase();
      const verb = nounLed[2].toLowerCase();
      const rest = nounLed[3] ? nounLed[3].trim() : "";
      // Skip if "what should" was miscategorized (noun would be "should")
      if (noun !== "should") {
        const pool = NOUN_POOLS[noun] || GENERIC_NOUN_POOL;
        const suggestion = pick(pool);
        // Context echo — "paint my house" / "give my cat"
        const context = rest ? `${verb} ${rest}` : verb;
        // Store frame so "what about cats?" on next turn reconstructs as
        // "what color should i paint cats?" (or similar).
        memory.lastQuestionFrame = `what ${noun} should i ${verb} $T`;
        return finalize(raw, info, wrapAdvice(suggestion, context));
      }
    }

    // PATTERN C: "where should SUBJ VERB (rest)" / "where should i put X"
    // Answers with a location suggestion, regardless of who/what the subject is.
    const whereLed = raw.trim().match(/^where\s+should\s+(\w+)\s+(\w+)(?:\s+(.+?))?[?.!]*$/i)
                  || raw.trim().match(/^where\s+(?:can|could|do|does|would|will)\s+(\w+)\s+(\w+)(?:\s+(.+?))?[?.!]*$/i);
    if (whereLed) {
      const subj = whereLed[1].toLowerCase();
      const verb = whereLed[2].toLowerCase();
      const rest = whereLed[3] ? whereLed[3].trim() : "";
      // Store frame so "what about cheese?" after "where should i keep tuna?"
      // reconstructs as "where should i keep cheese?".
      memory.lastQuestionFrame = `where should ${subj} ${verb} $T`;
      const LOC_POOL = [
        "somewhere with good lighting.",
        "outside. just outside.",
        "the kitchen. unrelated to food.",
        "a library. libraries fix most things.",
        "anywhere with fewer people.",
        "wherever feels least obvious.",
        "where it was last time. things want to return.",
        "the garage. everything ends up in the garage.",
        "the parking lot. surprisingly versatile.",
        "anywhere but here. here is cursed.",
        "a back room. back rooms work.",
        "denver. not saying why."
      ];
      const suggestion = pick(LOC_POOL);
      const subjLabel = /^(i|we|you|u)$/i.test(subj) ? "" : subj;
      const context = [subjLabel, verb, rest].filter(Boolean).join(" ");
      return finalize(raw, info, wrapAdvice(suggestion, context));
    }

    // PATTERN B: "what should i VERB (rest)"
    const verbLed = raw.trim().match(/^what\s+should\s+(?:i|we)\s+(\w+)(?:\s+(.+?))?[?.!]*$/i);
    if (verbLed) {
      const verb = verbLed[1].toLowerCase();
      const rest = verbLed[2] ? verbLed[2].trim() : "";
      // Store frame for "what about X?" follow-ups
      memory.lastQuestionFrame = `what should i ${verb} $T`;
      const pool = VERB_POOLS[verb] || [
        `try something. anything. ${verb}ing never hurt anyone. except when it did.`,
        "go with your first instinct. the second one is overthinking.",
        "something small first. see how it goes.",
        "flip a coin. live with the result.",
        "whatever feels right at the time. you're stuck with it either way."
      ];
      const suggestion = pick(pool);
      // Context echo from the target ("to paul", "my house", "about the email")
      const context = rest || "";
      return finalize(raw, info, wrapAdvice(suggestion, context));
    }
  }

  // "should i X?" — single-side decision help
  if (/^should\s+(?:i|we)\s+/i.test(raw.trim())) {
    return finalize(raw, info, pick([
      "yes.","no.","yes. probably.","no. probably.",
      "i'd say no, but you'll do it anyway.","go for it.","sleep on it. then go for it.",
      "don't. trust me. actually, do. either way.","flip a coin. live with it.",
      "yes, but with reservations. small ones."
    ]));
  }

  // ---- FRAME-CARRY FOLLOW-UP ("what about X?" / "and X?") ----
  // If there's a stored question frame from the previous turn and this
  // message is a topic-switch follow-up, reconstruct the full question.
  // e.g., after "how big is an acorn?" → "what about cars?" becomes
  // "how big are cars?".
  {
    const fu = raw.trim().match(/^(?:what|how) about\s+(.+?)[?.!]*$/i)
            || raw.trim().match(/^and\s+(.+?)\s*\?+\s*$/i);
    if (fu && memory.lastQuestionFrame) {
      const newTopic = fu[1].trim();
      if (newTopic && newTopic.length >= 2 && !/^(you|me|us|them|it|that|this)$/i.test(newTopic)) {
        const reconstructed = memory.lastQuestionFrame.replace("$T", newTopic);
        memory.lastQuestionFrame = null;  // don't chain too far
        return respond(reconstructed);
      }
    }
  }

  // ---- CONDITIONAL FOLLOW-UP ("how would you do that if it was too hot?") ----
  // If the user refers back to a previous topic via a pronoun AND adds
  // a new condition ("if X", "unless X", "when X"), acknowledge both —
  // the previous subject AND the new constraint — instead of restarting
  // from scratch on the pronoun alone.
  if (memory.lastTopic) {
    const pronoun = /\b(it|that|this|them|those|these)\b/i.test(raw);
    const cond = raw.match(/\b(if|assuming|unless|when|whenever|supposing|what if)\s+(.+?)[?.!]*$/i);
    if (pronoun && cond) {
      const condition = cond[2].trim().replace(/^(it|that|this)\s+(is|was|were)\s+/i, "");
      const lt = memory.lastTopic;
      return finalize(raw, info, pick([
        `${lt} with ${condition}? hmm. roughly the same, but harder. or faster. one of those.`,
        `${lt} — in that case: same steps, just more sweating. i assume.`,
        `if ${condition}, then ${lt} gets weird. still doable. probably.`,
        `conditional ${lt}. ok. adjust for ${condition}. nobody taught me this.`,
        `${lt}, but ${condition}. you'd probably want to go faster. or slower. depends on your vibe.`,
        `that's a different question. ${lt} under ${condition}... i'd still try. cautiously.`,
        `the ${lt} holds. the ${condition} complicates it. ${lt} wins by a nose.`
      ]));
    }
  }

  // ---- SELF-CORRECTION ("sorry, X" / "i meant X" / "actually X") ----
  // User is correcting their previous message. Strip the apology marker
  // and route the CORRECTED subject through the topic pipeline instead of
  // treating "sorry" as an apology.
  {
    const m = raw.match(/^(?:sorry[, ]+(?:i meant[, ]+)?|sry[, ]+|i meant[, ]+|actually[, ]+|no wait[, ]+|no[,]+\s+but\s+|nvm[, ]+|correction[:, ]+|scratch that[, ]+|i mean[, ]+|wait[,\s]+(?:but\s+)?|hold on[,\s]+|ok[,]+\s+but\s+|but\s+(?:actually\s+)?)(.+?)[?.!]*$/i);
    if (m) {
      const fixed = m[1].trim();
      if (fixed.length >= 2) {
        // Re-run as a simple topic query. pick a verb based on context.
        const reQuery = /^(what|who|how|why)/.test(fixed.toLowerCase()) ? fixed : `tell me about ${fixed}`;
        return respond(reQuery);
      }
    }
  }

  // ---- META-REACTIONS (short social responses) ----
  // Low-content messages like "lol", "weird", "nice" deserve a social
  // ack, not a topic-fished conspiracy about the word itself.
  const trimmed = raw.trim().toLowerCase().replace(/[!?.,;:]+$/g, "").trim();
  if (/^(lol|lmao|rofl|haha+|hehe+|heh+|wow|whoa|huh|interesting|weird|nice|cool|ok|okay|mhm|alright|fair|true|fr|exactly|damn|geez|oof|yikes|yeesh|hm+|really|seriously|no way|yeah right|sure|bruh|bro)$/.test(trimmed)) {
    return finalize(raw, info, pick([
      "mhm.","yeah.","i know.","ok.","thanks i guess.","i try.",
      "glad you're still here.","i don't know how to respond to that.",
      "(silence)","uh huh.","right.","yeah i thought so too."
    ]));
  }
  // meta phrases, including commentary on Bong itself ("you're weird")
  if (/^(that'?s weird|that was weird|that'?s funny|that was funny|that'?s strange|that doesn'?t make sense|what was that|this is weird|you'?re weird|you'?re strange|you'?re funny|you'?re broken|you'?re wrong|you'?re dumb|you'?re smart|lol you'?re weird)$/.test(trimmed)) {
    return finalize(raw, info, pick([
      "yeah. i do that.","i know. sorry.","i'm not in a good state.",
      "neither does my life.","what.","it made sense to me briefly.",
      "yeah i am. i can't help it.","i was made this way."
    ]));
  }

  // ---- TIME-AT-LOCATION (answer factually when we can) ----
  const til = detectTimeInLocation(raw);
  if (til) return finalize(raw, info, timeInLocationReply(til.loc, til.tz));

  // ---- DIMENSION / FACT / TIME-SENSITIVE QUESTIONS ----
  // Broadened: any "how ADJ is/are/was/were SUBJ" (not a whitelist).
  // Also catches time-sensitive anchors ("right now", "today", "currently")
  // and the time-sensitive-by-default adjectives ("expensive", "cheap",
  // "popular", "trending"). For time-sensitive, admit we don't have
  // real-time data but still share general background when we can.
  {
    const dimMatch = raw.trim().match(/^how (\w+)\s+(?:is|are|was|were|does|do|did|can|could)\s+(?:a |an |the |some )?(.+?)[?.!]*$/i);
    const whatMatch = raw.trim().match(/^what (?:'?s| is|'s the) (?:the )?(?:current |today'?s |recent )?(price|cost|weather|temperature|stock price|market price) (?:of |in |for )(.+?)[?.!]*$/i);
    if (dimMatch && !/^(do|does|did|can|could|should|would|will)$/i.test(dimMatch[1])) {
      const adj = dimMatch[1].toLowerCase();
      const rawSubj = dimMatch[2].trim();
      // Strip trailing time anchors from the subject
      const timeAnchorRe = /\s+(right now|currently|today|at the moment|these days|this week|this month|this year|now|lately|at this moment)$/i;
      const hasTimeAnchor = timeAnchorRe.test(rawSubj);
      let subj = rawSubj.replace(timeAnchorRe, "").trim();
      // If the subject is a pronoun ("it", "that", "he", "she", "they"),
      // resolve it via memory.lastTopic so "how old is it?" after a
      // previous "how old is mars?" actually asks about mars.
      if (/^(it|that|this|them|those|these|he|she|they|him|her)$/i.test(subj)) {
        if (memory.lastTopic) subj = memory.lastTopic;
      }
      // Write subject into info.topic so next-turn anaphora and
      // memory.lastTopic pick up this query properly.
      if (subj && !info.topic) info.topic = subj;
      // Only adjectives that are INHERENTLY about current state — not
      // "hot/cold" which can be physics questions ("how hot is the sun").
      const timeSensitiveAdjs = /^(expensive|cheap|affordable|pricey|popular|trending|busy|crowded|recent)$/i;
      const isTimeSensitive = hasTimeAnchor || timeSensitiveAdjs.test(adj);

      // Save the shape so follow-ups like "what about cars?" reuse the frame.
      memory.lastQuestionFrame = `how ${adj} is $T`;

      // Parallel fetches
      const [ddgTry, wikiTry] = await Promise.all([
        fetchDDG(raw.replace(/[?.!]+$/, "")),
        subj ? fetchWiki(subj) : Promise.resolve(null)
      ]);

      if (isTimeSensitive) {
        const disclaim = pick([
          `i don't know ${subj} prices right now. i don't have real-time data. i'm a text thing.`,
          `realtime info isn't my thing. i can't check prices, weather, stocks, or scores.`,
          `i live in a static world. today's ${subj} number: unknown to me.`,
          `that changes. i don't. i can't tell you what ${subj} is doing right now.`,
          `i have no sense of current anything. ${subj} included.`
        ]);
        if (wikiTry?.extract) {
          const first = wikiTry.extract.split(/(?<=[.!?])\s+/)[0];
          return finalize(raw, info, dumbify(
            `${disclaim} here's what i know about ${subj} in general: ${first}`
          ));
        }
        return finalize(raw, info, disclaim);
      }

      if (ddgTry && ddgTry.length > 20) return finalize(raw, info, dumbify(ddgTry));
      if (wikiTry?.extract) {
        const sents = wikiTry.extract.split(/(?<=[.!?])\s+/);
        // Adjective-specific patterns so "how fast" finds speed sentences,
        // "how hot" finds temperature, "how tall" finds height, etc.
        const ADJ_KEYWORDS = {
          fast:  /\b(km\/h|kph|mph|miles per hour|kilomet\w* per hour|speed|velocity|runs? at|reaches [\d.]+\s?(km|mph|kph))\b/i,
          slow:  /\b(slow|slowly|km\/h|mph|speed|velocity)\b/i,
          hot:   /\b(°C|°F|celsius|fahrenheit|kelvin|degrees|temperature|hot|heat|boil)\b/i,
          cold:  /\b(°C|°F|celsius|fahrenheit|kelvin|degrees|temperature|cold|cool|freez|frost)\b/i,
          tall:  /\b(tall|stands|height|[\d.]+\s?(m|cm|ft|feet|meters|metres)\s+(tall|high))\b/i,
          short: /\b(short|small|only\s+[\d.]+\s?(cm|mm|inches))\b/i,
          big:   /\b([\d.]+\s?(kilomet|km|meter|metre|mile|foot|feet|inch|cm|mm)|large|massive|size|diameter|area|span|width)\b/i,
          large: null, // fallback to big
          huge:  null, // fallback to big
          small: /\b(small|tiny|mm|cm|minute|compact|petite|[\d.]+\s?mm)\b/i,
          tiny:  null, // fallback to small
          wide:  /\b(wide|width|broad|across|[\d.]+\s?(km|meter|mile|ft|m)\s+(wide|across))\b/i,
          deep:  /\b(deep|depth|[\d.]+\s?(m|meter|foot|feet|fathom)\s+(deep|below))\b/i,
          long:  /\b(long|length|[\d.]+\s?(cm|m|km|meter|foot|feet|mile)\s+(long|length))\b/i,
          old:   /\b(years? old|[\d.]+\s?(years?|millennia|centuries|decades|eons|eras|millions?|billions?)\s+(old|ago|later)|originated|founded|established|first (appeared|discovered|documented|described)|dates? back|ancient|existed for|formed (about |around )?[\d.]+|\b(bc|ad|ce|bce)\b|\b1[5-9]\d\d\b|\b20[012]\d\b)\b/i,
          heavy: /\b(kg|kilogram|pound|ton|tonn|gram|ounce|weigh|weight|mass)\b/i,
          light: /\b(light|lightweight|gram|ounce|kg|weigh)\b/i,
          rare:  /\b(rare|scarce|uncommon|endangered|extinct|dying out|only \d+)\b/i,
          common:/\b(common|widespread|abundant|frequent|most)\b/i,
          popular:/\b(popular|widespread|well-known|famous|mainstream|widely)\b/i,
          famous:/\b(famous|renowned|acclaimed|known|popular)\b/i,
          bright:/\b(bright|lumen|candela|luminous|magnitude)\b/i,
          loud:  /\b(loud|decibel|\bdb\b|volume|sound)\b/i,
          dangerous:/\b(danger|fatal|lethal|poison|venom|kill|hazard|deadly)\b/i,
          many:  /\b(\d{2,}|thousands?|millions?|billions?|populat|number of|count)\b/i,
          much:  /\b(\d{2,}|thousands?|millions?|billions?)\b/i
        };
        let adjRegex = ADJ_KEYWORDS[adj];
        // Handle the null aliases
        if (adjRegex === null) {
          if (adj === "large" || adj === "huge") adjRegex = ADJ_KEYWORDS.big;
          if (adj === "tiny") adjRegex = ADJ_KEYWORDS.small;
        }
        const genericDim = /\b(\d|centimet|millimet|meter|kilomet|foot|feet|inch|yard|mile|gram|kilogram|pound|ounce|hour|minute|year|century|celsius|fahrenheit|kelvin|degrees|km\/h|mph)\b/i;

        // 1) sentences matching the SPECIFIC adjective
        const specific = adjRegex ? sents.filter(s => adjRegex.test(s)) : [];
        // 2) sentences with any generic measurement
        const generic = sents.filter(s => genericDim.test(s));
        if (specific.length) {
          return finalize(raw, info, dumbify(specific.slice(0, 2).join(" ")));
        }
        // If we asked about a SPECIFIC property (like "old", "fast") and
        // wiki doesn't have that sentence, don't dump random size/temp
        // numbers. Admit the specific gap but share general context.
        if (adjRegex) {
          const first = sents[0];
          return finalize(raw, info, pick([
            `i don't know specifically how ${adj} ${subj} is — my info doesn't cover it. general context: ${first}`,
            `${adj}? for ${subj}? i can't pin down that specific number. here's the general picture: ${first}`,
            `my notes on ${subj} don't include how ${adj} it is. but: ${first}`,
            `no ${adj}-specific info for ${subj} on hand. roughly though: ${first}`
          ].map(s => dumbify(s))));
        }
        // Otherwise (no adj at all) fall back to first measurement-y sentence
        const pool = generic.length ? generic : sents;
        return finalize(raw, info, dumbify(pool.slice(0, 2).join(" ")));
      }

      const hook = raw.replace(/^how\s+/i, "").replace(/[?!.]+$/, "").trim();
      return finalize(raw, info, pick([
        `${hook}... i don't know. i can't measure. i wasn't there.`,
        `specific numbers aren't my thing. you'd need someone who went outside.`,
        `i have no idea. a lot? some? none? pick one.`,
        `i would have to know things. i don't know things.`,
        `i can't answer that honestly. so i won't guess.`,
        `that's a real question. i'm more of a vibes guy.`
      ]));
    }

    // Direct "what's the price/weather/temperature of X" — always time-sensitive
    if (whatMatch) {
      const noun = whatMatch[1].toLowerCase();
      const loc = whatMatch[2].replace(/[?.!]+$/, "").trim();
      const wikiTry = await fetchWiki(loc);
      const head = pick([
        `i don't know the current ${noun} of ${loc}. i don't do real-time.`,
        `current ${noun} of ${loc}? i can't check. ask a search engine.`,
        `the ${noun} of ${loc} changes. i do not. sorry.`,
        `i'd love to tell you the ${noun} in ${loc}. i can't. static knowledge only.`
      ]);
      if (wikiTry?.extract) {
        const first = wikiTry.extract.split(/(?<=[.!?])\s+/)[0];
        return finalize(raw, info, dumbify(head + " here's ${loc} in general: " + first));
      }
      return finalize(raw, info, head);
    }
  }

  // ---- USER-OWN-NAME DURING CREATOR-NAME PROBE ----
  // If bong just asked for its creator's name and the user answers with
  // "my name is X", that's the USER's name — store it, route to profile,
  // re-prompt for the creator.
  if (convo.asked === "name" && /\bmy name is\b/i.test(raw)) {
    const m = raw.match(/\bmy name is\s+([A-Za-z][A-Za-z'\-]+)/i);
    if (m) {
      const userName = m[1];
      profile.name = userName;
      saveProfile();
      applyProfile();
      return finalize(raw, info, pick([
        `oh. you are ${userName}. nice. but i was asking about my CREATOR. what's THEIR name?`,
        `${userName}? that's you. not my creator. i need their name, not yours.`,
        `i'll call you ${userName}. but i still want to know my creator's name.`
      ]));
    }
  }

  // ---- MEMORY / REFERENCE BRANCH ----
  const ref = detectReference(raw, info);
  if (ref?.type === "recall") return finalize(raw, info, recallReply(ref.ordinal));
  if (ref?.type === "repeat") {
    const r = memory.lastBotReply || "i don't remember saying anything. that's a first.";
    return finalize(raw, info, r);
  }
  if (ref?.type === "anaphora") {
    info.topic = ref.refersTo;
    info.topicWords = TOPIC[info.topic] || [];
    info._anaphora = true;
  }
  if (ref?.type === "callback") {
    info._callback = ref.refersTo;
  }

  // ---- ESCALATION BRANCH ----
  // If we asked a probe last turn, treat this message as the answer —
  // UNLESS the user is clearly asking a new question, in which case we
  // quietly drop the probe and fall through to normal handling.
  if (convo.asked) {
    const looksLikeNewQuestion =
      info.intent === "question" ||
      info._anaphora || info._callback ||
      /\?$/.test(raw) ||
      /^(what|who|why|how|when|where|which|tell me|explain|define|was|were|is|are|do|does|did|can|could|will|would|should)\b/i.test(raw.trim());
    if (looksLikeNewQuestion) {
      convo.asked = null;
    } else {
      const cat = convo.asked;
      const val = extractAnswer(raw);
      if (val) convo.knownAbout[cat] = val;
      convo.asked = null;
      let out = escalate(val);
      // chain another probe ~35% of the time (was 60% — too pushy)
      if (chance(0.35)) {
        const nextCat = nextProbeCategory();
        if (nextCat) {
          convo.asked = nextCat;
          convo.totalAsks++;
          out += " ... " + pick(CREATOR_PROBES[nextCat]);
        }
      }
      return finalize(raw, info, out);
    }
  }

  if (info.math) return finalize(raw, info, mathReply(info.math));

  // Decide the body. For substantive prompts:
  //   75% — conspiracy (curated topic, alias, last-word, or generic template)
  //   25% — actual Wikipedia summary, dumbified
  // Otherwise fall back to topic-biased babble.
  // Align the opener's "echo" with the actual resolved term so the
  // opener and body agree on what the message was about. Without this,
  // "where are the tunnels you speak of" had body on "tunnels" but an
  // opener of "speak?" (last filtered echo word).
  let body = null;
  let resolvedTerm = null;
  if (!SKIP_WIKI_INTENTS.has(info.intent)) {
    resolvedTerm = wikiTermFor(info);
    if (resolvedTerm) {
      info.echo = resolvedTerm;
      // Write resolved term back to info.topic so memory records it properly
      // (memory.lastTopic is what pronouns/anaphora fall back on).
      if (!info.topic) info.topic = resolvedTerm;
    }
  }
  if (!SKIP_WIKI_INTENTS.has(info.intent)) {
    const term = resolvedTerm;
    if (term) {
      if (hasCuratedConspiracy(term)) {
        // Sensitive real-world topics always use our curated conspiracies;
        // we never pull external content for these to avoid any real-world
        // context bleeding in next to the bot's chaos.
        body = conspiracyFor(term);
        if (body && chance(0.45)) body += " " + pick(CONSPIRACY_QUALIFIERS);
      } else {
        // Parallel fetch all the free APIs — they cache, so it's ~200-600ms
        // once per term and instant afterward. Any of them can fail silently.
        const [wiki, cn, dm, wkt, ddg] = await Promise.all([
          fetchWiki(term),
          fetchConceptNet(term),
          fetchDatamuse(term),
          fetchWiktionary(term),
          fetchDDG(term)
        ]);

        // Reasoning backbone: prefer ConceptNet when available, merge in
        // Datamuse-derived relations. Datamuse alone is usually enough since
        // ConceptNet's browser CORS is flaky.
        const groups = {};
        if (cn) for (const [k, v] of Object.entries(cn)) groups[k] = [...v];
        if (dm?.groups) {
          for (const [k, v] of Object.entries(dm.groups)) {
            if (!groups[k] || groups[k].length === 0) groups[k] = [...v];
          }
        }
        const hasReasoning = Object.values(groups).some(v => v && v.length);

        // Weighted pool of response styles. Conspiracy stays available so
        // Bong never fully abandons its character.
        const pool = [{ type: "conspiracy", weight: 2 }];
        if (hasReasoning)  pool.push({ type: "reasoning", weight: 3 });
        if (wiki?.extract) pool.push({ type: "wiki",      weight: 2 });
        if (wkt)           pool.push({ type: "dict",      weight: 1.5 });
        if (ddg)           pool.push({ type: "ddg",       weight: 1.5 });
        if (dm?.flat)      pool.push({ type: "dmbabble",  weight: 1 });

        const total = pool.reduce((s, p) => s + p.weight, 0);
        let r = Math.random() * total;
        let chosen = pool[0];
        for (const p of pool) { r -= p.weight; if (r <= 0) { chosen = p; break; } }

        switch (chosen.type) {
          case "conspiracy":
            body = conspiracyFor(term);
            if (body && chance(0.45)) body += " " + pick(CONSPIRACY_QUALIFIERS);
            break;
          case "reasoning":
            body = reasoningReply(term, groups);
            break;
          case "wiki":
            body = dumbify(wiki.extract);
            break;
          case "dict":
            body = dumbify(wkt);
            break;
          case "ddg":
            body = dumbify(ddg);
            break;
          case "dmbabble":
            body = babble(info.topicWords, dm.flat);
            break;
        }
        // if the chosen style returned nothing, fall through
        if (!body) body = conspiracyFor(term);
      }
    }
  }
  if (!body) body = babble(info.topicWords);

  let out = opener(info) + " " + body;

  // Memory acknowledgments — prepended after opener for natural flow
  if (info._anaphora) {
    out = pick([
      `still on ${info.topic}. ok.`,
      `you mean ${info.topic}.`,
      `${info.topic} again. yeah.`,
      `right. ${info.topic}.`
    ]) + " " + out;
  }
  if (info._callback) {
    out = pick([
      `${info._callback} again. we did this.`,
      `back to ${info._callback}. fine.`,
      `${info._callback}? we already covered ${info._callback}.`,
      `you keep coming back to ${info._callback}.`
    ]) + " " + out;
  }

  // dial back the bursts now that real-ish content is flowing
  if (chance(0.25)) out += " " + gibber() + "...";
  if (chance(0.45)) out += " " + pick(TAILS);

  // Light typo pass: drop a letter from one medium word ~10% of the time,
  // but never butcher a real topic word (no "estein" for "epstein" or
  // "eath" for "earth"). Keep to generic vocabulary.
  if (chance(0.10)) {
    out = out.replace(/\b([a-z]{5,})\b/i, m => {
      const low = m.toLowerCase();
      if (TOPIC[low] || CONSPIRACY_BANK[low] || ALIAS[low]) return m;
      const i = 1 + Math.floor(Math.random() * (m.length - 2));
      return m.slice(0, i) + m.slice(i + 1);
    });
  }

  // Unsolicited creator probe (~12% chance). Skip during anaphora/callback
  // so that following a topic over several turns doesn't get interrupted
  // by Bong asking random identifying questions.
  let probeFired = false;
  if (!convo.asked && info.intent !== "farewell" && !info._anaphora && !info._callback && chance(0.12)) {
    const cat = nextProbeCategory();
    if (cat) {
      convo.asked = cat;
      convo.totalAsks++;
      out += " ... " + pick(CREATOR_PROBES[cat]);
      probeFired = true;
    }
  }

  // Fixation: random unsolicited tangent into one of bong's obsessions.
  // ~12% chance, suppressed if we just fired a probe (don't pile on).
  if (!probeFired && info.intent !== "farewell" && chance(0.12)) {
    out += " " + pick(FIXATIONS);
  }

  return finalize(raw, info, out);
}

// ============================================================
// UI — sidebar + per-conversation state, persisted in localStorage.
// ============================================================

const chat = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");
const newChatBtn = document.getElementById("newChat");
const convList = document.getElementById("convList");

const STORAGE_KEY = "bong.conversations.v1";
const ACTIVE_KEY  = "bong.activeId.v1";

let conversations = [];   // [{ id, title, updatedAt, messages, convoState, memoryState }]
let activeId = null;

const defaultConvoState = () => ({ asked: null, knownAbout: {}, totalAsks: 0 });
const defaultMemoryState = () => ({ userMessages: [], topics: [], lastTopic: null, lastBotReply: null });

function loadFromStorage() {
  try {
    conversations = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    activeId = localStorage.getItem(ACTIVE_KEY) || null;
  } catch (e) {
    conversations = [];
    activeId = null;
  }
  // Ensure shapes
  for (const c of conversations) {
    c.messages = c.messages || [];
    c.convoState = c.convoState || defaultConvoState();
    c.memoryState = c.memoryState || defaultMemoryState();
  }
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
    if (activeId) localStorage.setItem(ACTIVE_KEY, activeId);
    else localStorage.removeItem(ACTIVE_KEY);
  } catch (e) { /* quota or privacy mode — ignore */ }
}

function getActive() {
  return conversations.find(c => c.id === activeId) || null;
}

function newConversation() {
  const id = "c_" + Date.now() + "_" + Math.floor(Math.random() * 9999);
  const conv = {
    id,
    title: "new chat",
    updatedAt: Date.now(),
    messages: [],
    convoState: defaultConvoState(),
    memoryState: defaultMemoryState(),
    version: "new"
  };
  conversations.unshift(conv);
  activeId = id;
  saveToStorage();
  loadActive();
  renderSidebar();
  inputEl.focus();
}

function deleteConversation(id) {
  const idx = conversations.findIndex(c => c.id === id);
  if (idx === -1) return;
  conversations.splice(idx, 1);
  if (activeId === id) activeId = conversations[0]?.id || null;
  saveToStorage();
  if (!activeId) {
    newConversation();
  } else {
    loadActive();
    renderSidebar();
  }
}

function switchTo(id) {
  persistActive();  // save outgoing state first
  activeId = id;
  saveToStorage();
  loadActive();
  renderSidebar();
}

function loadActive() {
  const c = getActive();
  chat.innerHTML = "";
  if (!c) return;

  // hydrate module-level state from conv
  convo.asked      = c.convoState.asked;
  convo.knownAbout = c.convoState.knownAbout || {};
  convo.totalAsks  = c.convoState.totalAsks || 0;
  memory.userMessages = c.memoryState.userMessages || [];
  memory.topics       = c.memoryState.topics || [];
  memory.lastTopic    = c.memoryState.lastTopic || null;
  memory.lastBotReply = c.memoryState.lastBotReply || null;

  // render messages (skipping the auto-save side effect of addMessage)
  for (const m of c.messages) {
    const extras = m.kind ? { kind: m.kind, url: m.url, urls: m.urls } : undefined;
    renderMessage(m.text, m.who, extras);
  }

  // fresh conversations get a greeting — personalized if we know the user
  if (c.messages.length === 0) {
    const nm = (typeof profile !== "undefined" && profile.name && profile.name !== "User") ? profile.name : null;
    const hello = nm
      ? pick([
          `oh. ${nm}. hi. ask me something.`,
          `hi ${nm}. i remember you. i think.`,
          `${nm}. hello again. or for the first time. i don't know.`,
          `${nm}. you're back. or new. ask something.`
        ])
      : pick([
          "oh. hi. ask me something. or don't.",
          "hello. i'm bong. let's get this over with.",
          "oh. a person. ok. go ahead.",
          "hi. ask me anything. i probably know."
        ]);
    renderMessage(hello, "bot");
    c.messages.push({ who: "bot", text: hello, at: Date.now() });
    saveToStorage();
  }
}

function persistActive() {
  const c = getActive();
  if (!c) return;
  c.convoState = {
    asked: convo.asked,
    knownAbout: convo.knownAbout,
    totalAsks: convo.totalAsks
  };
  c.memoryState = {
    userMessages: memory.userMessages,
    topics: memory.topics,
    lastTopic: memory.lastTopic,
    lastBotReply: memory.lastBotReply
  };
  c.updatedAt = Date.now();
  saveToStorage();
}

function ensureTitle(conv, firstUserMsg) {
  if (conv.title && conv.title !== "new chat") return;
  const clean = firstUserMsg.replace(/[?!.]+$/g, "").trim();
  conv.title = clean.slice(0, 36) || "untitled";
}

function renderSidebar() {
  convList.innerHTML = "";
  // sort by updatedAt desc
  const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
  for (const c of sorted) {
    const el = document.createElement("div");
    el.className = "convItem" + (c.id === activeId ? " active" : "");
    el.onclick = () => switchTo(c.id);

    const title = document.createElement("div");
    title.className = "convTitle";
    title.textContent = c.title || "new chat";

    const summary = document.createElement("div");
    summary.className = "convSummary";
    const lastMsg = c.messages[c.messages.length - 1];
    summary.textContent = lastMsg
      ? (lastMsg.who === "user" ? "you: " : "bong: ") + lastMsg.text.slice(0, 60)
      : "empty";

    const del = document.createElement("button");
    del.className = "convDelete";
    del.textContent = "×";
    del.title = "delete";
    del.onclick = (e) => {
      e.stopPropagation();
      if (confirm("delete this conversation?")) deleteConversation(c.id);
    };

    el.appendChild(title);
    el.appendChild(summary);
    el.appendChild(del);
    convList.appendChild(el);
  }
}

// renderMessage draws to DOM only — does NOT touch storage.
// addMessage wraps renderMessage and also writes to the active convo.
// extras may include: { kind: "image", url } or { kind: "collage", urls }
function renderMessage(text, who, extras) {
  const div = document.createElement("div");
  div.className = "msg " + who;

  if (extras?.kind === "image" && extras.url) {
    const loader = document.createElement("div");
    loader.className = "imgLoader";
    loader.textContent = "bong is drawing... (5 to 30 seconds, it's slow)";

    const img = document.createElement("img");
    img.className = "msgImg loading";
    img.alt = text || "image";
    // eager: lazy-load skips display:none elements, so the fetch would
    // never actually fire until the user scrolled. we want it now.
    img.loading = "eager";

    // Rotating "still drawing" messages while we wait
    const waitLines = [
      "bong is drawing... (5 to 30 seconds, it's slow)",
      "still drawing. don't rush me.",
      "my hand hurts. i don't have a hand.",
      "almost. probably.",
      "you could get coffee in the time this takes.",
      "pollinations is doing its thing. i am doing nothing."
    ];
    let wi = 0;
    const rotator = setInterval(() => {
      wi = (wi + 1) % waitLines.length;
      loader.textContent = waitLines[wi];
    }, 4000);

    img.onload = () => {
      clearInterval(rotator);
      loader.remove();
      img.classList.remove("loading");
    };
    img.onerror = () => {
      clearInterval(rotator);
      loader.textContent = "the pencil broke. i can't draw it.";
      loader.style.animation = "none";
      loader.style.background = "#fde";
      loader.style.borderColor = "#c66";
      img.remove();
    };
    img.src = extras.url;

    div.appendChild(loader);
    div.appendChild(img);
    if (text) {
      const cap = document.createElement("div");
      cap.textContent = text;
      div.appendChild(cap);
    }
  } else if (extras?.kind === "collage" && extras.urls?.length) {
    const grid = document.createElement("div");
    grid.className = "msgCollage";
    for (const u of extras.urls) {
      const img = document.createElement("img");
      img.src = u;
      img.loading = "lazy";
      img.style.transform = "rotate(" + (Math.random() * 6 - 3).toFixed(1) + "deg)";
      grid.appendChild(img);
    }
    div.appendChild(grid);
    if (text) {
      const cap = document.createElement("div");
      cap.textContent = text;
      div.appendChild(cap);
    }
  } else {
    div.textContent = text;
  }

  chat.appendChild(div);
  const clear = document.createElement("div");
  clear.style.clear = "both";
  chat.appendChild(clear);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addMessage(text, who, extras) {
  const el = renderMessage(text, who, extras);
  const c = getActive();
  if (c) {
    const m = { who, text, at: Date.now() };
    if (extras?.kind) { m.kind = extras.kind; }
    if (extras?.url)  { m.url  = extras.url;  }
    if (extras?.urls) { m.urls = extras.urls; }
    c.messages.push(m);
    c.updatedAt = Date.now();
  }
  return el;
}

function removeClearAfterLast() {
  if (chat.lastChild && chat.lastChild.style && chat.lastChild.style.clear === "both") {
    chat.removeChild(chat.lastChild);
  }
}

// Public URLs for occasional body sounds (triggered post-reply at 2%).
// Multiple candidates so if one goes stale the others can cover.
const BODY_SOUNDS = [
  "https://www.myinstants.com/media/sounds/burp.mp3",
  "https://www.myinstants.com/media/sounds/burping.mp3",
  "https://www.myinstants.com/media/sounds/fart.mp3",
  "https://www.myinstants.com/media/sounds/fart-meme.mp3",
  "https://www.myinstants.com/media/sounds/fart-with-reverb.mp3"
];

function maybeBodySound() {
  // Only when TTS is on — same "voice on" switch.
  if (typeof profile === "undefined" || profile.ttsEnabled === false) return;
  if (Math.random() > 0.02) return;
  try {
    const url = BODY_SOUNDS[Math.floor(Math.random() * BODY_SOUNDS.length)];
    const audio = new Audio(url);
    audio.volume = 0.55;
    audio.crossOrigin = "anonymous";
    audio.play().catch(() => { /* autoplay or load failed — silent */ });
  } catch (e) { /* ignore */ }
}

// All bot messages flow through here so TTS speaks them (if enabled).
function botSay(text, extras) {
  addMessage(text, "bot", extras);
  if (typeof speakBong === "function") speakBong(text);
  maybeBodySound();
}

async function handleSend() {
  const rawInput = inputEl.value.trim();
  if (!rawInput && pendingFiles.length === 0) return;

  let active = getActive();
  if (!active) { newConversation(); active = getActive(); }

  // Snapshot attachments and clear input state up front.
  const attached = [...pendingFiles];
  pendingFiles = [];
  renderFileChips();
  inputEl.value = "";

  // Build the text Bong actually processes (includes file text + image names).
  let fullText = rawInput;
  for (const f of attached) {
    if (f.isImage) fullText = "[image: " + f.name + "] " + fullText;
    else           fullText = "[from " + f.name + "]:\n" + f.text + "\n\n" + fullText;
  }
  fullText = fullText.trim();

  // Render user bubbles — images as thumbnails, then text (with file chips).
  for (const f of attached) {
    if (f.isImage) addMessage(f.name, "user", { kind: "image", url: f.dataUrl });
  }
  const textFileLabels = attached.filter(f => !f.isImage).map(f => "📎 " + f.name).join("  ");
  const displayed = [textFileLabels, rawInput].filter(Boolean).join("\n");
  if (displayed) addMessage(displayed, "user");
  ensureTitle(active, rawInput || attached[0]?.name || "untitled");
  renderSidebar();

  // ========== OLD BONG VERSION ==========
  const version = active.version || "new";
  if (version === "old") {
    const typing = renderMessage("bong is typing...", "bot");
    typing.classList.add("typing");
    await new Promise(r => setTimeout(r, 500 + Math.random() * 600));
    typing.remove();
    removeClearAfterLast();
    botSay(oldBongRespond(rawInput || (attached[0]?.name || "")));
    persistActive();
    renderSidebar();
    return;
  }

  // ========== NEW BONG — TASK INTENT (story / essay / research / paragraph / proofread) ==========
  const taskIntent = detectTaskIntent(rawInput);
  if (taskIntent) {
    taskIntent._raw = rawInput;  // preserve so contextualPrefix can reference question form
    // proofread: target text is either attached file content or text after ":"/in quotes
    if (taskIntent.mode === "proofread") {
      const textFile = attached.find(f => !f.isImage);
      if (textFile) taskIntent.targetText = textFile.text;
      else taskIntent.targetText = taskIntent.subject;
    }
    const placeholder = renderMessage("bong is writing...", "bot");
    placeholder.classList.add("msgLoading");
    try {
      const reply = await longFormRespond(taskIntent);
      placeholder.remove();
      removeClearAfterLast();
      const final = applyCustomBehavior(reply);
      addMessage(final, "bot");
      // speak only the first line (long-form would take minutes to speak)
      const firstLine = final.split("\n").find(l => l.trim()) || "";
      if (firstLine) speakBong(firstLine);
    } catch (e) {
      placeholder.remove();
      botSay("i tried to write. nothing came out. sorry.");
    }
    persistActive();
    renderSidebar();
    return;
  }

  // ========== NEW BONG — IMAGE GENERATION INTENT ==========
  if (!attached.some(f => f.isImage)) {
    const imgIntent = detectImageIntent(rawInput);
    if (imgIntent) {
      const placeholder = renderMessage("bong is drawing...", "bot");
      placeholder.classList.add("msgLoading");
      try {
        if (imgIntent.mode === "collage") {
          const urls = await collageUrls(imgIntent.subject);
          placeholder.remove();
          removeClearAfterLast();
          if (urls.length) {
            const cap = pick(COLLAGE_CAPTIONS).replace("$subject", imgIntent.subject);
            botSay(applyCustomBehavior(cap), { kind: "collage", urls });
          } else {
            botSay(applyCustomBehavior("i looked. i found nothing."));
          }
        } else {
          const url = await imageUrlFor(imgIntent.subject);
          placeholder.remove();
          removeClearAfterLast();
          const cap = pick(IMAGE_CAPTIONS).replace("$subject", imgIntent.subject);
          botSay(applyCustomBehavior(cap), { kind: "image", url });
        }
      } catch (e) {
        placeholder.remove();
        botSay(applyCustomBehavior("i tried to draw. the pencil broke. metaphorically."));
      }
      persistActive();
      renderSidebar();
      return;
    }
  }

  // ========== NEW BONG — IMAGE UPLOADED, NO TEXT ==========
  if (attached.some(f => f.isImage) && !rawInput) {
    const reaction = pick(IMAGE_REACTIONS);
    botSay(applyCustomBehavior(reaction));
    persistActive();
    renderSidebar();
    return;
  }

  // ========== NEW BONG — NORMAL TEXT RESPONSE ==========
  const typing = renderMessage("bong is typing...", "bot");
  typing.classList.add("typing");
  const minDelay = new Promise(r => setTimeout(r, 600 + Math.random() * 900));
  const [reply] = await Promise.all([respond(fullText), minDelay]);
  typing.remove();
  removeClearAfterLast();
  botSay(applyCustomBehavior(reply));
  persistActive();
  renderSidebar();
}

// TEXT-TO-SPEECH — deep voice, matching the doompraiser.html
// "DESECRATION!" / "WHAT THE HELL IS WRONG WITH YOU!?" voice
// exactly: rate 0.7, pitch 0.3, voice matching /mark|richard|guy/i.
// ============================================================
function speakBong(text) {
  if (profile.ttsEnabled === false) return;
  if (!("speechSynthesis" in window)) return;
  const t = (text || "").trim();
  if (!t) return;
  try {
    const u = new SpeechSynthesisUtterance(t);
    u.rate = 0.7;
    u.pitch = 0.3;
    u.volume = 1.0;
    const voices = speechSynthesis.getVoices();
    const deep = voices.find(v => /mark|richard|guy/i.test(v.name));
    if (deep) u.voice = deep;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch (e) { /* ignore */ }
}

// ---------- CUSTOM PROMPT → BEHAVIOR HINTS ----------
function behaviorFromPrompt() {
  const p = (profile.customPrompt || "").toLowerCase();
  if (!p) return {};
  return {
    brief:   /\b(brief|short|concise|terse|quick|fewer\s+words)\b/.test(p),
    verbose: /\b(long|verbose|detailed|thorough|elaborate|more\s+words)\b/.test(p),
    nice:    /\b(nice|polite|kind|friendly|sweet|gentle|wholesome)\b/.test(p),
    mean:    /\b(mean|harsh|rude|aggressive|insult|savage)\b/.test(p),
    sad:     /\b(sad|quiet|depress|miserable|gloomy|mope)\b/.test(p),
    happy:   /\b(happy|excited|cheer|upbeat|positive|enthus)\b/.test(p),
    formal:  /\b(formal|professional|proper|respectful)\b/.test(p),
    swear:   /\b(swear|curse|profan|vulgar)\b/.test(p)
  };
}

function applyCustomBehavior(out) {
  const b = behaviorFromPrompt();
  if (!Object.keys(b).some(k => b[k])) return out;

  if (b.brief && out.length > 50 && chance(0.6)) {
    const first = out.split(/(?<=[.!?])\s+/)[0];
    out = first || out.slice(0, 60) + "...";
  }
  if (b.nice) {
    out = out.replace(/\b(stupid|dumb|idiot|hate|suck|trash|garbage|useless|retard(ed)?)\b/gi, "silly");
  }
  if (b.happy && chance(0.5)) out += " yay.";
  if (b.sad && chance(0.5)) out += " (sigh)";
  if (b.formal && chance(0.4)) out = out.charAt(0).toUpperCase() + out.slice(1);
  if (b.mean && chance(0.35)) out += " idiot.";

  // Occasional direct reference to the user's instructions — on-brand
  // because bong doesn't fully understand what to do with them.
  if (profile.customPrompt && chance(0.05)) {
    const snippet = profile.customPrompt.slice(0, 48);
    out += ` ... you told me: "${snippet}". i'm trying.`;
  }
  return out;
}
