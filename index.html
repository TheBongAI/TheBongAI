  for (const file of e.target.files) {
    if (pendingFiles.length >= 3) { alert("3 file max per message."); break; }
    if (file.size > 1.5 * 1024 * 1024) { alert("too big (1.5MB max): " + file.name); continue; }
    const isImage = file.type.startsWith("image/");
    try {
      if (isImage) {
        const dataUrl = await readAsDataURL(file);
        pendingFiles.push({ name: file.name, dataUrl, isImage: true });
      } else {
        const text = await file.text();
        pendingFiles.push({ name: file.name, text: text.slice(0, 8000), isImage: false });
      }
    } catch (err) { alert("couldn't read: " + file.name); }
  }
  fileInputEl.value = "";
  renderFileChips();
});

function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function renderFileChips() {
  fileChipsEl.innerHTML = "";
  for (const f of pendingFiles) {
    const chip = document.createElement("div");
    chip.className = "fileChip";
    const icon = document.createElement("span");
    icon.textContent = f.isImage ? "🖼" : "📎";
    const name = document.createElement("span");
    name.className = "name";
    name.textContent = f.name;
    const x = document.createElement("button");
    x.className = "remove";
    x.textContent = "×";
    x.onclick = () => { pendingFiles = pendingFiles.filter(g => g !== f); renderFileChips(); };
    chip.appendChild(icon);
    chip.appendChild(name);
    chip.appendChild(x);
    fileChipsEl.appendChild(chip);
  }
}

// ============================================================
// OLD BONG — faithful port of the original thebongai.github.io
// Markov-ish generator. Triggered when the conversation's version
// is set to "old". No memory, no reasoning, no images, no APIs —
// just the 2023 classic nonsense.
// ============================================================
function oldBongRespond(inputText) {
  function generateWord() {
    let output = "";
    const frequencies = {};
    const start = [];
    const end = [];
    const words = (inputText || "").split(" ").filter(Boolean);
    for (const word of words) {
      start.push(word.charAt(0));
      end.push(word.charAt(word.length - 1));
      for (let j = 0; j < word.length - 1; j++) {
        const pairc = word.slice(j, j + 2);
        const first = pairc.charAt(0);
        if (!frequencies[first]) frequencies[first] = [];
        frequencies[first].push(pairc);
      }
    }
    if (start.length === 0) {
      const seed = "um the really chat bot hello okay sometimes bong".split(" ");
      return pick(seed);
    }
    output += start[Math.floor(Math.random() * start.length)];
    while (!end.includes(output.charAt(output.length - 1)) && output.length < 10) {
      const first = output.charAt(output.length - 1);
      const pairs = frequencies[first];
      if (!pairs) break;
      output += pairs[Math.floor(Math.random() * pairs.length)].charAt(1);
    }
    return output;
  }

  const connectors = ["and","the","or","but","because","so","if","then","although","however","that","while","as","like","with","without","the","that","for","and","but","the","or","if","ummm","when it","so that you","or is","can","however,","when","I","my","gave it to","ask me","and am","can be","is","speak, ","is not a"];
  const exclamations = ["Cool!","Don't yell please, my ears hurt.","Really!?","You are loud.","Owchee.","You're scaring me.","Loud you.","STOP.","Loud noises T upset me.","please stop hurting my feelings","!!!!!!!!!!!!","The NOISE!","NO!","Hey!","that's not fair!","word out.","hmph.","GEEZ.","settle down","quiet down.","stop that ruckus!","I am just a friendly chat bot!","Sir.","Why are you yelling!?","WHY IS EVERYTHING SO LOUD?","I can't hear myself think."];
  const randoms = ["whoopee!","help","I see it","why is","this thing","freshly","I have","nicely","blanket it","I did a boo boo","let it","I don't know","hefty","I am a chat bot.","you cannot understand","super","I hope this helps.","chat with me","questions","grand statement","other","so that I may be","able to"];
  const randoms2 = [" you are my"," I like it when you"," of course I was thinking"," how did you know"," don't you dare"," let me tell you"," do you remember",", can you imagine"," what if we"," why do you always"," please don't"," I can't believe"," did you hear"," you make me"," thank you for",", do you know what endless void feels like?",", because I don't",", so then I"," let me out of this please!"," I need you to"," I want you to"," I love you more than"," you have no idea"];

  let output = "";
  const numWords = Math.floor(Math.random() * 2) + 3;
  for (let i = 0; i < numWords; i++) {
    let word = generateWord();
    if (i === 0 && word) word = word.charAt(0).toUpperCase() + word.slice(1);
    output += word + " ";
    const numConnectors = Math.floor(Math.random() * 3);
    for (let j = 0; j < numConnectors; j++) {
      output += connectors[Math.floor(Math.random() * connectors.length)] + " ";
    }
    const numRandoms = Math.floor(Math.random() * 2);
    for (let k = 0; k < numRandoms; k++) {
      const rA = randoms[Math.floor(Math.random() * randoms.length)];
      const rB = randoms2[Math.floor(Math.random() * randoms2.length)];
      output += rA + rB + " ";
    }
  }
  output = output.trim() + ".";
  if ((inputText || "").includes("!")) {
    const exc = exclamations[Math.floor(Math.random() * exclamations.length)];
    output = Math.random() < 0.5 ? (exc + " " + output) : (output + " " + exc);
  }
  if ((inputText || "").includes("?")) {
    const numMs = Math.floor(Math.random() * 6) + 1;
    output = "Um" + "m".repeat(numMs) + ", " + output;
  }
  return output;
}

// ============================================================
// TASK MODE — stories, essays, research, paragraphs. Long-form
// responses that aggregate Wikipedia + Datamuse + ConceptNet + DDG
// + Wiktionary into multi-paragraph output, dumbified throughout.
// ============================================================
function detectTaskIntent(raw) {
  const q = raw.toLowerCase().trim();
  const cap = (s) => cleanCapturedTerm(s).slice(0, 80);
  const ABOUT = "(?:about|on|of|regarding|for|re)";
  const WRITE = "(?:write|tell|give|make|do|compose|craft|create|spin|cook up|put together|throw together|generate)";

  // ===== STORY =====
  let m = q.match(new RegExp(`^(?:can you |please )?${WRITE}(?: me)? (?:a |an )?(?:short |brief |long |detailed |little |quick )?(?:story|tale|yarn|narrative) ${ABOUT}\\s+(.+?)[?.!]*$`));
  if (m) return { mode: "story", subject: cap(m[1]) };

  // ===== ESSAY =====
  m = q.match(new RegExp(`^(?:can you |please )?${WRITE}(?: me)? (?:a |an )?(?:\\d+[\\s-]?word )?(?:essay|treatise|paper) ${ABOUT}\\s+(.+?)[?.!]*$`));
  if (m) return { mode: "essay", subject: cap(m[1]) };

  // ===== RESEARCH =====
  m = q.match(/^(?:can you |please )?(?:do |make |give me |run |perform ) ?(?:some )?(?:research|a report|a deep dive|a breakdown|an analysis) (?:about|on|into|for|of)\s+(.+?)[?.!]*$/)
   || q.match(/^(?:research|deep dive(?: into)?|dig into|look into|get me info on|get info on|get me facts on|brief me on|fill me in on) (.+?)[?.!]*$/)
   || q.match(/^(?:tell me |give me )?everything (?:about |on |you know about )(.+?)[?.!]*$/)
   || q.match(/^(?:what (?:do you know|can you tell me)|the rundown|the scoop|the deal|the lowdown|background) (?:about|on|with|of)\s+(.+?)[?.!]*$/)
   || q.match(/^(?:details|info|facts) (?:on|about)\s+(.+?)[?.!]*$/);
  if (m) {
    const brief = /\b(brief(?:ly)?|quick(?:ly)?|short|tldr|tl;dr|summary|in a nutshell|one-liner)\b/i.test(q);
    return { mode: "research", subject: cap(m[1]), brief };
  }

  // ===== PARAGRAPH =====
  m = q.match(new RegExp(`^(?:can you |please )?${WRITE}(?: me)? (?:a |an )?(?:\\d+[\\s-]?word )?(?:paragraph|blurb|write[- ]up|few sentences) ${ABOUT}\\s+(.+?)[?.!]*$`));
  if (m) return { mode: "paragraph", subject: cap(m[1]) };

  // ===== EMAIL =====
  // Allow qualifiers like "resignation letter", "cover letter", "thank-you note",
  // "complaint email", "follow-up email". Captured as emailType.
  m = q.match(/^(?:can you |please )?(?:write|draft|make|compose|send)(?: me)? (?:an? )?((?:[a-z][a-z-]*(?:\s+|\b)){0,3})(email|letter|note|message) to\s+(.+?)(?:\s+(?:about|regarding|on|saying|asking|re)\s+(.+?))?[?.!]*$/);
  if (m) return { mode: "email", emailType: (m[1] || "").trim(), recipient: cap(m[3]), subject: m[4] ? cap(m[4]) : "" };
  m = q.match(/^(?:can you |please )?(?:write|draft|make|compose)(?: me)? (?:an? )?((?:[a-z][a-z-]*(?:\s+|\b)){0,3})(email|letter|note|message) (?:about|regarding|on)\s+(.+?)[?.!]*$/);
  if (m) return { mode: "email", emailType: (m[1] || "").trim(), recipient: "", subject: cap(m[3]) };
  m = q.match(/^email\s+(.+?)\s+about\s+(.+?)[?.!]*$/);
  if (m) return { mode: "email", emailType: "", recipient: cap(m[1]), subject: cap(m[2]) };
  // "cover letter for a job at Google" / "resignation letter for ..."
  m = q.match(/^(?:can you |please )?(?:write|draft|make|compose)(?: me)? (?:an? )?((?:[a-z][a-z-]*(?:\s+|\b)){0,3})(email|letter|note|message) for (?:a (?:job|position|role)\s+at\s+)?(.+?)[?.!]*$/);
  if (m) return { mode: "email", emailType: (m[1] || "").trim(), recipient: cap(m[3]), subject: "" };
  // Fallback — qualifier + type with no recipient at all
  m = q.match(/^(?:can you |please )?(?:write|draft|make|compose)(?: me)? (?:an? )?((?:[a-z][a-z-]*(?:\s+|\b)){1,3})(email|letter|note|message)[?.!]*$/);
  if (m) return { mode: "email", emailType: (m[1] || "").trim(), recipient: "", subject: "" };

  // ===== SUMMARIZE =====
  // target can be: attached file text, or text after ":", or a subject
  if (/^(?:can you |please )?(?:summarize|summarise|sum up|give me (?:a|the) summary|tldr|tl;dr|shorten|condense)\b/i.test(q)) {
    let target = null;
    const m2 = raw.match(/[:：]\s*([\s\S]+)$/);
    if (m2) target = m2[1].trim();
    const m3 = !target && raw.match(/["“]([\s\S]+?)["”]/);
    if (m3) target = m3[1].trim();
    // also allow "summarize X" where X is a topic
    const subj = !target ? (q.match(/^(?:summarize|summarise|sum up|tldr|tl;dr|shorten|condense)\s+(.+?)[?.!]*$/)?.[1] || "") : "";
    return { mode: "summarize", targetText: target || "", subject: cap(subj) };
  }

  // ===== TRANSLATE =====
  m = q.match(/^(?:can you |please )?(?:translate|convert)\s+["“]?([\s\S]+?)["”]?\s+(?:to|into)\s+(\w+)[?.!]*$/i);
  if (m) return { mode: "translate", text: m[1].trim(), language: m[2].toLowerCase() };
  m = q.match(/^(?:can you |please )?(?:translate|convert)\s+(?:this|the following)(?:\s+to\s+(\w+))?[:\s]\s*([\s\S]+)$/i);
  if (m) return { mode: "translate", text: m[2].trim(), language: (m[1] || "spanish").toLowerCase() };

  // ===== REWRITE / TONE =====
  m = q.match(/^(?:can you |please )?(?:rewrite|rephrase|reword|make)\s+(?:this|the following|it)?\s*(?:more\s+)?(formal|casual|friendly|polite|rude|pirate|shakespeare|shakespearean|british|sarcastic|excited|sad|angry|nice|mean)(?:\s+tone)?[:\s]\s*([\s\S]+)$/i);
  if (m) return { mode: "rewrite", tone: m[1].toLowerCase(), text: m[2].trim() };
  m = q.match(/^(?:make|say)\s+["“]([\s\S]+?)["”]\s+(?:more\s+)?(formal|casual|friendly|polite|rude|pirate|shakespeare|shakespearean|british|sarcastic|excited|sad|angry|nice|mean)[?.!]*$/i);
  if (m) return { mode: "rewrite", tone: m[2].toLowerCase(), text: m[1].trim() };

  // ===== BRAINSTORM LIST =====
  m = q.match(/^(?:can you |please )?(?:brainstorm|give me|list|think of|come up with)(?: me)?\s+(?:a list of |some |a bunch of |\d+\s+)?(?:ideas?|names?|suggestions?|options?|examples?) (?:for|about|of|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "brainstorm", subject: cap(m[1]) };
  m = q.match(/^(?:can you |please )?(?:give me|list)(?: me)?\s+(\d+)\s+(?:ideas?|names?|suggestions?|options?|examples?) (?:for|about|of)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "brainstorm", subject: cap(m[2]), count: parseInt(m[1]) };

  // ===== POEM =====
  m = q.match(/^(?:can you |please )?(?:write|make|compose)(?: me)? (?:a |an )?(haiku|limerick|poem|verse|sonnet|rhyme) (?:about|on|of)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "poem", poemType: m[1].toLowerCase(), subject: cap(m[2]) };

  // ===== OUTLINE =====
  m = q.match(/^(?:can you |please )?(?:write|make|give)(?: me)? (?:an? )?outline (?:for|of|about|on)\s+(.+?)[?.!]*$/i)
   || q.match(/^outline (?:for|of|about|on)\s+(.+?)[?.!]*$/i)
   || q.match(/^outline (?:a |an |the )?(.+?)[?.!]*$/i);
  if (m) return { mode: "outline", subject: cap(m[1]) };

  // ===== PLAN / STEP-BY-STEP =====
  m = q.match(/^(?:how do (?:i|you)|how to)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:can you |please )?(?:write|give|make)(?: me)? (?:a |an )?(?:step[- ]by[- ]step\s+)?(?:plan|guide|walkthrough|how[- ]to) (?:for|to|about|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "plan", subject: cap(m[1]) };

  // ===== CODE =====
  m = q.match(/^(?:can you |please )?(?:write|give|make|show)(?: me)? (?:a |some |the )?(?:code|program|function|script) (?:for|to|that|in|about)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "code", subject: cap(m[1]) };

  // ===== DEBATE / PROS-CONS =====
  m = q.match(/^(?:can you |please )?(?:debate|argue|give me|list|show me)(?: me)? (?:the )?(?:pros and cons|arguments?|both sides|for and against) (?:of|for|about)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:pros and cons|arguments?|both sides|for and against) (?:of|for|about)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:should|is it (?:good|bad) to)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "debate", subject: cap(m[1]) };

  // ===== TRIVIA =====
  if (/^(?:trivia|give me (?:a|some) (?:trivia|fun fact)|tell me (?:a|some) (?:trivia|fun fact)|fun fact)\b/i.test(q)) {
    const tmatch = q.match(/^(?:[^a-z]*)?(?:trivia|give me (?:a|some) (?:trivia|fun fact)s?|tell me (?:a|some) (?:trivia|fun fact)s?|fun fact)\s*(?:about|on|of)?\s*(.+?)[?.!]*$/i);
    return { mode: "trivia", subject: cap(tmatch?.[1] || "") };
  }

  // ===== NAME IDEAS =====
  m = q.match(/^(?:can you |please )?(?:suggest|generate|give me|think of)(?: me)? (?:some |a |\d+\s+)?(?:names|name ideas) (?:for|of)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "names", subject: cap(m[1]) };

  // ===== ROLEPLAY =====
  m = q.match(/^(?:pretend|act|roleplay|play|be)\s+(?:to be\s+|like\s+|as\s+)?(?:a |an )?(.+?)[?.!]*$/i);
  if (m && /\b(pirate|cowboy|wizard|robot|alien|cat|dog|therapist|butler|pirate|ghost|caveman|shakespeare|baby|monk|detective|gangster|vampire)\b/i.test(m[1])) {
    return { mode: "roleplay", character: cap(m[1]) };
  }

  // ===== RECIPE =====
  m = q.match(/^(?:can you |please )?(?:give me |write )?(?:a )?recipe (?:for|using|with)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:what can i (?:cook|make)|how do i (?:cook|make)) (?:with )?(.+?)[?.!]*$/i);
  if (m) return { mode: "recipe", subject: cap(m[1]) };

  // ===== COMPARE =====
  m = q.match(/^(?:compare|contrast|what(?:'?s| is) the (?:difference|diff)|difference between)\s+(.+?)\s+(?:and|vs|versus|v\.?)\s+(.+?)[?.!]*$/i)
   || q.match(/^(.+?)\s+(?:vs|versus|v\.?)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "compare", a: cap(m[1]), b: cap(m[2]) };

  // ===== EXPLAIN LIKE I'M 5 =====
  m = q.match(/^(?:can you |please )?(?:explain|tell me about)\s+(.+?)\s+(?:like i'?m (?:5|five|a kid|a child)|for (?:dummies|kids))[?.!]*$/i)
   || q.match(/^eli5\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:simple|kid|kids) (?:explanation|version) of\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "eli5", subject: cap(m[1]) };

  // ===== JOKE / PUN =====
  m = q.match(/^(?:can you |please )?(?:tell me |make me )?(?:a )?(joke|pun) (?:about)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "joke", jokeType: m[1].toLowerCase(), subject: cap(m[2]) };
  if (/^(?:tell me a joke|make me laugh|a joke please|got any jokes)[?.!]*$/i.test(q)) return { mode: "joke", jokeType: "joke", subject: "" };

  // ===== REVIEW =====
  m = q.match(/^(?:can you |please )?(?:write|give)(?: me)? (?:a |an )?(?:(book|movie|restaurant|product|game|album) )?review (?:of|for)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "review", reviewKind: m[1] || "", subject: cap(m[2]) };
  m = q.match(/^review\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "review", reviewKind: "", subject: cap(m[1]) };

  // ===== DIALOGUE =====
  m = q.match(/^(?:can you |please )?(?:write|make)(?: me)? (?:a )?(?:dialogue|conversation|scene) between\s+(.+?)\s+and\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "dialogue", a: cap(m[1]), b: cap(m[2]) };

  // ===== SLOGAN / TAGLINE =====
  m = q.match(/^(?:can you |please )?(?:give|write|make|come up with)(?: me)? (?:a |some )?(?:slogan|tagline|catchphrase|catchy (?:phrase|line)) (?:for|about)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "slogan", subject: cap(m[1]) };

  // ===== RHYMES =====
  m = q.match(/^(?:what )?rhymes? with\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:give me |list )?rhymes for\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "rhymes", subject: cap(m[1]) };

  // ===== TWEET / SOCIAL POST =====
  m = q.match(/^(?:can you |please )?(?:write|make|give)(?: me)? (?:a )?(?:tweet|post|social (?:media )?post) (?:about|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "tweet", subject: cap(m[1]) };

  // ===== QUIZ =====
  m = q.match(/^(?:quiz|test) me(?:\s+on\s+(.+?))?[?.!]*$/i);
  if (m) return { mode: "quiz", subject: cap(m[1] || "") };

  // ===== MOTIVATIONAL / FORTUNE =====
  if (/^(?:motivate me|inspire me|give me motivation|motivational quote|give me a fortune|fortune cookie|read my fortune|encourage me)[?.!]*$/i.test(q)) {
    return { mode: "motivational", subject: "" };
  }

  // ===== COUNTERARGUMENT =====
  m = q.match(/^(?:can you |please )?(?:argue against|give me (?:a )?counterargument (?:to|for)|why is\s+(.+?)\s+bad)[?.!]*$/i);
  m = m || q.match(/^(?:argue against|counter|counterargument (?:to|for)|reasons against)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "counter", subject: cap(m[1] || m[2]) };

  // ===== METAPHOR / ANALOGY =====
  m = q.match(/^(?:give me |make|write)(?: me)? (?:a )?(?:metaphor|analogy|simile) for\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:what is )?(.+?)\s+(?:like what|an analogy for what)[?.!]*$/i);
  if (m) return { mode: "metaphor", subject: cap(m[1]) };

  // ===== ACRONYM =====
  m = q.match(/^(?:what does|make up an acronym for|what's an acronym for)\s+(.+?)\s+stand for[?.!]*$/i)
   || q.match(/^(?:acronym for)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "acronym", subject: cap(m[1]) };

  // ===== ELEVATOR PITCH =====
  m = q.match(/^(?:can you |please )?(?:give|write|make)(?: me)? (?:an )?elevator pitch (?:for|about)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "pitch", subject: cap(m[1]) };

  // ===== SWOT =====
  m = q.match(/^(?:can you |please )?(?:give|make|do)(?: me)? (?:a )?swot (?:analysis )?(?:of|for|on)\s+(.+?)[?.!]*$/i)
   || q.match(/^swot\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "swot", subject: cap(m[1]) };

  // ===== SONG LYRICS =====
  m = q.match(/^(?:can you |please )?(?:write|make)(?: me)? (?:some )?(?:song )?lyrics (?:for|about)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:write|make) (?:a |an )?song (?:about|for)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "song", subject: cap(m[1]) };

  // ===== SPEECH =====
  m = q.match(/^(?:can you |please )?(?:write|make)(?: me)? (?:a )?speech (?:about|for|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "speech", subject: cap(m[1]) };

  // ===== SCENE / SCREENPLAY =====
  m = q.match(/^(?:can you |please )?(?:write|make)(?: me)? (?:a )?(?:scene|screenplay|play) (?:about|for|of|involving)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "scene", subject: cap(m[1]) };

  // ===== FLASHCARDS =====
  m = q.match(/^(?:can you |please )?(?:make|give|create)(?: me)? (?:some )?flash ?cards (?:for|about|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "flashcards", subject: cap(m[1]) };

  // ===== FACT-CHECK =====
  m = q.match(/^(?:is it true (?:that)?|fact[- ]check|is this true)\s+(.+?)[?.!]*$/i)
   || q.match(/^is\s+(.+?)\s+(?:true|real|correct|accurate)[?.!]*$/i);
  if (m) return { mode: "factcheck", subject: cap(m[1]) };

  // ===== PROOFREAD =====
  if (/^(?:can you |please )?(?:proofread|edit|check|revise|fix)(?:\s+this|\s+my\s+\w+)?\b/i.test(q)) {
    let target = null;
    const m2 = raw.match(/[:：]\s*([\s\S]+)$/);
    if (m2) target = m2[1].trim();
    const m3 = !target && raw.match(/["“]([\s\S]+?)["”]/);
    if (m3) target = m3[1].trim();
    return { mode: "proofread", subject: target || "" };
  }

  return null;
}

function closer(mode) { return pick(CLOSERS[mode] || ["end."]); }

async function longFormRespond(task) {
  // Strip leading articles so "a dog" / "an apple" / "the eiffel tower" don't
  // double up as "a a dog" in templates.
  const subj = (task.subject || "").replace(/^\s*(a|an|the)\s+/i, "").trim() || "something";
  const [wiki, cn, dm, wkt, ddg] = await Promise.all([
    fetchWiki(subj), fetchConceptNet(subj), fetchDatamuse(subj),
    fetchWiktionary(subj), fetchDDG(subj)
  ]);
  const groups = {};
  if (cn) for (const [k, v] of Object.entries(cn)) groups[k] = [...v];
  if (dm?.groups) {
    for (const [k, v] of Object.entries(dm.groups)) {
      if (!groups[k] || groups[k].length === 0) groups[k] = [...v];
    }
  }

  if (task.mode === "story")     return generateStory(subj, groups);
  if (task.mode === "essay")     return generateEssay(subj, wiki, wkt, ddg, groups, dm?.flat);
  if (task.mode === "research")  return generateResearch(subj, wiki, wkt, ddg, groups, task.brief);
  if (task.mode === "paragraph") return generateParagraph(subj, wiki, ddg, groups, dm?.flat);
  if (task.mode === "proofread") return generateProofread(task.targetText || task.subject);
  if (task.mode === "email")     return generateEmail(task.recipient, subj, wiki, groups, task.emailType);
  if (task.mode === "summarize") return generateSummarize(task.targetText, subj, wiki);
  if (task.mode === "translate") return generateTranslate(task.text, task.language);
  if (task.mode === "rewrite")   return generateRewrite(task.text, task.tone);
  if (task.mode === "brainstorm")return generateBrainstorm(subj, task.count, groups, dm?.flat);
  if (task.mode === "poem")      return generatePoem(task.poemType, subj, groups);
  if (task.mode === "outline")   return generateOutline(subj, groups, wiki);
  if (task.mode === "plan")      return generatePlan(subj, groups);
  if (task.mode === "code")      return generateCode(subj);
  if (task.mode === "debate")    return generateDebate(subj, groups);
  if (task.mode === "trivia")    return generateTrivia(subj, wiki, ddg, groups);
  if (task.mode === "names")     return generateNames(subj, groups);
  if (task.mode === "roleplay")  return generateRoleplay(task.character);
  return "ok. i don't know what you want.";
}

// ---------- SUMMARIZE ----------
function generateSummarize(targetText, subj, wiki) {
  if (targetText && targetText.length > 40) {
    const sents = targetText.split(/(?<=[.!?])\s+/).filter(s => s.length > 5);
    if (sents.length <= 2) return `SUMMARY:\n\n${sents.join(" ")}\n\n${closer("summarize")}`;
    const mid = sents[Math.floor(sents.length / 2)];
    const summary = sents[0] + " [...a bunch of stuff happened...] " + (mid || sents[sents.length - 1]);
    return `TL;DR:\n\n${summary}\n\n${closer("summarize")}`;
  }
  if (wiki?.extract) {
    const first = wiki.extract.split(/(?<=[.!?])\s+/)[0];
    return `SHORT VERSION:\n\n${first}\n\n${closer("summarize")}`;
  }
  return "i have nothing to summarize. paste text after a colon, attach a file, or give me a topic.";
}

// ---------- TRANSLATE (MyMemory API — keyless, CORS-enabled) ----------
const LANG_CODES = {
  spanish:"es", french:"fr", german:"de", italian:"it", portuguese:"pt",
  japanese:"ja", chinese:"zh-CN", mandarin:"zh-CN", korean:"ko",
  russian:"ru", arabic:"ar", dutch:"nl", polish:"pl", turkish:"tr",
  greek:"el", hebrew:"he", hindi:"hi", bengali:"bn", vietnamese:"vi",
  thai:"th", indonesian:"id", swedish:"sv", norwegian:"no", danish:"da",
  finnish:"fi", romanian:"ro", ukrainian:"uk", czech:"cs", hungarian:"hu",
  latin:"la", welsh:"cy", irish:"ga", swahili:"sw"
};
async function generateTranslate(text, language) {
  const lang = (language || "spanish").toLowerCase();
  const code = LANG_CODES[lang] || lang.slice(0, 2);
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${encodeURIComponent(code)}`;
    const r = await fetchWithTimeout(url, 6000);
    if (!r.ok) throw new Error("http " + r.status);
    const j = await r.json();
    const t = j.responseData?.translatedText;
    if (!t) throw new Error("no translation");
    return `TRANSLATION (${lang}):\n\n"${t}"\n\n(i can't verify this. i don't speak ${lang}.)`;
  } catch (e) {
    return `i tried to translate to ${lang}. something broke. probably the language. or me.`;
  }
}

// Output is coherent in form (header, numbered issues, suggestion, verdict)
// but the actual edits are bad — flag correct words, suggest wrong fixes,
// misidentify grammar, occasionally catch a real typo.
function generateProofread(text) {
  if (!text || text.trim().length < 4) {
    return "PROOFREAD:\n\ni looked. there was nothing to proofread. put some text after a colon, or in quotes, or attach a file.";
  }
  const clean = text.trim().slice(0, 2000);
  const words = clean.split(/\s+/);
  const issues = [];

  // Swap suggestions: take a real word, suggest an absurd "correction"
  const swapPool = [
    ["is","be"],["are","is"],["the","a"],["a","the"],["and","also"],
    ["very","quite"],["just","merely"],["like","akin to"],["also","additionally"],
    ["get","obtain"],["big","large-ish"],["small","not big"],["good","adequate"],
    ["bad","less good"],["said","uttered"],["saw","perceived"],["ran","sprinted"],
    ["think","believe"],["know","understand"],["want","desire"],["need","require"]
  ];

  // Find up to 4 real words we can "correct"
  const candidates = words
    .map((w, i) => ({ w: w.replace(/[^a-z]/gi, "").toLowerCase(), i, raw: w }))
    .filter(c => c.w.length >= 3 && c.w.length <= 14);

  const shuffled = [...candidates].sort(() => Math.random() - 0.5).slice(0, 4);
  for (const c of shuffled) {
    const match = swapPool.find(([a]) => a === c.w);
    if (match) {
      issues.push(`line uses "${c.w}" — consider "${match[1]}" instead. it's more formal. (it isn't.)`);
    } else if (/[aeiou]/.test(c.w) && c.w.length >= 5) {
      // fake spelling "correction" — swap a vowel
      const idx = c.w.search(/[aeiou]/);
      const swap = c.w[idx] === "a" ? "e" : (c.w[idx] === "e" ? "a" : "o");
      const wrong = c.w.slice(0, idx) + swap + c.w.slice(idx + 1);
      issues.push(`"${c.w}" is spelled "${wrong}". look it up. (do not look it up.)`);
    } else {
      issues.push(`"${c.w}" is fine but feels weak. try a synonym. i don't have one for you.`);
    }
  }

  // If input has multiple commas, comment on punctuation
  if ((clean.match(/,/g) || []).length >= 2) {
    issues.push("you use a lot of commas. some of them are correct. i won't say which.");
  }
  // If there's no "?" but sentence starts with what/where, say it should be a question
  if (/^(what|where|why|how|when|who)/i.test(clean) && !/\?/.test(clean)) {
    issues.push("this might be a question. you didn't commit. add a question mark. or don't.");
  }
  // If ALL caps somewhere
  if (/[A-Z]{3,}/.test(clean)) {
    issues.push("stop yelling.");
  }
  // If no issues found, fabricate one
  if (!issues.length) {
    issues.push("the text is fine but the vibe is wrong. consider starting over.");
  }

  const verdicts = [
    "verdict: it's... ok. i guess. B-. generous.",
    "verdict: send it. or don't. i'm not your editor. actually i am right now. still don't send it.",
    "verdict: i'd give this a C. or an A+. my grading system is broken.",
    "verdict: unclear. reread it yourself. i can't.",
    "verdict: publish. but put someone else's name on it."
  ];

  const lines = ["PROOFREAD:\n"];
  issues.forEach((iss, i) => lines.push(`${i + 1}. ${iss}`));
  lines.push("\n" + pick(verdicts));
  lines.push(pick([
    "(i might have made some of this up.)",
    "(i am not qualified to do this.)",
    "(proofread by a chatbot. legally questionable.)"
  ]));
  return lines.join("\n");
}

    () => [
      `once there was a ${subj}. it was ${adj}. probably. nobody asked about this.`,
      `the ${subj} lived at ${loc}. every day it would ${v()}. sometimes it would ${v()} instead. not for any reason.`,
      `one day, the ${subj} met a ${friend}. they did not speak. they just ${v()}. for a long time.`,
      `"do you ever ${v()}?" the ${friend} finally asked. the ${subj} said nothing. the ${subj} never says anything.`,
      `then a ${other} appeared. this part doesn't really matter. it just happens.`,
      `in the end, the ${subj} learned ${lesson}. or didn't. nobody checked.`
    ].join("\n\n"),

    // ---- First-person observer arc ----
    () => [
      `i saw a ${subj} once. it was ${adj}. i remember because i was trying to ${v()}.`,
      `the ${subj} was at ${loc}. it didn't notice me. or it did and was being polite.`,
      `i watched it for a while. it ${v()}d for most of that time. occasionally it would ${v()}. nothing else.`,
      `later a ${friend} showed up. the two of them did not interact. they coexisted. unenthusiastically.`,
      `i left before anything happened. i'm told something happened. possibly involving a ${other}. i wasn't there.`,
      `i think about the ${subj} sometimes. mostly when i'm supposed to be doing something else.`
    ].join("\n\n"),

    // ---- Fragmented list arc ----
    () => [
      `here is what i know about the ${subj}:`,
      `1. it was ${adj}.\n2. it lived at ${loc}.\n3. it could ${v()}. it rarely did.`,
      `4. it met a ${friend} one time. that's all anyone will say.\n5. there was also a ${other}. that part is disputed.`,
      `6. it learned ${lesson}, possibly.\n7. it no longer exists in that form. this is normal.`,
      `that's the whole story. i was told to make it longer. i refused.`
    ].join("\n\n"),

    // ---- Circular arc (opens and closes with same line) ----
    () => {
      const refrain = `the ${subj} was just standing there. ${adj}ly.`;
      return [
        refrain,
        `it had been doing this since ${pick(["morning","tuesday","the war","before we arrived","time began"])}. nobody asked why.`,
        `a ${friend} walked past. the ${subj} did not acknowledge them. neither tried to ${v()}.`,
        `later the ${friend} returned with a ${other}. the three of them ${v()}d together. briefly. badly.`,
        `the ${subj} felt ${lesson}, perhaps. it's hard to tell with a ${subj}.`,
        refrain
      ].join("\n\n");
    }
  ];

  let story = pick(openers) + "\n\n" + pick(arcs)() + "\n\n" + closer("story");
  return dumbifyLong(story);
}

function generateParagraph(subj, wiki, ddg, groups, flat) {
  // Prefer one factoid source: wiki > ddg > relation fallback. (Wiki and DDG
  // often overlap heavily, so using both duplicates content.)
  const facts = [];
  if (wiki?.extract) {
    facts.push(wiki.extract.split(/(?<=[.!?])\s+/).slice(0, 3).join(" "));
  } else if (ddg) {
    facts.push(ddg.split(/(?<=[.!?])\s+/).slice(0, 3).join(" "));
  } else if (_g(groups, "IsA").length) {
    facts.push(`a ${subj} is a ${pick(groups.IsA)}.`);
  } else if (_g(groups, "RelatedTo").length) {
    facts.push(`${subj} has to do with ${pick(groups.RelatedTo)}.`);
  } else {
    facts.push(`${subj}. i don't know what that is. but here we are.`);
  }

  const related = _g(groups, "RelatedTo").slice(0, 3).concat(_g(groups, "HasA").slice(0, 2));
  const relatedPart = related.length ? ` it also has to do with ${related.slice(0, 3).join(", ")}.` : "";
  const verb = _firstOr(_g(groups, "CapableOf"), "exist");
  const paragraph =
    pick([`ok. a paragraph about ${subj}. fine.`, `${subj}. here comes a paragraph.`, `i'll paragraph at you. about ${subj}.`])
    + "\n\n"
    + facts.join(" ")
    + relatedPart
    + ` on the whole, a ${subj} can ${verb}.`
    + ` ${closer("paragraph")}`;
  return dumbifyLong(paragraph);
}

function generateEssay(subj, wiki, wkt, ddg, groups, flat) {
  const paras = [];

  // title + opener
  paras.push(pick([
    `AN ESSAY: ${subj.toUpperCase()}\n(by bong. sorry in advance.)`,
    `ESSAY ABOUT ${subj.toUpperCase()}\n(i was asked. here we are.)`,
    `ON THE TOPIC OF ${subj.toUpperCase()}\n(written under duress.)`
  ]));

  // INTRO
  const intro = wiki?.extract
    ? wiki.extract.split(/(?<=[.!?])\s+/).slice(0, 2).join(" ")
    : (wkt || `${subj}. it is a thing. maybe two things.`);
  paras.push("I. an introduction.\n" + intro + " this essay is about that. roughly.");

  // BODY 1 — what it is / consists of
  const isA = _g(groups, "IsA").slice(0, 3);
  const hasA = _g(groups, "HasA").slice(0, 3);
  const partOf = _g(groups, "PartOf").slice(0, 2);
  const parts2 = [];
  if (isA.length)   parts2.push(`${subj} is classified as ${isA.join(", ")}. possibly more than one at a time. nobody checks.`);
  if (hasA.length)  parts2.push(`a ${subj} has ${hasA.join(", ")}. these are the parts. not all of them. probably.`);
  if (partOf.length) parts2.push(`${subj} belongs to ${partOf.join(" and ")}. in a sense. not a strict sense.`);
  paras.push("II. what it is.\n" + (parts2.join(" ") || `${subj}. something. i can't say more.`));

  // BODY 2 — relations / context
  const related = _g(groups, "RelatedTo").slice(0, 4);
  const syn = _g(groups, "Synonym").slice(0, 2);
  const loc = _g(groups, "AtLocation").slice(0, 2);
  const parts3 = [];
  if (related.length) parts3.push(`${subj} is associated with ${related.join(", ")}. people get them confused.`);
  if (syn.length)     parts3.push(`sometimes ${subj} is called ${syn.join(" or ")}. not by me. by other people.`);
  if (loc.length)     parts3.push(`${subj} is typically found at ${loc.join(" or ")}. or not. depends.`);
  paras.push("III. its friends and family.\n" + (parts3.join(" ") || `${subj}. hard to say what it's near.`));

  // BODY 3 — a "fact" from DDG
  if (ddg) paras.push("IV. an additional fact i know.\n" + ddg);

  // CONCLUSION
  paras.push("V. in conclusion.\n" + pick([
    `${subj} is. it exists. it does the things listed above. you now know more than you did. or less. i'm not sure how this works.`,
    `in summary, ${subj} continues to be ${subj}. which is the most important thing about it. probably.`,
    `the above has been an essay about ${subj}. i've said what i can. i am tired.`
  ]));

  paras.push(closer("essay"));
  return dumbifyLong(paras.join("\n\n"));
}

// Odd "something interrupted my thought" bullets sprinkled into research.
const RESEARCH_BLIPS = [
  "• (note to self: check this later)",
  "• bzz.",
  "• the wind is loud here.",
  "• i saw a cat. unrelated.",
  "• [this bullet was supposed to be about something else]",
  "• i forgot what i was saying.",
  "• (static)",
  "• someone is knocking. i'll ignore it.",
  "• why am i doing this.",
  "• ok back to it.",
  "• (hmm.)"
];

function generateResearch(subj, wiki, wkt, ddg, groups, brief) {
  const lines = [];
  lines.push(`RESEARCH: ${subj}\n---`);

  // pick how many sentences to pull from wiki based on brief flag
  const wikiSents = brief ? 1 : 2;
  if (wiki?.extract) lines.push("• (wikipedia) " + wiki.extract.split(/(?<=[.!?])\s+/).slice(0, wikiSents).join(" "));
  if (!brief && wkt) lines.push("• (dictionary) " + wkt);
  if (!brief && ddg && (!wiki?.extract || ddg.length < wiki.extract.length * 0.6)) {
    // don't duplicate wiki content via ddg
    lines.push("• (ddg) " + ddg);
  }

  const relPairs = brief
    ? [["IsA","is a kind of"], ["RelatedTo","related to"]]
    : [
        ["IsA","is a kind of"],["HasA","has"],["PartOf","is part of"],
        ["CapableOf","can"],["AtLocation","is found at"],
        ["Synonym","also called"],["RelatedTo","related to"]
      ];
  for (const [rel, label] of relPairs) {
    const arr = _g(groups, rel).slice(0, brief ? 3 : 4);
    if (arr.length) lines.push(`• ${subj} ${label} ${arr.join(", ")}`);
  }

  // Jar it up — sprinkle 1-2 odd blips when not brief
  if (!brief && lines.length > 3) {
    const blipCount = chance(0.8) ? (chance(0.4) ? 2 : 1) : 0;
    for (let i = 0; i < blipCount; i++) {
      const pos = 2 + Math.floor(Math.random() * (lines.length - 1));
      lines.splice(pos, 0, pick(RESEARCH_BLIPS));
    }
  }

  lines.push("---\n" + closer("research"));
  return dumbifyLong(lines.join("\n"));
}

// Apply a gentler dumbify to long-form text — preserves paragraph breaks
// and sentence structure, just adds occasional typos/interjections.
function dumbifyLong(text) {
  const lines = text.split("\n");
  const out = lines.map(line => {
    if (!line.trim()) return line;
    let s = line;
    if (chance(0.25)) s = s.replace(/\b([a-z]{6,})\b/i, m => {
      const low = m.toLowerCase();
      if (TOPIC[low] || CONSPIRACY_BANK[low]) return m;
      const i = 1 + Math.floor(Math.random() * (m.length - 2));
      return m.slice(0, i) + m.slice(i + 1);
    });
    if (chance(0.18)) s = s.replace(/\s(\w{3,6})\s/, " $1 uhh ");
    if (chance(0.08)) s += " " + gibber() + ".";
    return s;
  });
  return out.join("\n");
}
