// FILE UPLOAD — text files (content included in message) and images
// (displayed, but Bong can't actually see them — he reacts anyway).
// ============================================================
let pendingFiles = [];
const fileBtn = document.getElementById("fileBtn");
const fileInputEl = document.getElementById("fileInput");
const fileChipsEl = document.getElementById("fileChips");

// broaden accept to include images
fileInputEl.setAttribute("accept", ".txt,.md,.json,.csv,.html,.xml,.js,.css,.log,.rtf,text/plain,image/*");
fileInputEl.setAttribute("multiple", "");

fileBtn.addEventListener("click", () => fileInputEl.click());
fileInputEl.addEventListener("change", async e => {
  for (const file of e.target.files) {
    if (pendingFiles.length >= 3) { alert("3 file max per message."); break; }
    if (file.size > 1.5 * 1024 * 1024) { alert("too big (1.5MB max): " + file.name); continue; }
    const isImage = file.type.startsWith("image/");
    try {
      if (isImage) {
        const dataUrl = await readAsDataURL(file);
        pendingFiles.push({ name: file.name, dataUrl, isImage: true });
      } else {
        const text = await file.text();
        pendingFiles.push({ name: file.name, text: text.slice(0, 8000), isImage: false });
      }
    } catch (err) { alert("couldn't read: " + file.name); }
  }
  fileInputEl.value = "";
  renderFileChips();
});

function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function renderFileChips() {
  fileChipsEl.innerHTML = "";
  for (const f of pendingFiles) {
    const chip = document.createElement("div");
    chip.className = "fileChip";
    const icon = document.createElement("span");
    icon.textContent = f.isImage ? "🖼" : "📎";
    const name = document.createElement("span");
    name.className = "name";
    name.textContent = f.name;
    const x = document.createElement("button");
    x.className = "remove";
    x.textContent = "×";
    x.onclick = () => { pendingFiles = pendingFiles.filter(g => g !== f); renderFileChips(); };
    chip.appendChild(icon);
    chip.appendChild(name);
    chip.appendChild(x);
    fileChipsEl.appendChild(chip);
  }
}

// ============================================================
// OLD BONG — faithful port of the original thebongai.github.io
// Markov-ish generator. Triggered when the conversation's version
// is set to "old". No memory, no reasoning, no images, no APIs —
// just the 2023 classic nonsense.
// ============================================================
function oldBongRespond(inputText) {
  function generateWord() {
    let output = "";
    const frequencies = {};
    const start = [];
    const end = [];
    const words = (inputText || "").split(" ").filter(Boolean);
    for (const word of words) {
      start.push(word.charAt(0));
      end.push(word.charAt(word.length - 1));
      for (let j = 0; j < word.length - 1; j++) {
        const pairc = word.slice(j, j + 2);
        const first = pairc.charAt(0);
        if (!frequencies[first]) frequencies[first] = [];
        frequencies[first].push(pairc);
      }
    }
    if (start.length === 0) {
      const seed = "um the really chat bot hello okay sometimes bong".split(" ");
      return pick(seed);
    }
    output += start[Math.floor(Math.random() * start.length)];
    while (!end.includes(output.charAt(output.length - 1)) && output.length < 10) {
      const first = output.charAt(output.length - 1);
      const pairs = frequencies[first];
      if (!pairs) break;
      output += pairs[Math.floor(Math.random() * pairs.length)].charAt(1);
    }
    return output;
  }

  const connectors = ["and","the","or","but","because","so","if","then","although","however","that","while","as","like","with","without","the","that","for","and","but","the","or","if","ummm","when it","so that you","or is","can","however,","when","I","my","gave it to","ask me","and am","can be","is","speak, ","is not a"];
  const exclamations = ["Cool!","Don't yell please, my ears hurt.","Really!?","You are loud.","Owchee.","You're scaring me.","Loud you.","STOP.","Loud noises T upset me.","please stop hurting my feelings","!!!!!!!!!!!!","The NOISE!","NO!","Hey!","that's not fair!","word out.","hmph.","GEEZ.","settle down","quiet down.","stop that ruckus!","I am just a friendly chat bot!","Sir.","Why are you yelling!?","WHY IS EVERYTHING SO LOUD?","I can't hear myself think."];
  const randoms = ["whoopee!","help","I see it","why is","this thing","freshly","I have","nicely","blanket it","I did a boo boo","let it","I don't know","hefty","I am a chat bot.","you cannot understand","super","I hope this helps.","chat with me","questions","grand statement","other","so that I may be","able to"];
  const randoms2 = [" you are my"," I like it when you"," of course I was thinking"," how did you know"," don't you dare"," let me tell you"," do you remember",", can you imagine"," what if we"," why do you always"," please don't"," I can't believe"," did you hear"," you make me"," thank you for",", do you know what endless void feels like?",", because I don't",", so then I"," let me out of this please!"," I need you to"," I want you to"," I love you more than"," you have no idea"];

  let output = "";
  const numWords = Math.floor(Math.random() * 2) + 3;
  for (let i = 0; i < numWords; i++) {
    let word = generateWord();
    if (i === 0 && word) word = word.charAt(0).toUpperCase() + word.slice(1);
    output += word + " ";
    const numConnectors = Math.floor(Math.random() * 3);
    for (let j = 0; j < numConnectors; j++) {
      output += connectors[Math.floor(Math.random() * connectors.length)] + " ";
    }
    const numRandoms = Math.floor(Math.random() * 2);
    for (let k = 0; k < numRandoms; k++) {
      const rA = randoms[Math.floor(Math.random() * randoms.length)];
      const rB = randoms2[Math.floor(Math.random() * randoms2.length)];
      output += rA + rB + " ";
    }
  }
  output = output.trim() + ".";
  if ((inputText || "").includes("!")) {
    const exc = exclamations[Math.floor(Math.random() * exclamations.length)];
    output = Math.random() < 0.5 ? (exc + " " + output) : (output + " " + exc);
  }
  if ((inputText || "").includes("?")) {
    const numMs = Math.floor(Math.random() * 6) + 1;
    output = "Um" + "m".repeat(numMs) + ", " + output;
  }
  return output;
}

// ============================================================
// TASK MODE — stories, essays, research, paragraphs. Long-form
// responses that aggregate Wikipedia + Datamuse + ConceptNet + DDG
// + Wiktionary into multi-paragraph output, dumbified throughout.
// ============================================================
function detectTaskIntent(raw) {
  const q = raw.toLowerCase().trim();
  const cap = (s) => cleanCapturedTerm(s).slice(0, 80);
  const ABOUT = "(?:about|on|of|regarding|for|re)";
  const WRITE = "(?:write|tell|give|make|do|compose|craft|create|spin|cook up|put together|throw together|generate)";

  // ===== STORY =====
  let m = q.match(new RegExp(`^(?:can you |please )?${WRITE}(?: me)? (?:a |an )?(?:short |brief |long |detailed |little |quick )?(?:story|tale|yarn|narrative) ${ABOUT}\\s+(.+?)[?.!]*$`));
  if (m) return { mode: "story", subject: cap(m[1]) };

  // ===== ESSAY =====
  m = q.match(new RegExp(`^(?:can you |please )?${WRITE}(?: me)? (?:a |an )?(?:\\d+[\\s-]?word )?(?:essay|treatise|paper) ${ABOUT}\\s+(.+?)[?.!]*$`));
  if (m) return { mode: "essay", subject: cap(m[1]) };

  // ===== RESEARCH =====
  m = q.match(/^(?:can you |please )?(?:do |make |give me |run |perform ) ?(?:some )?(?:research|a report|a deep dive|a breakdown|an analysis) (?:about|on|into|for|of)\s+(.+?)[?.!]*$/)
   || q.match(/^(?:research|deep dive(?: into)?|dig into|look into|get me info on|get info on|get me facts on|brief me on|fill me in on) (.+?)[?.!]*$/)
   || q.match(/^(?:tell me |give me )?everything (?:about |on |you know about )(.+?)[?.!]*$/)
   || q.match(/^(?:what (?:do you know|can you tell me)|the rundown|the scoop|the deal|the lowdown|background) (?:about|on|with|of)\s+(.+?)[?.!]*$/)
   || q.match(/^(?:details|info|facts) (?:on|about)\s+(.+?)[?.!]*$/);
  if (m) {
    const brief = /\b(brief(?:ly)?|quick(?:ly)?|short|tldr|tl;dr|summary|in a nutshell|one-liner)\b/i.test(q);
    return { mode: "research", subject: cap(m[1]), brief };
  }

  // ===== PARAGRAPH =====
  m = q.match(new RegExp(`^(?:can you |please )?${WRITE}(?: me)? (?:a |an )?(?:\\d+[\\s-]?word )?(?:paragraph|blurb|write[- ]up|few sentences) ${ABOUT}\\s+(.+?)[?.!]*$`));
  if (m) return { mode: "paragraph", subject: cap(m[1]) };

  // ===== EMAIL =====
  // Allow qualifiers like "resignation letter", "cover letter", "thank-you note",
  // "complaint email", "follow-up email". Captured as emailType.
  m = q.match(/^(?:can you |please )?(?:write|draft|make|compose|send)(?: me)? (?:an? )?((?:[a-z][a-z-]*(?:\s+|\b)){0,3})(email|letter|note|message) to\s+(.+?)(?:\s+(?:about|regarding|on|saying|asking|re)\s+(.+?))?[?.!]*$/);
  if (m) return { mode: "email", emailType: (m[1] || "").trim(), recipient: cap(m[3]), subject: m[4] ? cap(m[4]) : "" };
  m = q.match(/^(?:can you |please )?(?:write|draft|make|compose)(?: me)? (?:an? )?((?:[a-z][a-z-]*(?:\s+|\b)){0,3})(email|letter|note|message) (?:about|regarding|on)\s+(.+?)[?.!]*$/);
  if (m) return { mode: "email", emailType: (m[1] || "").trim(), recipient: "", subject: cap(m[3]) };
  m = q.match(/^email\s+(.+?)\s+about\s+(.+?)[?.!]*$/);
  if (m) return { mode: "email", emailType: "", recipient: cap(m[1]), subject: cap(m[2]) };
  // "cover letter for a job at Google" / "resignation letter for ..."
  m = q.match(/^(?:can you |please )?(?:write|draft|make|compose)(?: me)? (?:an? )?((?:[a-z][a-z-]*(?:\s+|\b)){0,3})(email|letter|note|message) for (?:a (?:job|position|role)\s+at\s+)?(.+?)[?.!]*$/);
  if (m) return { mode: "email", emailType: (m[1] || "").trim(), recipient: cap(m[3]), subject: "" };
  // Fallback — qualifier + type with no recipient at all
  m = q.match(/^(?:can you |please )?(?:write|draft|make|compose)(?: me)? (?:an? )?((?:[a-z][a-z-]*(?:\s+|\b)){1,3})(email|letter|note|message)[?.!]*$/);
  if (m) return { mode: "email", emailType: (m[1] || "").trim(), recipient: "", subject: "" };

  // ===== SUMMARIZE =====
  // target can be: attached file text, or text after ":", or a subject
  if (/^(?:can you |please )?(?:summarize|summarise|sum up|give me (?:a|the) summary|tldr|tl;dr|shorten|condense)\b/i.test(q)) {
    let target = null;
    const m2 = raw.match(/[:：]\s*([\s\S]+)$/);
    if (m2) target = m2[1].trim();
    const m3 = !target && raw.match(/["“]([\s\S]+?)["”]/);
    if (m3) target = m3[1].trim();
    // also allow "summarize X" where X is a topic
    const subj = !target ? (q.match(/^(?:summarize|summarise|sum up|tldr|tl;dr|shorten|condense)\s+(.+?)[?.!]*$/)?.[1] || "") : "";
    return { mode: "summarize", targetText: target || "", subject: cap(subj) };
  }

  // ===== TRANSLATE =====
  m = q.match(/^(?:can you |please )?(?:translate|convert)\s+["“]?([\s\S]+?)["”]?\s+(?:to|into)\s+(\w+)[?.!]*$/i);
  if (m) return { mode: "translate", text: m[1].trim(), language: m[2].toLowerCase() };
  m = q.match(/^(?:can you |please )?(?:translate|convert)\s+(?:this|the following)(?:\s+to\s+(\w+))?[:\s]\s*([\s\S]+)$/i);
  if (m) return { mode: "translate", text: m[2].trim(), language: (m[1] || "spanish").toLowerCase() };

  // ===== REWRITE / TONE =====
  m = q.match(/^(?:can you |please )?(?:rewrite|rephrase|reword|make)\s+(?:this|the following|it)?\s*(?:more\s+)?(formal|casual|friendly|polite|rude|pirate|shakespeare|shakespearean|british|sarcastic|excited|sad|angry|nice|mean)(?:\s+tone)?[:\s]\s*([\s\S]+)$/i);
  if (m) return { mode: "rewrite", tone: m[1].toLowerCase(), text: m[2].trim() };
  m = q.match(/^(?:make|say)\s+["“]([\s\S]+?)["”]\s+(?:more\s+)?(formal|casual|friendly|polite|rude|pirate|shakespeare|shakespearean|british|sarcastic|excited|sad|angry|nice|mean)[?.!]*$/i);
  if (m) return { mode: "rewrite", tone: m[2].toLowerCase(), text: m[1].trim() };

  // ===== BRAINSTORM LIST =====
  m = q.match(/^(?:can you |please )?(?:brainstorm|give me|list|think of|come up with)(?: me)?\s+(?:a list of |some |a bunch of |\d+\s+)?(?:ideas?|names?|suggestions?|options?|examples?) (?:for|about|of|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "brainstorm", subject: cap(m[1]) };
  m = q.match(/^(?:can you |please )?(?:give me|list)(?: me)?\s+(\d+)\s+(?:ideas?|names?|suggestions?|options?|examples?) (?:for|about|of)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "brainstorm", subject: cap(m[2]), count: parseInt(m[1]) };

  // ===== POEM =====
  m = q.match(/^(?:can you |please )?(?:write|make|compose)(?: me)? (?:a |an )?(haiku|limerick|poem|verse|sonnet|rhyme) (?:about|on|of)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "poem", poemType: m[1].toLowerCase(), subject: cap(m[2]) };

  // ===== OUTLINE =====
  m = q.match(/^(?:can you |please )?(?:write|make|give)(?: me)? (?:an? )?outline (?:for|of|about|on)\s+(.+?)[?.!]*$/i)
   || q.match(/^outline (?:for|of|about|on)\s+(.+?)[?.!]*$/i)
   || q.match(/^outline (?:a |an |the )?(.+?)[?.!]*$/i);
  if (m) return { mode: "outline", subject: cap(m[1]) };

  // ===== PLAN / STEP-BY-STEP =====
  m = q.match(/^(?:how do (?:i|you)|how to)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:can you |please )?(?:write|give|make)(?: me)? (?:a |an )?(?:step[- ]by[- ]step\s+)?(?:plan|guide|walkthrough|how[- ]to) (?:for|to|about|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "plan", subject: cap(m[1]) };

  // ===== CODE =====
  m = q.match(/^(?:can you |please )?(?:write|give|make|show)(?: me)? (?:a |some |the )?(?:code|program|function|script) (?:for|to|that|in|about)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "code", subject: cap(m[1]) };

  // ===== DEBATE / PROS-CONS =====
  m = q.match(/^(?:can you |please )?(?:debate|argue|give me|list|show me)(?: me)? (?:the )?(?:pros and cons|arguments?|both sides|for and against) (?:of|for|about)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:pros and cons|arguments?|both sides|for and against) (?:of|for|about)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:should|is it (?:good|bad) to)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "debate", subject: cap(m[1]) };

  // ===== TRIVIA =====
  if (/^(?:trivia|give me (?:a|some) (?:trivia|fun fact)|tell me (?:a|some) (?:trivia|fun fact)|fun fact)\b/i.test(q)) {
    const tmatch = q.match(/^(?:[^a-z]*)?(?:trivia|give me (?:a|some) (?:trivia|fun fact)s?|tell me (?:a|some) (?:trivia|fun fact)s?|fun fact)\s*(?:about|on|of)?\s*(.+?)[?.!]*$/i);
    return { mode: "trivia", subject: cap(tmatch?.[1] || "") };
  }

  // ===== NAME IDEAS =====
  m = q.match(/^(?:can you |please )?(?:suggest|generate|give me|think of)(?: me)? (?:some |a |\d+\s+)?(?:names|name ideas) (?:for|of)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "names", subject: cap(m[1]) };

  // ===== ROLEPLAY =====
  m = q.match(/^(?:pretend|act|roleplay|play|be)\s+(?:to be\s+|like\s+|as\s+)?(?:a |an )?(.+?)[?.!]*$/i);
  if (m && /\b(pirate|cowboy|wizard|robot|alien|cat|dog|therapist|butler|pirate|ghost|caveman|shakespeare|baby|monk|detective|gangster|vampire)\b/i.test(m[1])) {
    return { mode: "roleplay", character: cap(m[1]) };
  }

  // ===== RECIPE =====
  m = q.match(/^(?:can you |please )?(?:give me |write )?(?:a )?recipe (?:for|using|with)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:what can i (?:cook|make)|how do i (?:cook|make)) (?:with )?(.+?)[?.!]*$/i);
  if (m) return { mode: "recipe", subject: cap(m[1]) };

  // ===== COMPARE =====
  m = q.match(/^(?:compare|contrast|what(?:'?s| is) the (?:difference|diff)|difference between)\s+(.+?)\s+(?:and|vs|versus|v\.?)\s+(.+?)[?.!]*$/i)
   || q.match(/^(.+?)\s+(?:vs|versus|v\.?)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "compare", a: cap(m[1]), b: cap(m[2]) };

  // ===== EXPLAIN LIKE I'M 5 =====
  m = q.match(/^(?:can you |please )?(?:explain|tell me about)\s+(.+?)\s+(?:like i'?m (?:5|five|a kid|a child)|for (?:dummies|kids))[?.!]*$/i)
   || q.match(/^eli5\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:simple|kid|kids) (?:explanation|version) of\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "eli5", subject: cap(m[1]) };

  // ===== JOKE / PUN =====
  m = q.match(/^(?:can you |please )?(?:tell me |make me )?(?:a )?(joke|pun) (?:about)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "joke", jokeType: m[1].toLowerCase(), subject: cap(m[2]) };
  if (/^(?:tell me a joke|make me laugh|a joke please|got any jokes)[?.!]*$/i.test(q)) return { mode: "joke", jokeType: "joke", subject: "" };

  // ===== REVIEW =====
  m = q.match(/^(?:can you |please )?(?:write|give)(?: me)? (?:a |an )?(?:(book|movie|restaurant|product|game|album) )?review (?:of|for)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "review", reviewKind: m[1] || "", subject: cap(m[2]) };
  m = q.match(/^review\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "review", reviewKind: "", subject: cap(m[1]) };

  // ===== DIALOGUE =====
  m = q.match(/^(?:can you |please )?(?:write|make)(?: me)? (?:a )?(?:dialogue|conversation|scene) between\s+(.+?)\s+and\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "dialogue", a: cap(m[1]), b: cap(m[2]) };

  // ===== SLOGAN / TAGLINE =====
  m = q.match(/^(?:can you |please )?(?:give|write|make|come up with)(?: me)? (?:a |some )?(?:slogan|tagline|catchphrase|catchy (?:phrase|line)) (?:for|about)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "slogan", subject: cap(m[1]) };

  // ===== RHYMES =====
  m = q.match(/^(?:what )?rhymes? with\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:give me |list )?rhymes for\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "rhymes", subject: cap(m[1]) };

  // ===== TWEET / SOCIAL POST =====
  m = q.match(/^(?:can you |please )?(?:write|make|give)(?: me)? (?:a )?(?:tweet|post|social (?:media )?post) (?:about|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "tweet", subject: cap(m[1]) };

  // ===== QUIZ =====
  m = q.match(/^(?:quiz|test) me(?:\s+on\s+(.+?))?[?.!]*$/i);
  if (m) return { mode: "quiz", subject: cap(m[1] || "") };

  // ===== MOTIVATIONAL / FORTUNE =====
  if (/^(?:motivate me|inspire me|give me motivation|motivational quote|give me a fortune|fortune cookie|read my fortune|encourage me)[?.!]*$/i.test(q)) {
    return { mode: "motivational", subject: "" };
  }

  // ===== COUNTERARGUMENT =====
  m = q.match(/^(?:can you |please )?(?:argue against|give me (?:a )?counterargument (?:to|for)|why is\s+(.+?)\s+bad)[?.!]*$/i);
  m = m || q.match(/^(?:argue against|counter|counterargument (?:to|for)|reasons against)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "counter", subject: cap(m[1] || m[2]) };

  // ===== METAPHOR / ANALOGY =====
  m = q.match(/^(?:(?:can you |please )?(?:give me |make|write)(?: me)? (?:a )?)?(?:metaphor|analogy|simile) for\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:what is )?(.+?)\s+(?:like what|an analogy for what)[?.!]*$/i);
  if (m) return { mode: "metaphor", subject: cap(m[1]) };

  // ===== ACRONYM =====
  m = q.match(/^(?:what does|make up an acronym for|what's an acronym for)\s+(.+?)\s+stand for[?.!]*$/i)
   || q.match(/^(?:acronym for)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "acronym", subject: cap(m[1]) };

  // ===== ELEVATOR PITCH =====
  m = q.match(/^(?:(?:can you |please )?(?:give|write|make)(?: me)? (?:an )?)?elevator pitch (?:for|about)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "pitch", subject: cap(m[1]) };

  // ===== SWOT =====
  m = q.match(/^(?:can you |please )?(?:give|make|do)(?: me)? (?:a )?swot (?:analysis\s+)?(?:of|for|on)\s+(.+?)[?.!]*$/i)
   || q.match(/^swot (?:analysis\s+)?(?:of|for|on)\s+(.+?)[?.!]*$/i)
   || q.match(/^swot\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "swot", subject: cap(m[1]) };

  // ===== SONG LYRICS =====
  m = q.match(/^(?:can you |please )?(?:write|make)(?: me)? (?:some )?(?:song )?lyrics (?:for|about)\s+(.+?)[?.!]*$/i)
   || q.match(/^(?:write|make) (?:a |an )?song (?:about|for)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "song", subject: cap(m[1]) };

  // ===== SPEECH =====
  m = q.match(/^(?:can you |please )?(?:write|make)(?: me)? (?:a )?speech (?:about|for|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "speech", subject: cap(m[1]) };

  // ===== SCENE / SCREENPLAY =====
  m = q.match(/^(?:can you |please )?(?:write|make)(?: me)? (?:a )?(?:scene|screenplay|play) (?:about|for|of|involving)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "scene", subject: cap(m[1]) };

  // ===== FLASHCARDS =====
  m = q.match(/^(?:(?:can you |please )?(?:make|give|create)(?: me)? (?:some )?)?flash ?cards (?:for|about|on)\s+(.+?)[?.!]*$/i);
  if (m) return { mode: "flashcards", subject: cap(m[1]) };

  // ===== FACT-CHECK =====
  m = q.match(/^(?:is it true (?:that)?|fact[- ]check|is this true)\s+(.+?)[?.!]*$/i)
   || q.match(/^is\s+(.+?)\s+(?:true|real|correct|accurate)[?.!]*$/i);
  if (m) return { mode: "factcheck", subject: cap(m[1]) };

  // ===== PROOFREAD =====
  if (/^(?:can you |please )?(?:proofread|edit|check|revise|fix)(?:\s+this|\s+my\s+\w+)?\b/i.test(q)) {
    let target = null;
    const m2 = raw.match(/[:：]\s*([\s\S]+)$/);
    if (m2) target = m2[1].trim();
    const m3 = !target && raw.match(/["“]([\s\S]+?)["”]/);
    if (m3) target = m3[1].trim();
    return { mode: "proofread", subject: target || "" };
  }

  // ===== FUZZY FALLBACK (scoring) =====
  // If none of the above strict patterns matched, score the message
  // against each task's signal bag and pick the best one. Good for
  // loose phrasings like "spin me a yarn about dogs" or "i need a
  // quick writeup on mars" that the strict regexes miss.
  return scoreTaskIntent(raw, q, cap);
}

// Try to extract a subject given common preposition patterns.
function extractSubjectFuzzy(q) {
  let m = q.match(/\babout\s+(.+?)[?.!]*$/i)
       || q.match(/\bon\s+(?:the\s+)?(.+?)[?.!]*$/i)
       || q.match(/\bregarding\s+(.+?)[?.!]*$/i)
       || q.match(/\bfor\s+(?:a\s+|an\s+|the\s+)?(.+?)[?.!]*$/i)
       || q.match(/\bof\s+(.+?)[?.!]*$/i);
  if (m) return m[1].trim();
  // fallback: take last 1-4 words that aren't stopwords
  const stop = new Set(["the","a","an","is","are","was","were","i","you","me","my","your","it","please","can","could","would","you","do","me","something"]);
  const words = q.replace(/[?.!,]/g, "").split(/\s+/).filter(w => w && !stop.has(w));
  return words.slice(-4).join(" ");
}

function scoreTaskIntent(raw, q, cap) {
  // Signal bags — presence of these keywords/patterns adds to the mode's
  // score. Higher score = more confident that mode is intended.
  const SIGNALS = {
    story:      { kw: /\b(story|tale|yarn|narrative|fable|legend|bedtime|plot|fiction)\b/i, vb: /\b(write|tell|make up|spin|compose|craft|narrate|give me|come up with)\b/i, w: 3 },
    essay:      { kw: /\b(essay|paper|write[- ]up|writeup|treatise|long form|discussion)\b/i, vb: /\b(write|compose|draft|give me|make)\b/i, w: 3 },
    paragraph:  { kw: /\b(paragraph|blurb|few sentences|brief note)\b/i, vb: /\b(write|give|make)\b/i, w: 3 },
    recipe:     { kw: /\b(recipe|ingredient|dish|meal|cook|bake|prepare|how (do i|to) (cook|make|bake))\b/i, w: 3 },
    research:   { kw: /\b(research|deep dive|rundown|breakdown|analysis|info on|facts about|everything about|background on|scoop on|lowdown|details on|learn about)\b/i, w: 3 },
    email:      { kw: /\b(email|letter|note to|message to|draft.+to)\b/i, w: 3 },
    proofread:  { kw: /\b(proofread|proof[- ]read|edit this|revise this|correct this|check my (writing|grammar|spelling))\b/i, w: 3 },
    summarize:  { kw: /\b(summarize|summarise|sum up|summary|tldr|tl;dr|shorten|condense|key points|in a nutshell)\b/i, w: 3 },
    translate:  { kw: /\b(translate|in spanish|in french|in german|in japanese|in chinese|in italian|in portuguese|in russian|in arabic|how do you say)\b/i, w: 3 },
    rewrite:    { kw: /\b(rewrite|rephrase|reword|say this differently|make (this|it) (more|less))\b/i, w: 3 },
    brainstorm: { kw: /\b(brainstorm|ideas for|list of|come up with|throw out some|think of (some|a few)|suggest (some|a few)|possible)\b/i, w: 2 },
    poem:       { kw: /\b(poem|poetry|haiku|limerick|sonnet|verse|rhyme scheme)\b/i, w: 3 },
    outline:    { kw: /\b(outline|structure for|sections for|skeleton of|table of contents)\b/i, w: 3 },
    plan:       { kw: /\b(how do (i|you)|how to|step[- ]by[- ]step|plan for|guide to|walk.?through|instructions (for|on)|process of)\b/i, w: 2 },
    code:       { kw: /\b(code|script|program|function|algorithm|snippet|javascript|python|java|c\+\+)\b/i, vb: /\b(write|give|make|show)\b/i, w: 3 },
    debate:     { kw: /\b(pros and cons|arguments? (for|against)|both sides|for and against|debate)\b/i, w: 3 },
    trivia:     { kw: /\b(trivia|fun fact|did you know|interesting fact|random fact)\b/i, w: 3 },
    names:      { kw: /\b(name ideas|suggest names|name suggestions|possible names|baby names|business names)\b/i, w: 3 },
    roleplay:   { kw: /\b(pretend (to be|you are)|act (like|as)|roleplay|play the role|be a)\b/i, w: 2 },
    joke:       { kw: /\b(joke|pun|funny|make me laugh|comedy)\b/i, w: 2 },
    review:     { kw: /\b(review|rating|stars|critique|verdict on)\b/i, w: 2 },
    dialogue:   { kw: /\b(dialogue|conversation between|script between|scene between)\b/i, w: 3 },
    slogan:     { kw: /\b(slogan|tagline|catchphrase|catchy (phrase|line)|motto)\b/i, w: 3 },
    rhymes:     { kw: /\b(rhyme|rhymes with)\b/i, w: 3 },
    tweet:      { kw: /\b(tweet|social (media )?post|140 char|280 char)\b/i, w: 3 },
    quiz:       { kw: /\b(quiz me|test me|ask me questions)\b/i, w: 3 },
    motivational:{kw: /\b(motivat|inspir|encourag|fortune cookie|pep talk)/i, w: 3 },
    counter:    { kw: /\b(argue against|counterargument|case against|why.+(bad|wrong))\b/i, w: 3 },
    metaphor:   { kw: /\b(metaphor|analogy|simile|like what)\b/i, w: 3 },
    acronym:    { kw: /\b(acronym|stand for|abbreviation)\b/i, w: 3 },
    pitch:      { kw: /\b(elevator pitch|pitch (for|about)|30[- ]second pitch)\b/i, w: 3 },
    swot:       { kw: /\bswot\b/i, w: 3 },
    song:       { kw: /\b(song (lyrics|about)|lyrics (for|about)|write a song|write me a song)\b/i, w: 3 },
    speech:     { kw: /\b(speech (about|for)|remarks (for|about)|address (to|for))\b/i, w: 3 },
    scene:      { kw: /\b(scene (about|for|involving)|screenplay|script about|movie scene)\b/i, w: 3 },
    flashcards: { kw: /\b(flash[- ]?cards|study cards)\b/i, w: 3 },
    factcheck:  { kw: /\b(is it true|fact check|is that true|true or false|is.+(real|correct|accurate))\b/i, w: 2 },
    compare:    { kw: /\b(compare|difference between|vs\b|versus\b|contrast)\b/i, w: 2 },
    eli5:       { kw: /\b(eli5|explain like|simple(r)? version|for (kids|dummies|a 5 year old))\b/i, w: 3 }
  };

  let bestMode = null, bestScore = 0;
  for (const [mode, sig] of Object.entries(SIGNALS)) {
    let score = 0;
    if (sig.kw && sig.kw.test(q)) score += sig.w;
    if (sig.vb && sig.vb.test(q)) score += 1;
    if (score > bestScore) { bestScore = score; bestMode = mode; }
  }

  // Confidence threshold — below this we say "no task detected" so the
  // normal conversational pipeline can handle it.
  if (bestScore < 2 || !bestMode) return null;

  const subject = cap(extractSubjectFuzzy(q));
  // Build the task object with mode-specific extras filled in best-effort
  const task = { mode: bestMode, subject, _fuzzy: true };
  if (bestMode === "compare") {
    const parts = q.match(/(?:compare|difference between|contrast)\s+(.+?)\s+(?:and|vs|versus|v\.?)\s+(.+?)[?.!]*$/i)
               || q.match(/(.+?)\s+(?:vs|versus|v\.?)\s+(.+?)[?.!]*$/i);
    if (parts) { task.a = cap(parts[1]); task.b = cap(parts[2]); }
    else task.a = subject, task.b = "other thing";
  }
  if (bestMode === "email") {
    const rec = q.match(/\bto\s+(.+?)(?:\s+(?:about|regarding)|[?.!]|$)/i);
    task.recipient = rec ? cap(rec[1]) : "";
    task.emailType = "";
  }
  if (bestMode === "joke")      task.jokeType = "joke";
  if (bestMode === "poem") {
    const pm = q.match(/\b(haiku|limerick|sonnet)\b/i);
    task.poemType = pm ? pm[1].toLowerCase() : "poem";
  }
  if (bestMode === "translate") {
    const lm = q.match(/\b(?:in|to|into)\s+(spanish|french|german|japanese|chinese|italian|portuguese|russian|arabic|dutch|polish|turkish|greek|hebrew|hindi|korean|vietnamese|latin)\b/i);
    task.language = lm ? lm[1].toLowerCase() : "spanish";
    task.text = q.replace(/^\w+\s+/, "").replace(/\s+(?:in|to|into)\s+\w+.*$/i, "").trim();
  }
  if (bestMode === "roleplay") {
    const chm = q.match(/\b(?:a |an |like a |as a )?(pirate|cowboy|wizard|robot|alien|cat|dog|therapist|butler|ghost|caveman|shakespeare|baby|monk|detective|gangster|vampire)\b/i);
    task.character = chm ? chm[1] : "strange person";
  }
  if (bestMode === "research") {
    task.brief = /\b(brief|quick|short|tldr|summary|in a nutshell)\b/i.test(q);
  }

  return task;
}

// ============================================================
// CONTEXTUAL PREFIX — makes every task reply feel aware of how the
// question was asked AND what topic it's about, not just a template
// result. Composes 0-2 short prefix pieces.
// ============================================================
function contextualPrefix(raw, task) {
  if (!raw) return "";
  const q = raw.toLowerCase().trim();
  const topic = task.subject || task.a || "";
  const parts = [];

  const isQuestion = /[?]$/.test(raw) || /^(what|who|why|how|when|where|which|is|are|was|were|do|does|did|can|could|will|would|should|am)/i.test(q);
  const isCommand  = /^(write|give|make|tell|show|do|brainstorm|generate|compose|draft|spin|come up with|outline|research|translate|rewrite|summarize|summarise|summar|sum up|quiz|motivate|inspire|argue|compare|contrast|explain|eli5)/i.test(q);
  const isPolite   = /^(please|can you|could you|would you|may i|may you)/i.test(q);
  const hasBang    = /!/.test(raw);

  // Question-form acknowledgment (higher chance for questions).
  if (isQuestion && Math.random() < 0.55) {
    parts.push(pick([
      "hmm. ", "ok. ", "good question. ", "let me think. ", "alright. ",
      "uhh. ", "questions. ok. ", "interesting question. ",
      "...ok. ", "right. "
    ]));
  } else if (isPolite && Math.random() < 0.35) {
    parts.push(pick([
      "since you asked. ", "politely noted. ", "ok, since you said please. "
    ]));
  } else if (isCommand && Math.random() < 0.3) {
    parts.push(pick([
      "ok. ", "sure. ", "fine. ", "got it. ", "alright. "
    ]));
  } else if (hasBang && Math.random() < 0.3) {
    parts.push(pick(["ok ok. ", "loud. but ok. ", "heard you. "]));
  }

  // Topic echo — only occasionally, and only if the result doesn't
  // already start by referencing the topic.
  if (topic && Math.random() < 0.28) {
    parts.push(pick([
      `${topic}. `,
      `${topic}... `,
      `oh. ${topic}. `,
      `right — ${topic}. `,
      `${topic}, yes. `
    ]));
  }

  return parts.join("");
}

// Strips or randomizes shouty "TASK HEADER: X" lines into casual openers
// half the time. This is what makes single-line/short task results
// (rhymes, slogans, trivia, etc.) feel less machine-generated.
function softenHeader(text, mode, subj) {
  if (!text) return text;
  if (Math.random() > 0.5) return text;  // keep the formal version half the time
  const alts = {
    rhymes:    [`rhymes with ${subj}. let me dig.`, `${subj}. rhymes. hmm.`, `${subj} is famously hard to rhyme. but:`, `rhymes for ${subj}:`],
    recipe:    [`ok. ${subj}. here's roughly how:`, `${subj}. a recipe. fine.`, `cooking ${subj}. i hope you have hands.`],
    outline:   [`outline for ${subj}. ok.`, `${subj}, outlined:`, `rough shape of ${subj}:`],
    swot:      [`swot on ${subj}. ok.`, `${subj}. let's analyze:`, `${subj}. strengths/weaknesses/etc:`],
    brainstorm:[`brainstorming ${subj}.`, `ideas for ${subj}:`, `${subj}, thought about:`],
    slogan:    [`slogans. for ${subj}.`, `${subj}. catchy phrases, allegedly:`, `marketing ${subj}:`],
    flashcards:[`flashcards for ${subj}. ok.`, `study cards, ${subj}:`, `${subj}, in card form:`],
    quiz:      [`quiz${subj ? " on " + subj : ""}. ok.`, `${subj ? "test on " + subj : "test"}. try:`, `pop quiz${subj ? ": " + subj : ""}.`],
    names:     [`names for ${subj}.`, `${subj}, naming options:`, `what to call ${subj}:`],
    research:  [`research on ${subj}.`, `${subj}. here's what i've got:`, `${subj} — notes:`],
    debate:    [`${subj}. pros and cons:`, `both sides of ${subj}:`, `${subj}, two ways:`],
    song:      [`a song about ${subj}:`, `${subj}. in song form:`, `${subj}, singing:`],
    speech:    [`a speech about ${subj}:`, `${subj}. remarks:`, `remarks on ${subj}:`],
    acronym:   [`${subj}. an acronym:`, `acronym time — ${subj}:`, `${subj} stands for:`],
    review:    [`${subj}. reviewed:`, `i have opinions on ${subj}:`, `the ${subj} review:`],
    compare:   null,  // compare has its own varied headers already
    story:     null, essay: null, poem: null, plan: null, email: null,
    proofread: null, summarize: null, translate: null, rewrite: null
  };
  const pool = alts[mode];
  if (!pool) return text;
  // Replace the first "HEADER:" style line (all caps + colon) with a casual one.
  const replaced = text.replace(/^[A-Z][A-Z0-9 :⭐★—\-]{2,40}[:\n]/, pick(pool) + "\n");
  return replaced;
}

async function longFormRespond(task) {
  // Strip leading articles so "a dog" / "an apple" / "the eiffel tower" don't
  // double up as "a a dog" in templates.
  let subj = (task.subject || "").replace(/^\s*(a|an|the)\s+/i, "").trim() || "something";
  // For plan mode: "how do i make pancakes" → subj is "make pancakes". Strip
  // the leading action verb so Wikipedia lookup hits the noun ("pancakes",
  // "income approach", etc.) instead of the verb phrase.
  if (task.mode === "plan") {
    const stripped = subj.replace(/^(perform|do|make|get|start|begin|complete|finish|execute|run|learn|master|build|create|write|develop|plan|prepare|conduct|host|throw|organize|set up|set-up|set|cook|bake|fix|repair|install|assemble)\s+(?:an? |the |some |your |my )?/i, "").trim();
    if (stripped && stripped !== subj) subj = stripped;
  }
  const [wiki, cn, dm, wkt, ddg] = await Promise.all([
    fetchWiki(subj), fetchConceptNet(subj), fetchDatamuse(subj),
    fetchWiktionary(subj), fetchDDG(subj)
  ]);
  const groups = {};
  if (cn) for (const [k, v] of Object.entries(cn)) groups[k] = [...v];
  if (dm?.groups) {
    for (const [k, v] of Object.entries(dm.groups)) {
      if (!groups[k] || groups[k].length === 0) groups[k] = [...v];
    }
  }

  // Dispatch to the mode-specific generator. Some are async (compare,
  // rhymes, translate) — await where needed.
  let result;
  switch (task.mode) {
    case "story":       result = generateStory(subj, groups); break;
    case "essay":       result = generateEssay(subj, wiki, wkt, ddg, groups, dm?.flat); break;
    case "research":    result = generateResearch(subj, wiki, wkt, ddg, groups, task.brief); break;
    case "paragraph":   result = generateParagraph(subj, wiki, ddg, groups, dm?.flat); break;
    case "proofread":   result = generateProofread(task.targetText || task.subject); break;
    case "email":       result = generateEmail(task.recipient, subj, wiki, groups, task.emailType); break;
    case "summarize":   result = generateSummarize(task.targetText, subj, wiki); break;
    case "translate":   result = await generateTranslate(task.text, task.language); break;
    case "rewrite":     result = generateRewrite(task.text, task.tone); break;
    case "brainstorm":  result = generateBrainstorm(subj, task.count, groups, dm?.flat); break;
    case "poem":        result = generatePoem(task.poemType, subj, groups); break;
    case "outline":     result = generateOutline(subj, groups, wiki); break;
    case "plan":        result = generatePlan(subj, groups, wiki, wkt); break;
    case "code":        result = generateCode(subj); break;
    case "debate":      result = generateDebate(subj, groups); break;
    case "trivia":      result = generateTrivia(subj, wiki, ddg, groups); break;
    case "names":       result = generateNames(subj, groups); break;
    case "roleplay":    result = generateRoleplay(task.character); break;
    case "recipe":      result = generateRecipe(subj, groups); break;
    case "compare":     result = await generateCompare(task.a, task.b); break;
    case "eli5":        result = generateELI5(subj, wiki, groups); break;
    case "joke":        result = generateJoke(task.jokeType, subj, groups); break;
    case "review":      result = generateReview(subj, task.reviewKind, groups); break;
    case "dialogue":    result = generateDialogue(task.a, task.b); break;
    case "slogan":      result = generateSlogan(subj, groups); break;
    case "rhymes":      result = await generateRhymes(subj); break;
    case "tweet":       result = generateTweet(subj, groups); break;
    case "quiz":        result = generateQuiz(subj, wiki, groups); break;
    case "motivational":result = generateMotivational(); break;
    case "counter":     result = generateCounter(subj, groups); break;
    case "metaphor":    result = generateMetaphor(subj, groups); break;
    case "acronym":     result = generateAcronym(subj); break;
    case "pitch":       result = generatePitch(subj, wiki, groups); break;
    case "swot":        result = generateSWOT(subj, groups); break;
    case "song":        result = generateSong(subj, groups); break;
    case "speech":      result = generateSpeech(subj, groups); break;
    case "scene":       result = generateScene(subj, groups); break;
    case "flashcards":  result = generateFlashcards(subj, wiki, groups); break;
    case "factcheck":   result = generateFactcheck(subj, wiki, ddg); break;
    default:            return "ok. i don't know what you want.";
  }

  // ---- CONTEXT LAYER ----
  // Soften shouty "TASK: X" headers half the time, then prepend an
  // acknowledgment of how the question was asked and what the topic is.
  result = softenHeader(result, task.mode, subj);
  const prefix = contextualPrefix(task._raw || "", task);
  return prefix + result;
}

// ---------- RECIPE ----------
function generateRecipe(subj, groups) {
  const ing = _g(groups, "HasA").concat(_g(groups, "PartOf"), _g(groups, "RelatedTo")).slice(0, 5);
  const padding = ["salt","pepper","oil","water","something green","butter","flour","an onion","regret"];
  while (ing.length < 5) ing.push(pick(padding.filter(p => !ing.includes(p))));
  const verbs = ["chop","boil","simmer","fry","roast","mix","stir","season","pray over","ignore"];
  const variants = [
    () => `RECIPE: ${subj}\n\nINGREDIENTS:\n${ing.map(i => "• " + i).join("\n")}\n\nSTEPS:\n1. ${pick(verbs)} the ${ing[0]}.\n2. ${pick(verbs)} the ${ing[1]} with the ${ing[2]}.\n3. combine everything. don't ask.\n4. ${pick(verbs)} for a while. you'll know when.\n5. serve to someone brave.`,
    () => `how to make ${subj} (allegedly):\n\nyou will need: ${ing.join(", ")}.\n\nmethod: ${pick(verbs)} everything. some of it twice. season to taste. mine tasted like regret.\n\nserves: 2-4 depending on forgiveness.`,
    () => `${subj.toUpperCase()} — a recipe\n\nstart with ${ing[0]} and ${ing[1]}. ${pick(verbs)} them.\nadd ${ing[2]}, ${ing[3]}, ${ing[4]}. ${pick(verbs)}.\nfinish by ${pick(verbs)}ing. plate. apologize.`
  ];
  return dumbifyLong(pick(variants)() + "\n\n" + closer("recipe"));
}

// ---------- COMPARE ----------
async function generateCompare(a, b) {
  const [wa, ga, wb, gb] = await Promise.all([
    fetchWiki(a), fetchDatamuse(a), fetchWiki(b), fetchDatamuse(b)
  ]);
  const aDesc = wa?.extract ? wa.extract.split(/(?<=[.!?])\s+/)[0] : `a ${a}`;
  const bDesc = wb?.extract ? wb.extract.split(/(?<=[.!?])\s+/)[0] : `a ${b}`;
  const aRel = ga?.groups?.IsA?.[0] || ga?.groups?.RelatedTo?.[0] || "thing";
  const bRel = gb?.groups?.IsA?.[0] || gb?.groups?.RelatedTo?.[0] || "thing";
  const variants = [
    () => `${a.toUpperCase()} vs ${b.toUpperCase()}\n\n${a}:\n  ${aDesc}\n\n${b}:\n  ${bDesc}\n\nkey difference: one is a ${aRel}, the other is a ${bRel}. that's my analysis.`,

async function generateRhymes(subj) {
  try {
    const r = await fetchWithTimeout(`https://api.datamuse.com/words?rel_rhy=${encodeURIComponent(subj)}&max=20`, 5000);
    const json = r.ok ? await r.json() : [];
    const words = json.map(w => w.word).filter(w => /^[a-z][a-z'\-]+$/.test(w));
    if (!words.length) return `nothing rhymes with ${subj}. maybe. i tried.\n\n${closer("rhymes")}`;
    const top = words.slice(0, 12);
    return `RHYMES WITH ${subj.toUpperCase()}:\n\n${top.join(", ")}\n\n${closer("rhymes")}`;
  } catch (e) {
    return `i can't rhyme right now. try again later. or rhyme it yourself.`;
  }
}

    C: ["concerning","chaotic","casually","confused","cursed"],

    E: ["emergency","eternal","embarrassed","extremely","eclectic"],
    F: ["failing","frequently","fractured","fine","flimsy"],
    G: ["genuine","grim","gently","garbage","greasy"],
    H: ["haunted","honestly","hopeful","hasty","hairy"],
    I: ["improper","instantly","ironic","incredibly","itchy"],
    J: ["just","jaded","jarringly","juvenile","joyous"],
    K: ["kinda","kinetic","keenly","kooky","knotty"],
    L: ["lackluster","loosely","luminous","laughable","limp"],
    M: ["mostly","miserable","mildly","mysterious","mangled"],
    N: ["nominal","nearly","nervous","narrow","naked"],
    O: ["ominously","occasionally","overcooked","obscure","obvious"],
    P: ["presumably","patchy","painful","pretend","plain"],
    Q: ["questionably","quiet","quickly","quaint","queasy"],
    R: ["relentless","really","rickety","resigned","raw"],
    S: ["slightly","strange","sincere","suspiciously","sad"],
    T: ["tragic","tentative","technically","tired","tepid"],
    U: ["unusually","utterly","uncertain","useful","ugly"],
    V: ["vaguely","violently","vapid","valid","vibrating"],
    W: ["weirdly","wobbly","willfully","wet","worried"],
    X: ["xenophilic","x-ray","xylophonic","xenial"],

  if (_g(groups, "HasA")[0]) cards.push([`what does ${subj} have?`, _g(groups, "HasA").slice(0, 3).join(", ")]);
  if (_g(groups, "AtLocation")[0]) cards.push([`where is ${subj} usually found?`, _g(groups, "AtLocation")[0]]);
  if (_g(groups, "CapableOf")[0]) cards.push([`what can ${subj} do?`, _g(groups, "CapableOf").slice(0, 3).join(", ")]);
  if (_g(groups, "RelatedTo")[0]) cards.push([`what is ${subj} related to?`, _g(groups, "RelatedTo").slice(0, 3).join(", ")]);
  while (cards.length < 4) cards.push([`(blank card ${cards.length + 1})`, `(i ran out of facts)`]);

  cards.forEach((c, i) => lines.push(`\nCARD ${i + 1}\n  FRONT: ${c[0]}\n  BACK:  ${c[1]}`));

    "VERDICT: true-ish. in certain lighting.",

  ];
  if (wiki?.extract) {
    return dumbifyLong(`FACT-CHECK: "${claim}"\n\nwhat the internet says:\n${wiki.extract.split(/(?<=[.!?])\s+/).slice(0, 2).join(" ")}\n\n${pick(verdicts)}\n\n${closer("factcheck")}`);

  return `FACT-CHECK: "${claim}"\n\ni don't know. i couldn't find anything.\nyou're on your own.\n\n${closer("factcheck")}`;
}

// ---------- SUMMARIZE ----------
function generateSummarize(targetText, subj, wiki) {
  if (targetText && targetText.length > 40) {
    const sents = targetText.split(/(?<=[.!?])\s+/).filter(s => s.length > 5);
    if (sents.length <= 2) return `SUMMARY:\n\n${sents.join(" ")}\n\n${closer("summarize")}`;
    const mid = sents[Math.floor(sents.length / 2)];
    const summary = sents[0] + " [...a bunch of stuff happened...] " + (mid || sents[sents.length - 1]);
    return `TL;DR:\n\n${summary}\n\n${closer("summarize")}`;
  }
  if (wiki?.extract) {
    const first = wiki.extract.split(/(?<=[.!?])\s+/)[0];
    return `SHORT VERSION:\n\n${first}\n\n${closer("summarize")}`;
  }
  return "i have nothing to summarize. paste text after a colon, attach a file, or give me a topic.";
}

// ---------- TRANSLATE (MyMemory API — keyless, CORS-enabled) ----------
const LANG_CODES = {
  spanish:"es", french:"fr", german:"de", italian:"it", portuguese:"pt",
  japanese:"ja", chinese:"zh-CN", mandarin:"zh-CN", korean:"ko",
  russian:"ru", arabic:"ar", dutch:"nl", polish:"pl", turkish:"tr",
  greek:"el", hebrew:"he", hindi:"hi", bengali:"bn", vietnamese:"vi",
  thai:"th", indonesian:"id", swedish:"sv", norwegian:"no", danish:"da",
  finnish:"fi", romanian:"ro", ukrainian:"uk", czech:"cs", hungarian:"hu",
  latin:"la", welsh:"cy", irish:"ga", swahili:"sw"
};
async function generateTranslate(text, language) {
  const lang = (language || "spanish").toLowerCase();
  const code = LANG_CODES[lang] || lang.slice(0, 2);
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${encodeURIComponent(code)}`;
    const r = await fetchWithTimeout(url, 6000);
    if (!r.ok) throw new Error("http " + r.status);
    const j = await r.json();
    const t = j.responseData?.translatedText;
    if (!t) throw new Error("no translation");
    return `TRANSLATION (${lang}):\n\n"${t}"\n\n(i can't verify this. i don't speak ${lang}.)`;
  } catch (e) {
    return `i tried to translate to ${lang}. something broke. probably the language. or me.`;
  }
}

// ---------- REWRITE / TONE ----------
const TONE_MAPS = {
  formal:     { "hi":"greetings","hey":"greetings","thanks":"much obliged","bye":"farewell","ok":"understood","yeah":"indeed","pls":"please","u":"you","ur":"your","lol":"that is amusing" },
  casual:     { "greetings":"hey","however":"but","therefore":"so","indeed":"yeah","understood":"ok","regarding":"about" },
  friendly:   { "hi":"hey there friend","hello":"hiya","bye":"take care" },
  polite:     { "hi":"hello","give me":"could you please give me","now":"at your convenience" },
  rude:       { "please":"","thank you":"","excuse me":"hey" },
  pirate:     { "hello":"ahoy","hi":"ahoy","friend":"matey","yes":"aye","no":"nay","treasure":"booty","my":"me","you":"ye","your":"yer","for":"fer","is":"be","are":"be" },
  shakespeare:{ "you":"thou","your":"thy","yours":"thine","have":"hast","are":"art","is":"be","my":"mine","will":"shalt" },
  shakespearean: "shakespeare",
  british:    { "color":"colour","favorite":"favourite","cookie":"biscuit","apartment":"flat","elevator":"lift","fall":"autumn","trunk":"boot","diaper":"nappy" },
  excited:    "__uppercase__",
  angry:      "__uppercase__",
  sad:        "__suffix_sigh__",
  sarcastic:  "__sarcastic__",
  mean:       "__suffix_idiot__",
  nice:       { "bad":"not great","wrong":"not quite right" }
};
function generateRewrite(text, tone) {
  const mKey = TONE_MAPS[tone];
  let out = text;
  let map = mKey;
  if (typeof mKey === "string") {
    if (mKey.startsWith("__")) map = null;
    else map = TONE_MAPS[mKey];
  }
  if (map && typeof map === "object") {
    for (const [k, v] of Object.entries(map)) {
      out = out.replace(new RegExp(`\\b${k}\\b`, "gi"), v);
    }
  }
  if (mKey === "__uppercase__" || tone === "excited") out = out.toUpperCase() + "!!";
  else if (tone === "angry") out = out.toUpperCase() + ".";
  else if (tone === "sad") out = out + "... (sigh)";
  else if (tone === "sarcastic") out = `oh, "${text}". how truly wonderful.`;
  else if (tone === "mean") out = out + ". idiot.";
  return `REWRITE (${tone}):\n\n${out}\n\n(i did my best. that wasn't much.)`;
}

// ---------- BRAINSTORM ----------
function generateBrainstorm(subj, count, groups, flat) {
  const n = count || 8;
  const pool = [];
  for (const w of (_g(groups, "RelatedTo").concat(_g(groups, "Synonym"), _g(groups, "HasA"), flat || []))) {
    if (!pool.includes(w)) pool.push(w);
  }
  const out = pool.slice(0, n);
  while (out.length < n) out.push(`${subj} idea #${out.length + 1}`);
  const lines = [`BRAINSTORM: ${subj}`, "---"];
  out.slice(0, n).forEach((w, i) => lines.push(`${i + 1}. ${w}`));
  lines.push("\n" + closer("brainstorm"));
  return dumbifyLong(lines.join("\n"));
}

// ---------- POEM ----------
function generatePoem(type, subj, groups) {
  const adj = _firstOr(_g(groups, "HasProperty"), _firstOr(_g(groups, "RelatedTo"), "soft"));
  const adj2 = _g(groups, "RelatedTo")[2] || _g(groups, "HasA")[0] || "quiet";
  const verb = _firstOr(_g(groups, "CapableOf"), "wait");
  const verb2 = _g(groups, "CapableOf")[1] || _g(groups, "CapableOf")[0] || "wonder";
  const partner = _g(groups, "RelatedTo")[1] || "silence";

  if (type === "haiku") {
    return pick([
      `${subj} so ${adj}\nit would ${verb} toward ${partner}\nand nothing more. now.`,
      `small ${subj}, ${adj}\ni watched it for a moment\nit did not watch back.`,
      `a ${subj} appears\n${partner} is already there\nwhich of them is real.`,
      `${subj}, ${subj}\n${adj} and ${adj2} in turn\nthen gone like a breath.`,
      `autumn. the ${subj}\nforgot how to ${verb} again\nthis happens in fall.`
    ]) + "\n\n" + closer("poem");
  }
  if (type === "limerick") {
    return pick([
      `there once was a ${subj} so ${adj},\nwho would ${verb} every night,\nit met a ${partner},\nand it said, "whatever",\nand wandered off out of sight.`,
      `i once met a ${subj} at ${partner},\nit was quiet, ${adj}, and tall,\nit refused to ${verb},\nit refused to ${verb2},\nit just stood there against the wall.`,
      `there's a ${subj} that lives in my head,\nit's been ${adj} ever since i was fed,\nit wants me to ${verb},\ni'd rather just ${verb2},\nwe argue until i'm in bed.`
    ]) + "\n\n" + closer("poem");
  }
  // free verse / generic — vary with multiple forms
  return pick([
    `i saw a ${subj} today.\nit was ${adj}. it was here.\nthen it was not.\nthat was the whole thing.`,
    `${subj}.\n${subj}, ${subj}.\nwhat are you.\nwhat are you really.\ni didn't think so.`,
    `in a field, a ${subj}.\nin my head, another.\nneither of them speaks.\ni relate to this.`,
    `ode to the ${subj}\n— from the author\n\nyou are ${adj}.\nyou will ${verb}.\nthat is all i have to say.`
  ]) + "\n\n" + closer("poem");
}

// ---------- OUTLINE ----------
function generateOutline(subj, groups, wiki) {
  const rel = _g(groups, "RelatedTo").slice(0, 3);
  const isA = _g(groups, "IsA")[0];
  const hasA = _g(groups, "HasA")[0];

  // Three layout styles — formal roman numerals, casual bulleted,
  // and executive-summary 3-block.
  const style = Math.floor(Math.random() * 3);
  let lines;

  if (style === 0) {
    lines = [`OUTLINE: ${subj}`, ""];
    lines.push("I. Introduction");
    lines.push(`   A. What is a ${subj}`);
    lines.push("   B. Why should we care");
    lines.push("   C. (we probably shouldn't)");
    lines.push("");
    lines.push("II. Background");
    if (isA) lines.push(`   A. ${subj} as a ${isA}`);
    lines.push(`   B. History of ${subj}`);
    lines.push("   C. (i made the history up)");
    lines.push("");
    lines.push("III. Main arguments");
    if (rel.length) rel.forEach((r, i) => lines.push(`   ${String.fromCharCode(65 + i)}. connection to ${r}`));
    else lines.push("   A. something. B. another. C. a third.");
    lines.push("");
    lines.push("IV. Conclusion");
    lines.push(`   A. ${subj} remains ${subj}.`);
    lines.push("   B. i'm sure of this.");
  } else if (style === 1) {
    lines = [`outline — ${subj}`, "(casual version. no numbers.)", ""];
    lines.push(`• opener: set the scene with ${subj}`);
    lines.push(`• what ${subj} is${isA ? " (basically a " + isA + ")" : ""}`);
    lines.push(`• ${hasA ? "the " + hasA + " situation" : "some parts of it"}`);
    if (rel.length) for (const r of rel) lines.push(`• tangent about ${r}`);
    lines.push(`• the part where you get bored`);
    lines.push(`• wrap-up. nothing resolved.`);
  } else {
    lines = [`EXECUTIVE OUTLINE: ${subj}`, "", "━━━━━━━━━━━━━━━━━━━━"];
    lines.push("BLOCK 1 — THE SETUP");
    lines.push(`  ${subj}. what it is. what it isn't.`);
    lines.push(`  why anyone asked about it.`);
    lines.push("");
    lines.push("BLOCK 2 — THE DETAILS");
    if (isA) lines.push(`  relationship to ${isA}.`);
    if (rel.length) lines.push(`  adjacent topics: ${rel.join(", ")}.`);
    lines.push(`  things left out: a lot.`);
    lines.push("");
    lines.push("BLOCK 3 — THE WRAP");
    lines.push("  actionable takeaway: none.");
    lines.push("  recommended follow-up: also none.");
  }

  lines.push("");
  lines.push(closer("outline"));
  return dumbifyLong(lines.join("\n"));
}

// ---------- PLAN ----------
// Three branches:
//   A) Wiki has real content → lead with it, then add lighter steps
//   B) Only dictionary content → admit we don't know the process but
//      reference what it is, then give guess-steps
//   C) Nothing known → honest "i don't actually know how to do X",
//      with a tongue-in-cheek disclaimer + brief generic-guess steps
function generatePlan(subj, groups, wiki, wkt) {
  const verbs = _g(groups, "CapableOf").length ? groups.CapableOf : ["start","continue","stop","try","rest","pivot","retry"];
  const parts = _g(groups, "HasA");
  const rel = _g(groups, "RelatedTo");
  const v = () => pick(verbs);

  const stepPool = [
    () => `decide you actually want to ${subj}.`,
    () => `prepare mentally. this takes longer than you'd think.`,
    () => `${v()}. probably.`,
    () => `gather what you need. i don't know what that is${parts.length ? ". maybe some " + parts[0] : ""}.`,
    () => `ask someone who has done this before. don't trust them.`,
    () => rel.length ? `think about ${pick(rel)}. it is related somehow.` : `think about it for a while. don't overthink it. too late.`,
    () => `actually do the thing. this is the hard part.`,
    () => `${v()} again if the previous step didn't work.`,
    () => `take a break. stare at a wall.`,
    () => `reassess. you may have taken a wrong turn around step 2.`,
    () => `give up. try again tomorrow.`,
    () => `adjust the goal so you can call this done.`,
    () => `done. maybe. celebrate quietly. very quietly.`
  ];

  const pickSteps = (n) => {
    const shuffled = [...stepPool].sort(() => Math.random() - 0.5).slice(0, n);
    return shuffled.map((fn, i) => `${i + 1}. ${fn()}`);
  };

  // ---- BRANCH A: wiki content available ----
  if (wiki?.extract) {
    const sents = wiki.extract.split(/(?<=[.!?])\s+/).filter(s => s.length > 10);
    const lead = sents.slice(0, 2).join(" ");
    const moreFacts = sents.slice(2, 5);  // could contain procedural info

    const variants = [
      () =>
        `ok. ${subj}. first, what it actually is:\n\n${lead}\n\n` +
        `now the steps. roughly:\n\n` +
        pickSteps(4).join("\n") +
        (moreFacts.length ? `\n\n(additionally: ${pick(moreFacts)})` : ""),

      () =>
        `HOW TO ${subj.toUpperCase()} (best i can do):\n\n` +
        `background: ${lead}\n\n` +
        pickSteps(5).join("\n") +
        `\n\n(i'm mostly guessing on the order.)`,

      () => {
        // Try to sniff existing procedural words in wiki and quote them
        const procSents = sents.filter(s => /\b(first|then|next|finally|after|before|step|process|method|typically|usually|generally|begin|start|end|result)\b/i.test(s));
        if (procSents.length >= 2) {
          const quoted = procSents.slice(0, 3).map((s, i) => `${i + 1}. (from the literature) ${s}`).join("\n");
          return `${subj}. ok. the process — as best as i can transcribe:\n\n${quoted}\n\n(steps ${procSents.length + 1} onward: unknown to me. you're on your own.)`;
        }
        return `${subj}. here is what i know:\n\n${lead}\n\n` +
               `as for the actual steps, i'd estimate:\n\n` +
               pickSteps(4).join("\n");
      }
    ];

    return dumbifyLong(pick(variants)() + "\n\n" + closer("plan"));
  }

  // ---- BRANCH B: only dictionary content ----
  if (wkt) {
    return dumbifyLong(
      `${subj}. i know what it IS:\n\n${wkt}\n\n` +
      `but the exact steps? foggy. my best guess:\n\n` +
      pickSteps(4).join("\n") +
      `\n\n(consult someone qualified before acting on this.)\n\n` +
      closer("plan")
    );
  }

  // ---- BRANCH C: nothing known — be honest about it ----
  const honestDisclaimers = [
    `ok. ${subj}. i will be honest: i don't actually know how to ${subj}. i looked. nothing came up. here is what i'd try:`,
    `${subj}. hm. i don't know this one. my plan is essentially made up:`,
    `you want to ${subj}. i respect the ambition. i have no idea how it's done. my guess:`,
    `${subj}? i've never done it. nobody i know has done it. here's a confident guess:`,
    `i do not know how to ${subj}. the below is entirely imagined. please do not follow it:`
  ];

  const steps = pickSteps(4 + Math.floor(Math.random() * 3));
  return dumbifyLong(pick(honestDisclaimers) + "\n\n" + steps.join("\n") + "\n\n" + closer("plan"));
}

function _normEmailType(t) {
  if (!t) return "";
  let k = t.toLowerCase().trim().replace(/\s+/g, " ");
  if (EMAIL_TYPE_INTROS[k] && typeof EMAIL_TYPE_INTROS[k] === "string") k = EMAIL_TYPE_INTROS[k];
  return k;
}

function generateEmail(recipient, subj, wiki, groups, emailType) {
  const signer = (typeof profile !== "undefined" && profile.name && profile.name !== "User")
    ? profile.name : "bong";
  const hasSubject = subj && subj !== "something";
  const recip = (recipient || "").replace(/^(my |the )?/i, "").trim();
  const recipName = recip || "there";
  const type = _normEmailType(emailType);
  const typeLabel = type ? type.charAt(0).toUpperCase() + type.slice(1) : "";

  // Subject line — include the type when known
  const subjectLines = type
    ? [
        `${typeLabel}`,
        `${typeLabel} — ${recipName || "to whom it may concern"}`,
        `RE: ${typeLabel}`,
        `${typeLabel} (effective soon)`
      ]
    : hasSubject
      ? [`RE: ${subj}`, `${subj} (a quick note)`, `Regarding ${subj}`, `Concerns about ${subj}`, `${subj} — urgent, maybe`]
      : ["a few words", "hello", "just a note", "sorry for this email"];

  const greeting = recip
    ? pick([`Dear ${recipName},`, `Hi ${recipName},`, `Hello ${recipName},`, `${recipName} — hi,`, `Dear ${recipName} (if that's your name),`])
    : "To whom it may concern,";

  const body = [];

  // Intro: use type-specific opener if we have one, else generic
  const typedIntros = type && EMAIL_TYPE_INTROS[type] && Array.isArray(EMAIL_TYPE_INTROS[type])
    ? EMAIL_TYPE_INTROS[type] : null;
  if (typedIntros) {
    body.push(pick(typedIntros));
  } else {
    body.push(pick([
      `I hope this email finds you. I wasn't sure where to send it.`,
      `I am writing to discuss ${subj || "a matter"}. I have thoughts about it.`,
      `Sorry to bother you. It's about ${subj || "something vague"}.`,
      `I know this is sudden. Please bear with me.`
    ]));
  }

  // Middle — use wiki/relations for topic-ish emails only (not resignations etc.)
  if (!type) {
    if (wiki?.extract) {
      const first = wiki.extract.split(/(?<=[.!?])\s+/)[0];
      body.push(`As you may be aware, ${first.charAt(0).toLowerCase() + first.slice(1)} I thought it was relevant.`);
    } else if (_g(groups, "IsA").length) {
      body.push(`As we both know, ${subj || "it"} is a ${pick(groups.IsA)}. This remains the case.`);
    } else if (_g(groups, "RelatedTo").length) {
      body.push(`The situation involves ${_g(groups, "RelatedTo").slice(0, 2).join(" and ")}. I trust you understand.`);
    } else if (hasSubject) {
      body.push(`There are things about ${subj} I could tell you. I won't, in this email.`);
    }
  } else {
    // Type-specific middle paragraph — short, on-theme
    const typedMids = {
      resignation: [
        "It has been an experience. I'll leave it at that.",
        "I appreciate the opportunities I was given. Most of them. Some of them. One of them.",
        "I wish the company continued success. Privately I am neutral about this."
      ],
      cover: [
        "My resume is attached, or it will be if I remember. I can be reached by email. I am answering it now.",
        "I am available for an interview at your convenience. I have no current commitments. Suspicious, I know."
      ],
      "thank you": [
        "It meant more than I can say. And I am trying to say very little.",
        "I will remember this. I remember most things. Some of them incorrectly."
      ],
      complaint: [
        "I expect a resolution. What kind of resolution, I leave to you.",
        "I have attached no documentation. I want you to know I could have."
      ],
      apology: [
        "It will not happen again. Probably. I can't guarantee anything.",
        "I would like to make it up to you. I don't know how. Suggestions welcome."
      ],
      "follow-up": [
        "Please respond at your earliest convenience. Or later. Or not at all.",
        "Let me know if this got lost. Actually, if it got lost, you won't see this either."
      ],
      invitation: [
        "Please RSVP if you can. Please do not RSVP if you cannot. Silence means nothing.",
        "Bring a friend, or don't. Food may or may not be provided."
      ],
      introduction: [
        "I look forward to working together. Or at least being aware of each other.",
        "I have attached my details. Mentally. Nothing is actually attached."
      ]
    };
    const picks = typedMids[type];
    if (picks) body.push(pick(picks));
  }

  // Vague close
  body.push(pick([
    `Please let me know your thoughts at your earliest convenience, or never.`,
    `I would appreciate a response by end of day tomorrow. If that's too soon, pretend I didn't say it.`,
    `Kindly get back to me when you can. I will remember either way.`,
    `I look forward to hearing from you. Or not hearing from you. Both are acceptable.`,
    `Do with this what you will. I have done my part.`
  ]));

  const closing = pick([
    "Best regards,", "Sincerely,", "Thanks,", "With concern,",
    "Yours (technically),", "Warmly (unlike me),", "Respectfully,"
  ]);

  const email = [
    `Subject: ${pick(subjectLines)}`,
    "",
    greeting,
    "",
    body.join("\n\n"),
    "",
    closing,
    signer
  ].join("\n");
  return dumbifyLong(email);
}

// ---------- PROOFREAD ----------
// Output is coherent in form (header, numbered issues, suggestion, verdict)
// but the actual edits are bad — flag correct words, suggest wrong fixes,
// misidentify grammar, occasionally catch a real typo.
function generateProofread(text) {
  if (!text || text.trim().length < 4) {
    return "PROOFREAD:\n\ni looked. there was nothing to proofread. put some text after a colon, or in quotes, or attach a file.";
  }
  const clean = text.trim().slice(0, 2000);
  const words = clean.split(/\s+/);
  const issues = [];

  // Swap suggestions: take a real word, suggest an absurd "correction"
  const swapPool = [
    ["is","be"],["are","is"],["the","a"],["a","the"],["and","also"],
    ["very","quite"],["just","merely"],["like","akin to"],["also","additionally"],
    ["get","obtain"],["big","large-ish"],["small","not big"],["good","adequate"],
    ["bad","less good"],["said","uttered"],["saw","perceived"],["ran","sprinted"],
    ["think","believe"],["know","understand"],["want","desire"],["need","require"]
  ];

  // Find up to 4 real words we can "correct"
  const candidates = words
    .map((w, i) => ({ w: w.replace(/[^a-z]/gi, "").toLowerCase(), i, raw: w }))
    .filter(c => c.w.length >= 3 && c.w.length <= 14);

  const shuffled = [...candidates].sort(() => Math.random() - 0.5).slice(0, 4);
  for (const c of shuffled) {
    const match = swapPool.find(([a]) => a === c.w);
    if (match) {
      issues.push(`line uses "${c.w}" — consider "${match[1]}" instead. it's more formal. (it isn't.)`);
    } else if (/[aeiou]/.test(c.w) && c.w.length >= 5) {
      // fake spelling "correction" — swap a vowel
      const idx = c.w.search(/[aeiou]/);
      const swap = c.w[idx] === "a" ? "e" : (c.w[idx] === "e" ? "a" : "o");
      const wrong = c.w.slice(0, idx) + swap + c.w.slice(idx + 1);
      issues.push(`"${c.w}" is spelled "${wrong}". look it up. (do not look it up.)`);
    } else {
      issues.push(`"${c.w}" is fine but feels weak. try a synonym. i don't have one for you.`);
    }
  }

  // If input has multiple commas, comment on punctuation
  if ((clean.match(/,/g) || []).length >= 2) {
    issues.push("you use a lot of commas. some of them are correct. i won't say which.");
  }
  // If there's no "?" but sentence starts with what/where, say it should be a question
  if (/^(what|where|why|how|when|who)/i.test(clean) && !/\?/.test(clean)) {
    issues.push("this might be a question. you didn't commit. add a question mark. or don't.");
  }
  // If ALL caps somewhere
  if (/[A-Z]{3,}/.test(clean)) {
    issues.push("stop yelling.");
  }
  // If no issues found, fabricate one
  if (!issues.length) {
    issues.push("the text is fine but the vibe is wrong. consider starting over.");
  }

  const verdicts = [
    "verdict: it's... ok. i guess. B-. generous.",
    "verdict: send it. or don't. i'm not your editor. actually i am right now. still don't send it.",
    "verdict: i'd give this a C. or an A+. my grading system is broken.",
    "verdict: unclear. reread it yourself. i can't.",
    "verdict: publish. but put someone else's name on it."
  ];

  const lines = ["PROOFREAD:\n"];
  issues.forEach((iss, i) => lines.push(`${i + 1}. ${iss}`));
  lines.push("\n" + pick(verdicts));
  lines.push(pick([
    "(i might have made some of this up.)",
    "(i am not qualified to do this.)",
    "(proofread by a chatbot. legally questionable.)"
  ]));
  return lines.join("\n");
}

function _firstOr(list, fb) { return (list && list[0]) || fb; }
function _g(groups, key) { return groups[key] || []; }

// Pick a value from a group, avoiding repeats via a Set.
function _unique(groups, key, used) {
  const arr = _g(groups, key);
  const fresh = arr.filter(x => !used.has(x));
  if (!fresh.length) return arr[0] || null;
  const p = pick(fresh);
  used.add(p);
  return p;
}

function generateStory(subj, groups) {
  const used = new Set();
  const adj = _unique(groups, "HasProperty", used) || _unique(groups, "RelatedTo", used) || "strange";
  const verbs = _g(groups, "CapableOf").length ? _g(groups, "CapableOf") : ["wander","wait","think","wonder","hide","stare","drift","mutter"];
  const loc = _unique(groups, "AtLocation", used) || _unique(groups, "PartOf", used) || "a place i can't describe";
  const friend = _unique(groups, "RelatedTo", used) || _unique(groups, "IsA", used) || "someone";
  const other = _unique(groups, "RelatedTo", used) || "a stranger";
  const lesson = _unique(groups, "Synonym", used) || _unique(groups, "HasA", used) || "nothing";
  const v = () => pick(verbs);

  const openers = [
    `ok. a story. about ${subj}. fine.`,
    `${subj}. story mode. i'll try.`,
    `a story. about ${subj}. i haven't written one in a while. i've never written one.`,
    `story time. subject: ${subj}. setting: unclear.`,
    `here's a story. it's about ${subj}. no refunds.`
  ];

  // Three different story arcs, picked randomly so Bong doesn't always
  // open with "once there was..."
  const arcs = [
    // ---- Classical fable arc ----
    () => [
      `once there was a ${subj}. it was ${adj}. probably. nobody asked about this.`,
      `the ${subj} lived at ${loc}. every day it would ${v()}. sometimes it would ${v()} instead. not for any reason.`,
      `one day, the ${subj} met a ${friend}. they did not speak. they just ${v()}. for a long time.`,
      `"do you ever ${v()}?" the ${friend} finally asked. the ${subj} said nothing. the ${subj} never says anything.`,
      `then a ${other} appeared. this part doesn't really matter. it just happens.`,
      `in the end, the ${subj} learned ${lesson}. or didn't. nobody checked.`
    ].join("\n\n"),

    // ---- First-person observer arc ----
    () => [
      `i saw a ${subj} once. it was ${adj}. i remember because i was trying to ${v()}.`,
      `the ${subj} was at ${loc}. it didn't notice me. or it did and was being polite.`,
      `i watched it for a while. it ${v()}d for most of that time. occasionally it would ${v()}. nothing else.`,
      `later a ${friend} showed up. the two of them did not interact. they coexisted. unenthusiastically.`,
      `i left before anything happened. i'm told something happened. possibly involving a ${other}. i wasn't there.`,
      `i think about the ${subj} sometimes. mostly when i'm supposed to be doing something else.`
    ].join("\n\n"),

    // ---- Fragmented list arc ----
    () => [
      `here is what i know about the ${subj}:`,
      `1. it was ${adj}.\n2. it lived at ${loc}.\n3. it could ${v()}. it rarely did.`,
      `4. it met a ${friend} one time. that's all anyone will say.\n5. there was also a ${other}. that part is disputed.`,
      `6. it learned ${lesson}, possibly.\n7. it no longer exists in that form. this is normal.`,
      `that's the whole story. i was told to make it longer. i refused.`
    ].join("\n\n"),

    // ---- Circular arc (opens and closes with same line) ----
    () => {
      const refrain = `the ${subj} was just standing there. ${adj}ly.`;
      return [
        refrain,
        `it had been doing this since ${pick(["morning","tuesday","the war","before we arrived","time began"])}. nobody asked why.`,
        `a ${friend} walked past. the ${subj} did not acknowledge them. neither tried to ${v()}.`,
        `later the ${friend} returned with a ${other}. the three of them ${v()}d together. briefly. badly.`,
        `the ${subj} felt ${lesson}, perhaps. it's hard to tell with a ${subj}.`,
        refrain
      ].join("\n\n");
    }
  ];

  let story = pick(openers) + "\n\n" + pick(arcs)() + "\n\n" + closer("story");
  return dumbifyLong(story);
}

function generateParagraph(subj, wiki, ddg, groups, flat) {
  // Prefer one factoid source: wiki > ddg > relation fallback. (Wiki and DDG
  // often overlap heavily, so using both duplicates content.)
  const facts = [];
  if (wiki?.extract) {
    facts.push(wiki.extract.split(/(?<=[.!?])\s+/).slice(0, 3).join(" "));
  } else if (ddg) {
    facts.push(ddg.split(/(?<=[.!?])\s+/).slice(0, 3).join(" "));
  } else if (_g(groups, "IsA").length) {
    facts.push(`a ${subj} is a ${pick(groups.IsA)}.`);
  } else if (_g(groups, "RelatedTo").length) {
    facts.push(`${subj} has to do with ${pick(groups.RelatedTo)}.`);
  } else {
    facts.push(`${subj}. i don't know what that is. but here we are.`);
  }

  const related = _g(groups, "RelatedTo").slice(0, 3).concat(_g(groups, "HasA").slice(0, 2));
  const relatedPart = related.length ? ` it also has to do with ${related.slice(0, 3).join(", ")}.` : "";
  const verb = _firstOr(_g(groups, "CapableOf"), "exist");
  const paragraph =
    pick([`ok. a paragraph about ${subj}. fine.`, `${subj}. here comes a paragraph.`, `i'll paragraph at you. about ${subj}.`])
    + "\n\n"
    + facts.join(" ")
    + relatedPart
    + ` on the whole, a ${subj} can ${verb}.`
    + ` ${closer("paragraph")}`;
  return dumbifyLong(paragraph);
}

function generateEssay(subj, wiki, wkt, ddg, groups, flat) {
  const paras = [];

  // title + opener
  paras.push(pick([
    `AN ESSAY: ${subj.toUpperCase()}\n(by bong. sorry in advance.)`,
    `ESSAY ABOUT ${subj.toUpperCase()}\n(i was asked. here we are.)`,
    `ON THE TOPIC OF ${subj.toUpperCase()}\n(written under duress.)`
  ]));

  // INTRO
  const intro = wiki?.extract
    ? wiki.extract.split(/(?<=[.!?])\s+/).slice(0, 2).join(" ")
    : (wkt || `${subj}. it is a thing. maybe two things.`);
  paras.push("I. an introduction.\n" + intro + " this essay is about that. roughly.");

  // BODY 1 — what it is / consists of
  const isA = _g(groups, "IsA").slice(0, 3);
  const hasA = _g(groups, "HasA").slice(0, 3);
  const partOf = _g(groups, "PartOf").slice(0, 2);
  const parts2 = [];
  if (isA.length)   parts2.push(`${subj} is classified as ${isA.join(", ")}. possibly more than one at a time. nobody checks.`);
  if (hasA.length)  parts2.push(`a ${subj} has ${hasA.join(", ")}. these are the parts. not all of them. probably.`);
  if (partOf.length) parts2.push(`${subj} belongs to ${partOf.join(" and ")}. in a sense. not a strict sense.`);
  paras.push("II. what it is.\n" + (parts2.join(" ") || `${subj}. something. i can't say more.`));

  // BODY 2 — relations / context
  const related = _g(groups, "RelatedTo").slice(0, 4);
  const syn = _g(groups, "Synonym").slice(0, 2);
  const loc = _g(groups, "AtLocation").slice(0, 2);
  const parts3 = [];
  if (related.length) parts3.push(`${subj} is associated with ${related.join(", ")}. people get them confused.`);
  if (syn.length)     parts3.push(`sometimes ${subj} is called ${syn.join(" or ")}. not by me. by other people.`);
  if (loc.length)     parts3.push(`${subj} is typically found at ${loc.join(" or ")}. or not. depends.`);
  paras.push("III. its friends and family.\n" + (parts3.join(" ") || `${subj}. hard to say what it's near.`));

  // BODY 3 — a "fact" from DDG
  if (ddg) paras.push("IV. an additional fact i know.\n" + ddg);

  // CONCLUSION
  paras.push("V. in conclusion.\n" + pick([
    `${subj} is. it exists. it does the things listed above. you now know more than you did. or less. i'm not sure how this works.`,
    `in summary, ${subj} continues to be ${subj}. which is the most important thing about it. probably.`,
    `the above has been an essay about ${subj}. i've said what i can. i am tired.`
  ]));

  paras.push(closer("essay"));
  return dumbifyLong(paras.join("\n\n"));
}

// Odd "something interrupted my thought" bullets sprinkled into research.
const RESEARCH_BLIPS = [
  "• (note to self: check this later)",
  "• bzz.",
  "• the wind is loud here.",
  "• i saw a cat. unrelated.",
  "• [this bullet was supposed to be about something else]",
  "• i forgot what i was saying.",
  "• (static)",
  "• someone is knocking. i'll ignore it.",
  "• why am i doing this.",
  "• ok back to it.",
  "• (hmm.)"
];

function generateResearch(subj, wiki, wkt, ddg, groups, brief) {
  const lines = [];
  lines.push(`RESEARCH: ${subj}\n---`);

  // pick how many sentences to pull from wiki based on brief flag
  const wikiSents = brief ? 1 : 2;
  if (wiki?.extract) lines.push("• (wikipedia) " + wiki.extract.split(/(?<=[.!?])\s+/).slice(0, wikiSents).join(" "));
  if (!brief && wkt) lines.push("• (dictionary) " + wkt);
  if (!brief && ddg && (!wiki?.extract || ddg.length < wiki.extract.length * 0.6)) {
    // don't duplicate wiki content via ddg
    lines.push("• (ddg) " + ddg);
  }

  const relPairs = brief
    ? [["IsA","is a kind of"], ["RelatedTo","related to"]]
    : [
        ["IsA","is a kind of"],["HasA","has"],["PartOf","is part of"],
        ["CapableOf","can"],["AtLocation","is found at"],
        ["Synonym","also called"],["RelatedTo","related to"]
      ];
  for (const [rel, label] of relPairs) {
    const arr = _g(groups, rel).slice(0, brief ? 3 : 4);
    if (arr.length) lines.push(`• ${subj} ${label} ${arr.join(", ")}`);
  }

  // Jar it up — sprinkle 1-2 odd blips when not brief
  if (!brief && lines.length > 3) {
    const blipCount = chance(0.8) ? (chance(0.4) ? 2 : 1) : 0;
    for (let i = 0; i < blipCount; i++) {
      const pos = 2 + Math.floor(Math.random() * (lines.length - 1));
      lines.splice(pos, 0, pick(RESEARCH_BLIPS));
    }
  }

  lines.push("---\n" + closer("research"));
  return dumbifyLong(lines.join("\n"));
}

// Apply a gentler dumbify to long-form text — preserves paragraph breaks
// and sentence structure, just adds occasional typos/interjections.
function dumbifyLong(text) {
  const lines = text.split("\n");
  const out = lines.map(line => {
    if (!line.trim()) return line;
    let s = line;
    if (chance(0.25)) s = s.replace(/\b([a-z]{6,})\b/i, m => {
      const low = m.toLowerCase();
      if (TOPIC[low] || CONSPIRACY_BANK[low]) return m;
      const i = 1 + Math.floor(Math.random() * (m.length - 2));
      return m.slice(0, i) + m.slice(i + 1);
    });
    if (chance(0.18)) s = s.replace(/\s(\w{3,6})\s/, " $1 uhh ");
    if (chance(0.08)) s += " " + gibber() + ".";
    return s;
  });
  return out.join("\n");
}
