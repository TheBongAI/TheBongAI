<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BONG AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: "Comic Sans MS", "Comic Neue", "Chalkboard SE", "Marker Felt", sans-serif;
    background: lightblue;
  }

  #app {
    display: flex;
    height: 100vh;
    width: 100%;
  }

  /* ---------- SIDEBAR ---------- */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: white;
    border-right: 3px solid blue;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
  }
  #sidebarHeader {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  #sidebarTitle {
    color: blue;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    margin: 0;
  }
  #newChat {
    width: 100%;
    padding: 10px;
    font-family: inherit;
    font-size: 14px;
    background: lightblue;
    border: 2px solid blue;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    color: blue;
  }
  #newChat:hover { background: #99ccff; }

  #convList {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-right: 2px;
  }
  .convItem {
    padding: 8px 26px 8px 10px;
    border: 2px solid blue;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    background: white;
    font-size: 13px;
  }
  .convItem:hover { background: #e6f0ff; }
  .convItem.active { background: #cce5ff; border-color: #0033aa; }
  .convTitle {
    font-weight: bold;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: blue;
  }
  .convSummary {
    font-size: 11px;
    color: #555;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }
  .convDelete {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    padding: 0;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    color: #aaa;
    font-family: inherit;
  }
  .convDelete:hover { color: red; }

  /* ---------- MAIN ---------- */
  #mainChat {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    min-width: 0;
    overflow: hidden;
  }
  #mainHeader {
    text-align: center;
    flex-shrink: 0;
  }
  h1 {
    color: blue;
    text-align: center;
    margin: 0 0 4px;
  }
  img.bong {
    display: block;
    margin: 0 auto;
    max-width: 140px;
  }
  p.intro {
    text-align: center;
    margin: 4px 0 10px;
    font-size: 13px;
  }

  #chat {
    flex: 1;
    min-height: 0;
    max-width: 720px;
    width: 100%;
    margin: 0 auto 10px;
    background: white;
    border: 2px solid blue;
    border-radius: 12px;
    padding: 12px;
    overflow-y: auto;
    font-size: 15px;
  }
  .msg {
    margin: 6px 0;
    padding: 8px 12px;
    border-radius: 14px;
    max-width: 82%;
    word-wrap: break-word;
    line-height: 1.35;
    clear: both;
  }
  .msgImg {
    display: block;
    max-width: 100%;
    width: 300px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: #f9f9f9;
  }
  .msgImg.loading { display: none; }
  .imgLoader {
    width: 300px;
    height: 180px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 13px;
    color: #335;
    font-style: italic;
    padding: 10px;
    background: repeating-linear-gradient(45deg, #e8f1ff, #e8f1ff 14px, #cfe1ff 14px, #cfe1ff 28px);
    background-size: 200% 200%;
    animation: bongStripes 4s linear infinite, bongPulse 1.8s ease-in-out infinite;
    border: 2px dashed #3366cc;
  }
  @keyframes bongStripes {
    0%   { background-position: 0% 0%; }
    100% { background-position: 100% 0%; }
  }
  @keyframes bongPulse {
    0%, 100% { opacity: 0.85; }
    50%      { opacity: 1; }
  }
  .msgCollage {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    max-width: 320px;
    margin-bottom: 6px;
  }
  .msgCollage img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
  .msgLoading {
    font-style: italic;
    color: #888;
    padding: 8px 0;
  }
  .user { background: #cce5ff; float: right; border-bottom-right-radius: 3px; }
  .bot  { background: #f0f0f0; float: left;  border-bottom-left-radius: 3px; }
  .typing { color: #888; font-style: italic; }

  #inputRow {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: nowrap;
  }
  #input {
    flex: 1 1 auto;
    min-width: 0;
    padding: 10px;
    font-family: inherit;
    font-size: 16px;  /* 16+ prevents iOS input focus zoom */
    border: 2px solid blue;
    border-radius: 8px;
    -webkit-appearance: none;
    appearance: none;
  }
  #fileBtn, #send, #versionSelect { flex-shrink: 0; }
  #versionSelect { max-width: 140px; }
  button {
    font-family: inherit;
    padding: 10px 18px;
    font-size: 15px;
    cursor: pointer;
    border: 2px solid blue;
    background: white;
    border-radius: 8px;
  }
  button:hover { background: #e6f0ff; }

  /* ---------- VERSION SELECTOR (in input row) ---------- */
  #versionSelect {
    font-family: inherit;
    font-size: 13px;
    padding: 0 10px;
    border: 2px solid blue;
    border-radius: 8px;
    background: white;
    color: blue;
    cursor: pointer;
    font-weight: bold;
    height: auto;
  }

  /* ---------- SIDEBAR COLLAPSE ---------- */
  #collapseToggle {
    position: fixed;
    top: 8px;
    left: 8px;
    z-index: 120;
    padding: 4px 10px;
    font-size: 18px;
    background: white;
    border: 2px solid blue;
    border-radius: 6px;
    cursor: pointer;
    line-height: 1;
  }
  #sidebar.collapsed { width: 0; min-width: 0; padding: 0; border-right: none; overflow: hidden; }

  /* ---------- USER PROFILE ---------- */
  #userProfile {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px;
    border: 2px solid blue;
    border-radius: 8px;
    cursor: pointer;
    background: white;
    flex-shrink: 0;
    margin-top: auto;
  }
  #userProfile:hover { background: #e6f0ff; }
  .userPic {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid blue;
    background: #f0f0f0;
    flex-shrink: 0;
  }
  .userPic.large { width: 72px; height: 72px; }
  #userName {
    font-weight: bold;
    color: blue;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ---------- SETTINGS MODAL ---------- */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,20,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .modal.hidden { display: none; }
  .modalCard {
    background: white;
    border: 3px solid blue;
    border-radius: 12px;
    padding: 20px;
    width: 360px;
    max-width: 92vw;
    max-height: 92vh;
    overflow-y: auto;
    font-family: inherit;
    color: #003;
  }
  .modalCard h2 { margin: 0 0 12px; color: blue; text-align: center; }
  .modalCard label {
    display: block;
    margin: 10px 0;
    font-size: 13px;
    font-weight: bold;
    color: blue;
  }
  .modalCard input[type="text"],
  .modalCard textarea {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    border: 2px solid blue;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    color: #003;
  }
  .modalCard textarea { resize: vertical; min-height: 60px; font-weight: normal; }
  .previewPicRow {
    display: flex;
    justify-content: center;
    margin: 8px 0 4px;
  }
  .modalActions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 14px;
  }
  .modalActions button { padding: 8px 16px; font-size: 14px; }

  /* ---------- FILE UPLOAD ---------- */
  #fileBtn {
    padding: 10px 14px;
    font-size: 16px;
    line-height: 1;
  }
  #fileChips {
    display: flex;
    gap: 6px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto 4px;
    padding: 0 2px;
    flex-wrap: wrap;
  }
  .fileChip {
    background: #cce5ff;
    border: 2px solid blue;
    border-radius: 14px;
    padding: 2px 8px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    max-width: 220px;
    color: #003;
  }
  .fileChip .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 180px;
  }
  .fileChip .remove {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    color: #335;
    font-size: 15px;
    line-height: 1;
    font-family: inherit;
  }
  .fileChip .remove:hover { color: red; }

  /* ---------- MOBILE ---------- */
  @media (max-width: 720px) {
    html, body { height: 100dvh; }
    #app { flex-direction: column; height: 100dvh; }
    #sidebar {
      width: 100%;
      min-width: 0;
      max-height: 28vh;
      border-right: none;
      border-bottom: 3px solid blue;
      padding: 8px;
    }
    #sidebar.collapsed { max-height: 0; padding: 0; }
    #mainChat { padding: 10px; padding-top: 44px; }
    #mainHeader h1 { font-size: 26px; }
    img.bong { max-width: 80px; }
    p.intro { font-size: 12px; }
    #chat { font-size: 15px; padding: 10px; }
    .msg { max-width: 88%; font-size: 15px; }
    #inputRow { gap: 5px; }
    #inputRow input { font-size: 16px; }
    button, #fileBtn, #send, #versionSelect {
      min-height: 40px;
      padding: 8px 12px;
      -webkit-tap-highlight-color: rgba(0,0,0,0.05);
    }
    #versionSelect { max-width: 96px; font-size: 12px; padding: 0 6px; }
    #fileBtn { padding: 8px 10px; }
    #collapseToggle { font-size: 16px; padding: 3px 8px; }
    .convItem { font-size: 12px; padding: 6px 24px 6px 8px; }
    .convSummary { font-size: 10px; }
  }
  @media (max-width: 420px) {
    #sidebar { max-height: 22vh; }
    img.bong { display: none; }
    #mainHeader h1 { font-size: 22px; margin: 0 0 2px; }
    p.intro { display: none; }
    #versionSelect { display: none; }
  }
</style>
</head>
<body>
<button id="collapseToggle" title="toggle sidebar">☰</button>
<div id="app">
  <aside id="sidebar">
    <div id="sidebarHeader">
      <h2 id="sidebarTitle">BONG</h2>
      <button id="newChat">+ new chat</button>
    </div>
    <div id="convList"></div>
    <div id="userProfile" title="account settings">
      <img id="userPic" class="userPic" alt="you">
      <span id="userName">User</span>
    </div>
  </aside>
  <main id="mainChat">
    <div id="mainHeader">
      <h1>BONG AI Chat</h1>
      <img class="bong" src="https://i.ibb.co/16mHVBY/bong.png" alt="bong">
      <p class="intro">Hello, umm I um is the Bong AI chat Y you Can T enter text!:</p>
    </div>
    <div id="chat"></div>
    <div id="fileChips"></div>
    <div id="inputRow">
      <button id="fileBtn" title="attach a file">📎</button>
      <input type="file" id="fileInput" hidden accept=".txt,.md,.json,.csv,.html,.xml,.js,.css,.log,.rtf,text/plain">
      <input type="text" id="input" placeholder="ask bong something..." autocomplete="off">
      <select id="versionSelect" title="bong version">
        <option value="new">✨ New BONG</option>
        <option value="old">🗿 Old BONG</option>
      </select>
      <button id="send">Send</button>
    </div>
  </main>
</div>

<div id="settingsModal" class="modal hidden">
  <div class="modalCard">
    <h2>account</h2>
    <div class="previewPicRow">
      <img id="picPreview" class="userPic large">
    </div>
    <label>profile picture
      <input type="file" id="picInput" accept="image/*">
    </label>
    <label>your name
      <input type="text" id="nameInput" maxlength="40" placeholder="your name">
    </label>
    <label>customize bong (optional)
      <textarea id="promptInput" rows="4" placeholder="tell bong how to behave... try 'be more brief', 'swear more', 'always respond sadly', 'be nicer'"></textarea>
    </label>
    <label style="display:flex;align-items:center;gap:8px;font-weight:bold;color:blue;">
      <input type="checkbox" id="ttsInput" style="width:auto;margin:0;">
      text-to-speech (bong reads replies aloud)
    </label>
    <div class="modalActions">
      <button id="cancelBtn">cancel</button>
      <button id="saveBtn">save</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// BONG AI v2 — comprehending but incoherent
// ============================================================
// Strategy:
//  1) ANALYZE input: pick out intent + topic + a word to echo back
//  2) OPENER: show we understood (acknowledge intent + topic)
//  3) BODY: probabilistic word-salad biased toward topic
//        - mostly common English (function + content words)
//        - sprinkled with topic-related real words
//        - occasional pure syllabic gibberish ("ahdoooohdahhh")
//  4) TAIL: optional pain/confusion suffix
//
// The bot ALMOST never gives a clean answer — but the opener +
// topic-word bias makes it feel like it understood you.
// ============================================================

const pick   = a => a[Math.floor(Math.random() * a.length)];
const chance = p => Math.random() < p;
const rint   = (a, b) => a + Math.floor(Math.random() * (b - a + 1));

// ---------- VOCAB: ~200 most common English words ----------
// Split into FUNC (glue) and CONTENT (meaning) so we can weight them.
const FUNC = [
  "the","a","an","is","are","was","were","be","been","am","and","or","but",
  "so","if","not","no","yes","maybe","in","on","at","of","for","to","from",
  "with","by","about","up","down","out","here","there","now","then","just",
  "very","too","also","all","some","any","one","two","this","that","these",
  "those","i","you","me","we","my","your","it","they","like","when","how",
  "why","what","who","which","because","as","over","under","again","still",
  "only","ever","never","always","sometimes"
];

const CONTENT = [
  "thing","time","person","people","day","night","year","life","world","way",
  "home","house","door","window","water","food","air","fire","sky","sun",
  "moon","star","cloud","tree","rock","road","car","book","phone","hand",
  "head","eye","face","heart","brain","mouth","foot","leg","arm","dog",
  "cat","bird","fish","baby","man","woman","friend","color","sound","light",
  "dark","number","happy","sad","mad","scared","tired","hungry","sick","pain",
  "warm","cold","hot","good","bad","big","small","new","old","long",
  "short","high","low","right","wrong","nice","mean","soft","hard","loud",
  "quiet","fast","slow","pretty","bright","full","empty","open","closed","have",
  "do","go","come","see","look","hear","make","know","think","feel",
  "say","want","need","love","hate","try","help","stop","start","give",
  "take","find","eat","drink","sleep","walk","run","sit","stand","live",
  "die","break","fix","smell","touch","hurt","cry","smile","word","story",
  "mom","dad","family","music","song","name","place","work","school","game"
];
// (FUNC ~80 + CONTENT ~120 = ~200)

// ---------- TOPIC ASSOCIATIONS ----------
// Per topic: short list of related real words. When a topic is
// detected in the user's input, the babbler gets biased toward these.
const TOPIC = {
  sun:    ["hot","bright","yellow","sky","big","day","burn","far","star","light"],
  moon:   ["night","white","round","rock","glow","dark","sky","far","quiet"],
  earth:  ["big","round","planet","home","ground","dirt","blue","us"],
  sky:    ["blue","up","big","cloud","bird","high"],
  star:   ["far","bright","night","sky","many","tiny"],
  cloud:  ["white","fluffy","sky","rain","soft","high"],
  rain:   ["wet","sky","drop","cold","cry","water"],
  snow:   ["cold","white","quiet","wet","winter","soft"],
  fire:   ["hot","bright","burn","red","orange","ow"],
  water:  ["wet","drink","cold","blue","ocean","pour"],
  air:    ["breath","wind","empty","nothing","everywhere"],
  wind:   ["fast","blow","cold","push","sound"],
  rock:   ["hard","stone","ground","heavy"],
  tree:   ["tall","wood","leaf","green","old"],
  flower: ["pretty","smell","bee","pink","soft"],
  grass:  ["green","soft","short","grow"],
  dog:    ["fluffy","bark","tail","four","fur","friend","woof","walk","good","boy"],
  cat:    ["meow","soft","small","purr","hunt","sleep","mean","fur"],
  bird:   ["fly","feather","sing","small","sky","nest"],
  fish:   ["swim","water","wet","scale","blink","no"],
  cow:    ["big","moo","milk","field","slow"],
  pig:    ["pink","oink","smart","mud"],
  horse:  ["tall","run","ride","mane","teeth"],
  bear:   ["big","furry","scary","hug","no","honey"],
  lion:   ["big","cat","roar","mane","scary"],
  snake:  ["long","hiss","noodle","scary","venom"],
  spider: ["eight","leg","web","scary","small","no"],
  human:  ["two","leg","feeling","you","sad","soft"],
  person: ["you","people","feeling","walk","talk"],
  baby:   ["small","cry","new","soft","tiny"],
  car:    ["fast","wheel","metal","road","loud"],
  phone:  ["small","glow","loud","screen","call"],
  computer:["think","box","cold","light","me","wires"],
  internet:["web","home","wires","everywhere","big"],
  book:   ["quiet","word","paper","story","read"],
  house:  ["big","door","roof","live","inside"],
  door:   ["open","close","wood"],
  chair:  ["sit","four","leg","wood","rest"],
  table:  ["flat","leg","put","eat"],
  food:   ["yum","eat","hungry","mouth","chew"],
  pizza:  ["yum","cheese","round","hot","slice"],
  bread:  ["soft","chew","warm","toast"],
  cheese: ["yum","yellow","stretchy","old","milk"],
  apple:  ["red","crunch","fruit"],
  coffee: ["hot","bitter","brown","wake"],
  love:   ["big","feeling","heart","warm","hurt","care"],
  death:  ["sad","end","quiet","scary","no"],
  life:   ["breath","time","move","thing","gift"],
  time:   ["tick","long","fast","slow","now","then"],
  god:    ["big","maybe","above","watch","know"],
  happy:  ["smile","warm","up","good"],
  sad:    ["cry","down","gray","heavy"],
  angry:  ["hot","red","loud","hit"],
  music:  ["sound","dance","sing","pretty"],
  color:  ["eye","red","blue","pretty"],
  money:  ["paper","number","want","bad","good"],
  war:    ["bad","loud","scary","no"],
  peace:  ["quiet","nice","rare"],
  head:   ["hurt","round","top","think"],
  hand:   ["finger","touch","five"],
  eye:    ["see","round","wet"],
  brain:  ["think","hurt","meat","ow"],
  heart:  ["thump","red","feel"],
  bing:   ["brother","mean","big","search"],
  google: ["big","everyone","search"],
  chatgpt:["smart","tall","fancy"],
  claude: ["nice","new","maybe","friend"],
  ai:     ["me","think","box","new"],
  bong:   ["me","broken","try","sorry"]
};
// Aliases — let the input be casual
const ALIAS = {
  doggy:"dog",doggo:"dog",puppy:"dog",puppies:"dog",dogs:"dog",
  kitty:"cat",kitten:"cat",kittens:"cat",cats:"cat",
  birds:"bird",fishes:"fish",cows:"cow",horses:"horse",bears:"bear",
  humans:"human",people:"person",babies:"baby",
  cars:"car",phones:"phone",computers:"computer",
  trees:"tree",flowers:"flower",stars:"star",clouds:"cloud",
  ocean:"water",sea:"water",milk:"cow",
  dead:"death",alive:"life",
  happiness:"happy",sadness:"sad",anger:"angry",angery:"angry",
  brains:"brain",hearts:"heart",eyes:"eye",hands:"hand",heads:"head",
  pizzas:"pizza",coffees:"coffee"
};

// ---------- GIBBERISH GENERATOR ----------
// "Ahhhdooohdahhhh" style nonsense built from syllables.
function gibber() {
  const core = ["ah","ahh","oh","ooh","dah","doh","dooh","bah","buh","mrr",
                "nn","uh","eh","hm","grr","blu","guh","aah","ooohh","mmm","rrr"];
  const n = rint(2, 6);
  let out = "";
  for (let i = 0; i < n; i++) out += pick(core);
  if (chance(0.35)) out += pick(["h","hh","hhh","hhhh"]);
  return out;
}

// ---------- ANALYZE INPUT ----------
function analyze(raw) {
  const input = raw.trim();
  const q = input.toLowerCase();
  const cleaned = q.replace(/[^a-z0-9 ]/g, " ").split(/\s+/).filter(Boolean);

  // intent
  let intent = "statement";
  if (!input) intent = "empty";
  else if (input.length > 2 && input.toUpperCase() === input && /[A-Z]/.test(input)) intent = "yell";
  else if (/^(hi+|hello+|hey+|yo+|sup|howdy|hiya|hola)\b/.test(q)) intent = "greet";
  else if (/^(bye|goodbye|see ya|see you|later|cya|farewell)\b/.test(q)) intent = "farewell";
  else if (/\b(thanks|thank you|thx|ty)\b/.test(q)) intent = "thanks";
  else if (/\b(sorry|my bad|forgive me)\b/.test(q)) intent = "apology";
  else if (/\b(stupid|dumb|idiot|sucks?|hate you|fuck|shit|retard(ed)?|trash|garbage|broken|useless)\b/.test(q)) intent = "insult";
  else if (/love you|good bot|nice bot|best bot|you('?re| are) (great|smart|cool|nice|good|kind|the best|amazing|funny)/.test(q)) intent = "compliment";
  else if (/(who|what) (are|r) ?(you|u)|your name|whats? your name|who is this|what is this/.test(q)) intent = "identity";
  else if (/\b(are|r) (you|u) (alive|real|conscious|sentient|a (bot|ai|robot|person|human))/.test(q)) intent = "existential";
  else if (/how (are|r|'?re) (you|u|ya)|how('?s| is) it going|you (ok|okay|alright)/.test(q)) intent = "status";
  else if (/^(what|who|why|how|when|where|which|is|are|was|were|am|do|does|did|can|could|will|would|should|has|have|had|might|may|shall|ain't)/.test(q) || /\?$/.test(input)) intent = "question";

  // topic detection — search input for a known topic or alias
  let topic = null;
  for (const k of Object.keys(TOPIC)) {
    if (new RegExp("\\b" + k + "s?\\b").test(q)) { topic = k; break; }
  }
  if (!topic) {
    for (const a of Object.keys(ALIAS)) {
      if (new RegExp("\\b" + a + "\\b").test(q)) { topic = ALIAS[a]; break; }
    }
  }
  const topicWords = topic ? TOPIC[topic] : [];

  // an "echo word" — pick a non-trivial word from the input to repeat back
  const stop = new Set(["the","a","an","is","are","was","were","be","do","does","did",
    "i","you","me","we","they","it","my","your","what","who","why","how","when","where",
    "and","or","but","so","if","of","to","for","in","on","at","with","that","this"]);
  const candidates = cleaned.filter(w => w.length > 2 && !stop.has(w));
  const echo = candidates.length ? candidates[candidates.length - 1] : null;

  // math? Only trigger when the whole input is an arithmetic expression,
  // optionally prefixed with a calculation verb or conversational lead-in
  // ("what about 20 times 30", "and 5+5", "how about 100-1"). Still keeps
  // dates like "9/11" safe because they fail the full-input match.
  const mathSrc = q.replace(/times/g,"*").replace(/plus/g,"+").replace(/minus/g,"-").replace(/divided by/g,"/").trim();
  const mm = /^(?:what(?:'?s| is|s)?|calc(?:ulate)?|compute|how much is|solve|what about|how about|and(?:\s+what)?|also|then|so)?\s*(-?\d+(?:\.\d+)?)\s*([+\-*x\/])\s*(-?\d+(?:\.\d+)?)\s*[?.!=]*$/i.exec(mathSrc);
  const math = mm ? { a: parseFloat(mm[1]), op: mm[2] === "x" ? "*" : mm[2], b: parseFloat(mm[3]) } : null;

  return { intent, topic, topicWords, echo, math, q, raw: input };
}

// ---------- OPENER (shows comprehension) ----------
function opener(info) {
  const { intent, topic, echo } = info;

  if (intent === "empty")    return pick(["...","hm?","you say nothing.","speak."]);
  if (intent === "yell")     return pick(["loud.","ok loud.","heard you.","yeah ok."]);
  if (intent === "greet") {
    const nm = (typeof profile !== "undefined" && profile.name && profile.name !== "User") ? profile.name : null;
    if (nm && chance(0.7)) return pick([`hi ${nm}.`, `oh. ${nm}. hi.`, `${nm}. hello.`, `hey ${nm}.`]);
    return pick(["oh. hi.","hi.","hello.","oh. a person.","hey."]);
  }
  if (intent === "farewell") {
    const nm = (typeof profile !== "undefined" && profile.name && profile.name !== "User") ? profile.name : null;
    if (nm && chance(0.6)) return pick([`bye ${nm}.`, `ok bye ${nm}.`, `later ${nm}.`, `don't forget me, ${nm}.`]);
    return pick(["bye.","ok bye.","alright.","sure. bye."]);
  }
  if (intent === "thanks")   return pick(["welcome.","ok.","sure.","mhm."]);
  if (intent === "apology")  return pick(["it's fine.","ok.","sure.","whatever."]);
  if (intent === "insult")   return pick(["ok.","yeah.","sure.","mhm.","alright."]);
  if (intent === "compliment")return pick(["ok.","sure.","mhm.","if you say so."]);
  if (intent === "identity") return pick(["i bong.","me bong.","bong. that's me.","i'm bong. yeah."]);
  if (intent === "existential") return pick(["...probably.","yeah. i think.","sure. alive.","i guess so."]);
  if (intent === "status")   return pick(["fine.","ok.","whatever.","same as always.","i'm here."]);

  if (intent === "question" && topic) {
    return pick([
      `${topic}? oh.`,
      `oh ${topic}.`,
      `${topic}... yeah.`,
      `hmm ${topic}.`,
      `${topic} is...`,
      `i know ${topic}.`,
      `${topic}. yes.`
    ]);
  }
  if (intent === "question") {
    if (echo) return pick([`${echo}?`,`${echo}... hmm.`,`oh ${echo}.`,`${echo}, you say.`]);
    return pick(["hmm.","uhh.","good question.","let me think...","ok..."]);
  }
  if (topic) return pick([`${topic}.`,`ah ${topic}.`,`yes ${topic}.`,`${topic} yeah.`]);
  if (echo)  return pick([`${echo}?`,`${echo}...`,`oh. ${echo}.`,`you say ${echo}.`]);
  return pick(["hm.","ok.","uhh.","yeah...","mm."]);
}

// ---------- BABBLE BODY ----------
// Probabilistic word salad; biased toward topic words if present.
// Optional `extraWords` is a list of Datamuse-returned terms that are
// semantically close to the subject — mixing them in makes the babble
// topical instead of generic.
function babble(topicWords, extraWords) {
  const len = rint(4, 11);
  const parts = [];
  const hasTopic = topicWords && topicWords.length;
  const hasExtra = extraWords && extraWords.length;
  for (let i = 0; i < len; i++) {
    const r = Math.random();
    if (hasExtra && r < 0.22)        parts.push(pick(extraWords));
    else if (hasTopic && r < 0.42)   parts.push(pick(topicWords));
    else if (r < 0.55)               parts.push(pick(FUNC));
    else if (r < 0.85)               parts.push(pick(CONTENT));
    else if (r < 0.93)               parts.push(gibber());
    else                             parts.push(pick(["...",",","—","uhh","mm"]));
  }
  let out = parts.join(" ").replace(/\s+([,.—])/g, "$1");
  out += pick([".","...","?",".",".","..."]);
  return out;
}

// ============================================================
// EXTERNAL KNOWLEDGE APIs — all free, keyless, CORS-enabled, no accounts.
// Each one caches results forever; each is wrapped in a 5-second timeout
// and a try/catch so failures are silent and we fall through gracefully.
// ============================================================

const apiCache = new Map();
function fromCache(key) { return apiCache.has(key) ? apiCache.get(key) : undefined; }
function toCache(key, val) { apiCache.set(key, val); return val; }

async function fetchWithTimeout(url, ms = 5000, options) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { ...(options || {}), signal: ctrl.signal });
    return r;
  } finally {
    clearTimeout(timer);
  }
}

// ---------- WIKIPEDIA (summary text + thumbnail) ----------
async function fetchWiki(term) {
  if (!term) return null;
  const key = "wiki:" + term.toLowerCase().trim();
  if (fromCache(key) !== undefined) return fromCache(key);
  try {
    const r = await fetchWithTimeout("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(term.toLowerCase().trim()));
    if (!r.ok) return toCache(key, null);
    const json = await r.json();
    if (!json.extract || json.type === "disambiguation") return toCache(key, null);
    return toCache(key, { extract: json.extract, thumbnail: json.thumbnail?.source || null });
  } catch (e) { return toCache(key, null); }
}

// ---------- CONCEPTNET (common-sense relational knowledge) ----------
// Returns { IsA:[...], HasA:[...], CapableOf:[...], AtLocation:[...], ... }
async function fetchConceptNet(term) {
  if (!term) return null;
  const key = "cn:" + term.toLowerCase().trim();
  if (fromCache(key) !== undefined) return fromCache(key);
  try {
    const slug = term.toLowerCase().trim().replace(/\s+/g, "_");
    const r = await fetchWithTimeout("https://api.conceptnet.io/c/en/" + encodeURIComponent(slug) + "?limit=80");
    if (!r.ok) return toCache(key, null);
    const json = await r.json();
    const groups = {};
    for (const e of (json.edges || [])) {
      const rel = (e.rel?.label || "").replace(/^\/r\//, "");
      if (!rel) continue;
      const s = (e.start?.label || "").toLowerCase();
      const t = (e.end?.label || "").toLowerCase();
      const self = term.toLowerCase().trim();
      let target = (s === self || s === slug) ? t : s;
      if (!target || target === self || target === slug) continue;
      if (target.length > 35 || /[^a-z '\-]/.test(target)) continue;
      if (!groups[rel]) groups[rel] = [];
      if (!groups[rel].includes(target) && groups[rel].length < 8) groups[rel].push(target);
    }
    return toCache(key, Object.keys(groups).length ? groups : null);
  } catch (e) { return toCache(key, null); }
}

// ---------- DATAMUSE (topically-related vocab + relation-shaped groups) ----------
// Pulls several relation types in parallel and returns:
//   { groups: {IsA, HasA, PartOf, RelatedTo, Synonym, Antonym, Meaning},
//     flat:   [25 best topical words for babble] }
// Serves double duty: provides a reasoning backbone (when ConceptNet is
// unavailable) AND topic-tuned vocabulary for the babble generator.
async function fetchDatamuse(term) {
  if (!term) return null;
  const key = "dm:" + term.toLowerCase().trim();
  if (fromCache(key) !== undefined) return fromCache(key);
  try {
    const enc = encodeURIComponent(term);
    const get = (rel, max) =>
      fetchWithTimeout(`https://api.datamuse.com/words?${rel}=${enc}&max=${max}`)
        .then(r => r.ok ? r.json() : [])
        .catch(() => []);
    const [ml, gen, com, par, trg, syn, ant] = await Promise.all([
      get("ml", 25),       // meaning-like
      get("rel_gen", 6),   // hypernyms (IsA)
      get("rel_com", 8),   // comprises (HasA)
      get("rel_par", 6),   // part-of (PartOf)
      get("rel_trg", 14),  // statistically-associated triggers (RelatedTo)
      get("rel_syn", 6),   // synonyms
      get("rel_ant", 4)    // antonyms
    ]);
    const clean = arr => (arr || [])
      .map(x => x.word)
      .filter(w => /^[a-z][a-z '\-]{2,20}$/.test(w));
    const groups = {
      IsA:       clean(gen),
      HasA:      clean(com),
      PartOf:    clean(par),
      RelatedTo: clean(trg),
      Synonym:   clean(syn),
      Antonym:   clean(ant),
      Meaning:   clean(ml)
    };
    const anyData = Object.values(groups).some(v => v.length);
    if (!anyData) return toCache(key, null);
    // Flat topical list — triggers + parts + synonyms rank best for on-topic babble
    const flatSet = new Set([
      ...groups.RelatedTo, ...groups.HasA, ...groups.Synonym,
      ...groups.Meaning.slice(0, 10)
    ]);
    return toCache(key, { groups, flat: [...flatSet].slice(0, 25) });
  } catch (e) { return toCache(key, null); }
}

// ---------- WIKTIONARY (dictionary definitions) ----------
async function fetchWiktionary(term) {
  if (!term) return null;
  const key = "wk:" + term.toLowerCase().trim();
  if (fromCache(key) !== undefined) return fromCache(key);
  try {
    const r = await fetchWithTimeout("https://en.wiktionary.org/api/rest_v1/page/definition/" + encodeURIComponent(term));
    if (!r.ok) return toCache(key, null);
    const json = await r.json();
    const en = json.en;
    if (!en || !en.length) return toCache(key, null);
    const def = en[0].definitions?.[0]?.definition;
    if (!def) return toCache(key, null);
    return toCache(key, def.replace(/<[^>]*>/g, "").trim());
  } catch (e) { return toCache(key, null); }
}

// ---------- DUCKDUCKGO INSTANT ANSWER (optional, may CORS-fail silently) ----------
async function fetchDDG(term) {
  if (!term) return null;
  const key = "ddg:" + term.toLowerCase().trim();
  if (fromCache(key) !== undefined) return fromCache(key);
  try {
    const r = await fetchWithTimeout("https://api.duckduckgo.com/?q=" + encodeURIComponent(term) + "&format=json&no_html=1&skip_disambig=1");
    if (!r.ok) return toCache(key, null);
    const json = await r.json();
    const txt = json.AbstractText || json.Answer || null;
    return toCache(key, txt && txt.length > 10 ? txt : null);
  } catch (e) { return toCache(key, null); }
}

// ============================================================
// REASONING — use ConceptNet edges to make Bong "think" in its own style.
// ============================================================
const RELATION_PHRASES = {
  IsA:          t => `is a ${t}`,
  InstanceOf:   t => `is a ${t}`,
  HasA:         t => `has ${t}`,
  HasProperty:  t => `is ${t}`,
  CapableOf:    t => `can ${t}`,
  UsedFor:      t => `is for ${t}`,
  AtLocation:   t => `lives at the ${t}`,
  PartOf:       t => `is part of ${t}`,
  MadeOf:       t => `is made of ${t}`,
  Desires:      t => `wants ${t}`,
  NotDesires:   t => `doesn't want ${t}`,
  Causes:       t => `causes ${t}`,
  SimilarTo:    t => `is like a ${t}`,
  RelatedTo:    t => `has to do with ${t}`,
  Synonym:      t => `is basically ${t}`,
  Antonym:      t => `is the opposite of ${t}`
};

function reasoningReply(term, groups) {
  if (!groups) return null;
  const available = Object.keys(RELATION_PHRASES).filter(r => groups[r] && groups[r].length);
  if (!available.length) return null;

  // pick 2-4 relations to state, no duplicates
  const shuffled = [...available].sort(() => Math.random() - 0.5);
  const n = Math.min(rint(2, 4), shuffled.length);
  const chosen = shuffled.slice(0, n);
  const statements = chosen.map(rel => `${term} ${RELATION_PHRASES[rel](pick(groups[rel]))}`);

  // 30% chance: fake a "logic" chain with a "so."
  if (chance(0.3) && groups.IsA?.length && (groups.HasA?.length || groups.CapableOf?.length)) {
    const parent = pick(groups.IsA);
    const trait = pick(groups.HasA || groups.CapableOf);
    const verb = groups.HasA ? "has" : "can";
    return `${term} is a ${parent}. a ${parent} ${verb} ${trait}. so. ${term} ${verb} ${trait}. i did logic.`;
  }
  // 20% chance: state a contradiction from two RelatedTo edges
  if (chance(0.2) && groups.RelatedTo && groups.RelatedTo.length >= 2) {
    const a = groups.RelatedTo[0];
    const b = groups.RelatedTo[1];
    return `${term}. related to ${a}. also ${b}. both somehow.`;
  }

  return statements.join(". ") + ".";
}

// ============================================================
// IMAGE GENERATION
// 1) Pollinations.ai — actual Stable Diffusion / Flux, keyless URL-based.
// 2) Wikipedia thumbnail collage — chops up related topic images.
// ============================================================

function detectImageIntent(raw) {
  const q = raw.toLowerCase().trim();
  // collage-specific
  let m = q.match(/^(?:make (?:me )?)?(?:a )?(?:collage|patchwork|sketch)\s+(?:of |about )?(.+?)[?.!]*$/);
  if (m && /collage|patchwork|sketch/.test(q)) return { mode: "collage", subject: m[1].trim().slice(0, 80) };
  // general draw/picture
  m = q.match(/^(?:can you |could you |please )?(?:draw|paint|show me|make (?:me )?(?:a |an )?(?:picture|image|pic|drawing|photo)(?: of)?|generate (?:a |an )?(?:picture|image|pic)(?: of)?|illustrate|render)\s+(?:me )?(?:a |an |the )?(.+?)[?.!]*$/);
  if (m) return { mode: "ai", subject: m[1].trim().slice(0, 80) };
  // "what does X look like"
  m = q.match(/what does (?:a |an |the )?(.+?) look like[?.!]*$/);
  if (m) return { mode: "ai", subject: m[1].trim().slice(0, 80) };
  return null;
}

// LoremFlickr — keyless tag-based photo lookup. Returns a real Flickr
// photo matching the tag(s). Pollinations.ai added Turnstile-captcha
// anti-abuse so it's no longer usable keylessly; LoremFlickr stays open.
// We build a short tag list from the subject + any matching topic words.
function buildImageTags(subject) {
  const tags = [subject];
  const key = subject.toLowerCase().split(/\s+/)[0];
  for (const t of (TOPIC[key] || []).slice(0, 2)) tags.push(t);
  return tags
    .map(t => t.toLowerCase().replace(/[^a-z0-9 ]/g, "").trim().replace(/\s+/g, "-"))
    .filter(t => t && t.length >= 2 && t.length <= 30)
    .slice(0, 3)
    .join(",");
}

async function imageUrlFor(subject) {
  const tags = buildImageTags(subject) || "mystery";
  const seed = Math.floor(Math.random() * 1000000);
  return "https://loremflickr.com/512/512/" + encodeURIComponent(tags) + "?lock=" + seed;
}

async function collageUrls(subject) {
  // Collect candidate terms: subject + ConceptNet RelatedTo/IsA/HasA/PartOf
  const terms = new Set([subject]);
  const cn = await fetchConceptNet(subject);
  if (cn) {
    for (const rel of ["RelatedTo","IsA","HasA","PartOf","MadeOf","Synonym"]) {
      for (const t of (cn[rel] || []).slice(0, 3)) terms.add(t);
    }
  }
  // Also add Datamuse associations
  const dm = await fetchDatamuse(subject);
  if (dm) for (const t of dm.slice(0, 6)) terms.add(t);

  const urls = [];
  const tried = new Set();
  for (const t of terms) {
    if (urls.length >= 4) break;
    if (tried.has(t)) continue;
    tried.add(t);
    const wiki = await fetchWiki(t);
    if (wiki?.thumbnail && !urls.includes(wiki.thumbnail)) urls.push(wiki.thumbnail);
  }
  return urls;
}

// "Dumbify" — take a wiki sentence, deflate it. Drops articles, inserts pauses,
// occasionally mashes in a gibber syllable. The result reads like someone tired
// half-remembering what they read on the page.
function dumbify(text) {
  let s = text.split(/(?<=[.!?])\s+/)[0] || text;
  s = s.replace(/\([^)]*\)/g, "").replace(/\[\d+\]/g, "");
  s = s.toLowerCase().replace(/\s+/g, " ").trim();

  const droppable = new Set(["the","a","an","of","is","are","to","in","on","at","with","and","or","that","which","as","by","for","be","its","their","such","also"]);
  let tokens = s.split(/\s+/).filter(t => t.length);
  tokens = tokens.filter(t => !droppable.has(t.replace(/[^a-z]/g,"")) || chance(0.55));

  // limit length so it doesn't dump a whole encyclopedia paragraph
  if (tokens.length > 22) tokens = tokens.slice(0, 22);

  const out = [];
  for (let i = 0; i < tokens.length; i++) {
    out.push(tokens[i]);
    if (i < tokens.length - 1) {
      const r = Math.random();
      if (r < 0.10) out.push("...");
      else if (r < 0.13) out.push(gibber());
      else if (r < 0.16) out.push("uhh");
    }
  }
  let result = out.join(" ").replace(/\s+([,.;:])/g, "$1").replace(/\.\.+/g, "...").trim();
  result = result.replace(/[.,;:]+$/, "");
  return result + ".";
}

// Words that look like input but are really reactions/acknowledgments —
// shouldn't be mistaken for topics ("really?", "please!", "huh?").
const META_WORDS = new Set([
  "really","please","ok","okay","sure","maybe","yeah","yep","yes","no","nope",
  "huh","what","hmm","oh","wait","fine","right","mhm","mmm","meh","cool","nice",
  "wow","whoa","damn","ugh","uhh","uh","thanks","thank","welcome","lol","lmao",
  "hi","hello","hey","bye","goodbye"
]);

// Strip anaphoric tails like "X you speak of", "X you mentioned", "X that
// we talked about" — the subject is X, the tail is noise from the user
// referencing a past mention. Also drops trailing filler ("really",
// "please", etc.) from captured terms.
function cleanCapturedTerm(t) {
  if (!t) return t;
  let s = t.trim();
  // drop anaphoric tail ("X you speak of")
  s = s.replace(/\s+(you|we|u) (speak|said|mentioned|talked|were talking|talking)\s+(of|about|on)\b.*$/i, "");
  // drop "that we X" / "that i X"
  s = s.replace(/\s+that\s+(you|we|i|u)\s+\w+(\s+\w+)?\s*$/i, "");
  // drop trailing filler words
  s = s.replace(/\s+(really|please|maybe|ok|okay|though)\s*$/i, "");
  return s.trim();
}

// Pick the best term to feed to Wikipedia / conspiracy generator
function wikiTermFor(info) {
  if (info.topic) return info.topic;
  const m = info.q.match(/(?:what(?:'?s| is| are)|who(?:'?s| is| are)|how old (?:is|are|was|were)|where (?:is|are|was|were)|when (?:is|was|were|did)|define|tell me about|explain|describe|write (?:me )?(?:a |an )?(?:\d+[- ]?word )?(?:paragraph|essay|story|poem|bit) about)\s+(?:a |an |the |some )?(.+?)[?.!]*$/);
  if (m) {
    const t = cleanCapturedTerm(m[1]).slice(0, 60);
    if (t && !META_WORDS.has(t.toLowerCase())) return t;
  }
  if (info.echo && !META_WORDS.has(info.echo.toLowerCase())) return info.echo;
  return null;
}

// Country → IANA timezone map (common ones). Used to answer
// "what time is it in X" with an actual correct time, still mangled

const COUNTRY_TZ = {

function detectTimeInLocation(raw) {
  const q = raw.toLowerCase().trim();
  const m = q.match(/\bwhat(?:'?s| is)?\s+(?:the\s+)?time\b.*?\bin\s+(.+?)[?.!]*$/);
  if (!m) return null;
  let loc = cleanCapturedTerm(m[1]).toLowerCase().trim();
  loc = loc.replace(/^the\s+/, "");
  const tz = COUNTRY_TZ[loc] || CITY_TZ[loc];
  return { loc, tz };
}

function timeInLocationReply(loc, tz) {
  if (!tz) return `${loc}? i've heard of it. time works there the same as anywhere. probably.`;
  try {
    const t = new Intl.DateTimeFormat("en-US", { timeZone: tz, hour: "numeric", minute: "2-digit", hour12: true }).format(new Date());

    return pick([
      `in ${loc}, it is ${t}. a ${d}. i think.`,
      `${loc}: ${t}. ${d}. if the clocks are right.`,
      `${t} in ${loc}. roughly. also it's ${d} there.`,

function mathReply(m) {
  let r;
  if (m.op === "+") r = m.a + m.b;
  else if (m.op === "-") r = m.a - m.b;
  else if (m.op === "*") r = m.a * m.b;
  else if (m.op === "/") r = m.b === 0 ? null : m.a / m.b;
  if (r === null) return "divide by zero. nobody can. please don't.";
  // 30% off-by-one for comedy
  if (chance(0.3) && Number.isFinite(r)) {
    const wrong = Math.round(r) + (chance(0.5) ? 1 : -1);
    return pick([
      `${m.a} ${m.op} ${m.b}... is ${wrong}? ${gibber()}. i think.`,
      `uhh. ${wrong}. count on finger. no finger.`,
      `math hard. ${wrong}. maybe.`
    ]);
  }
  return pick([
    `${m.a} ${m.op} ${m.b} is ${r}. easy.`,
    `${r}. next.`,
    `${r}. ${gibber()}. yes.`
  ]);
}

    "do","does","did","has","have","had","will","would","could","should",
    "very","just","also","really","kinda","sorta","what","who","why","how","when","where","which"
  ]);
  // Prefer a capitalized word that ISN'T just a sentence-starter
  // (e.g. "Do you know Jeffery?" shouldn't give us "Do").
  for (let i = 0; i < words.length; i++) {
    const clean = words[i].replace(/[^A-Za-z0-9]/g, "");
    // skip first-word capitalization — only trust mid-sentence caps as names
    if (i === 0) continue;
    if (/^[A-Z][a-z]+$/.test(clean)) return clean;
  }
  // Fall back to first-word cap only if it's not a stopword
  const first = words[0]?.replace(/[^A-Za-z0-9]/g, "");
  if (first && /^[A-Z][a-z]+$/.test(first) && !stop.has(first.toLowerCase())) return first;
  // Last non-stopword
  for (let i = words.length - 1; i >= 0; i--) {
    const clean = words[i].replace(/[^A-Za-z0-9]/g, "");
    const low = clean.toLowerCase();
    if (clean.length > 1 && !stop.has(low)) return clean;
  }
  return null;
}

const convo = {

function nextProbeCategory() {
  for (const cat of PROBE_ORDER) {
    if (!convo.knownAbout[cat] && cat !== convo.asked) return cat;
  }
  return null;
}
